# .github/workflows/strava-sync.yml
#
# 台灣時間 (UTC+8) 每天三次自動執行：
#   早上 10:00 (台灣) = 02:00 UTC
#   下午 18:00 (台灣) = 10:00 UTC
#   晚上 22:00 (台灣) = 14:00 UTC

name: Strava Daily Sync

on:
  schedule:
    - cron: '0 2 * * *'    # 台灣早上 10:00
    - cron: '0 10 * * *'   # 台灣下午 18:00
    - cron: '0 14 * * *'   # 台灣晚上 22:00

  workflow_dispatch:        # 讓你可以在 GitHub 網頁手動觸發（測試用）
    inputs:
      fetch_all:
        description: '全量抓取所有歷史活動並重建 monthly_history（第一次設定用）'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. 把 repo clone 下來
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. 裝 Node.js（fetch-strava.js 用的是內建 https 模組，不需要 npm install）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. 執行 script，把 GitHub Secrets 注入成環境變數
      - name: Run Strava fetch script
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          STRAVA_ATHLETE_ID:    ${{ secrets.STRAVA_ATHLETE_ID }}
          FETCH_ALL:            ${{ inputs.fetch_all == true && '1' || '0' }}
        run: node scripts/fetch-strava.js

      # 4. 如果 strava.json 有變動，commit 並 push 回 repo
      - name: Commit and push strava.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add strava.json
          # 如果沒有變動就不 commit（避免空 commit）
          git diff --staged --quiet || git commit -m "chore: update strava data $(date -u '+%Y-%m-%d')"
          git push
