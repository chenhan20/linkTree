<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Athletics · aespa · SteveChuang</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080614;color:#ddd}

#star-canvas{position:fixed;inset:0;width:100%;height:100%;background:#080614;z-index:0;pointer-events:none}

#app{position:relative;z-index:1;min-height:100vh;max-width:800px;margin:0 auto;padding:0 1.2rem 5rem}

/* ── topbar ── */
.topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 1.2rem;margin:0 -1.2rem;
  border-bottom:1px solid rgba(168,85,247,.2);
  background:rgba(8,6,20,.95);
  backdrop-filter:blur(8px);
}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.35);
  border-radius:20px;padding:6px 14px;
  color:#a855f7;font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:none;transition:background .2s;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:hover{background:rgba(168,85,247,.2)}
.topbar-title{font-size:12px;color:rgba(168,85,247,.6);letter-spacing:2.5px;text-transform:uppercase}
.topbar-updated{font-size:10px;color:rgba(168,85,247,.35);letter-spacing:1.5px;text-transform:uppercase}

/* ── hero ── */
.hero{
  display:flex;align-items:center;justify-content:space-between;
  gap:1.5rem;padding:2rem 0 1.5rem;flex-wrap:wrap;
  border-bottom:1px solid rgba(168,85,247,.12);
}
.hero-left{display:flex;align-items:center;gap:1.2rem}
.avatar{
  width:110px;height:110px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1a0a2e,#2d1060);
  border:2.5px solid #a855f7;
  overflow:hidden;
  box-shadow:0 0 22px rgba(168,85,247,.45),0 0 44px rgba(168,85,247,.15);
  display:flex;align-items:center;justify-content:center;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar svg{width:52px;height:52px;fill:#a855f7}
.hero-info h1{font-size:22px;font-weight:600;color:#fff}
.hero-sub{font-size:11px;color:#a855f7;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.hero-right{text-align:right;flex-shrink:0}
.aespa-brand{
  font-family:Georgia,'Times New Roman',serif;
  font-size:52px;font-weight:700;font-style:italic;
  background:linear-gradient(135deg,#a855f7,#e879f9,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;letter-spacing:-2px;
}
.aespa-tagline{
  font-size:9px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(168,85,247,.5);margin-top:6px;
}

/* ── stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:1.5rem 0 2.2rem}
.stat-card{
  padding:1rem 1rem 1.1rem;border-radius:10px;
  background:rgba(168,85,247,.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,.3);
  box-shadow:0 0 15px rgba(168,85,247,.1),inset 0 1px 0 rgba(255,255,255,.08);
}
.stat-val{font-size:26px;font-weight:700;color:#e879f9;line-height:1}
.stat-unit{font-size:10px;color:rgba(168,85,247,.55);margin-top:3px}
.stat-label{font-size:12px;color:#bbb;margin-bottom:9px;letter-spacing:.5px}
.stat-metrics{display:flex;align-items:flex-start;gap:0}
.stat-metric{flex:1;min-width:0}
.stat-vdiv{width:1px;background:rgba(168,85,247,.2);align-self:stretch;margin:2px 10px 6px;flex-shrink:0}

/* ── monthly consistency ── */
.consistency-list{display:flex;flex-direction:column;gap:10px;margin-bottom:2.2rem}
.consistency-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:.7rem .9rem;border-radius:10px;
  background:rgba(168,85,247,.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,.22);
  box-shadow:0 0 12px rgba(168,85,247,.08),inset 0 1px 0 rgba(255,255,255,.05);
}
.consistency-name{font-size:13px;color:#eeebe8;display:flex;align-items:center;gap:6px;white-space:nowrap}
.consistency-name .count{font-size:12px;color:#aaa;margin-left:4px}
.consistency-name .count b{color:#c084fc;font-weight:600}
.progress-bar{position:relative;height:8px;border-radius:6px;background:rgba(168,85,247,.1);overflow:hidden;border:1px solid rgba(168,85,247,.15)}
.progress-fill{position:relative;height:100%;border-radius:6px;width:0;transition:width .8s cubic-bezier(.25,.46,.45,.94);box-shadow:0 0 8px rgba(168,85,247,.4);overflow:hidden}
.progress-fill::after{
  content:'';position:absolute;top:0;left:-60%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  animation:aespa-shimmer 2.4s ease-in-out infinite;border-radius:6px;
}
@keyframes aespa-shimmer{0%{left:-60%}60%,100%{left:110%}}
.progress-fill.danger {background:linear-gradient(90deg,#5a0e6a,#d04680)}
.progress-fill.warning{background:linear-gradient(90deg,#5a3a9a,#e0a020)}
.progress-fill.done   {background:linear-gradient(90deg,#4a1a9e,#a855f7,#c084fc)}
.progress-fill.over   {background:linear-gradient(90deg,#a855f7,#e879f9,#f9a8e7)}
.status-badge{font-size:10px;padding:3px 8px;border-radius:10px;white-space:nowrap;letter-spacing:.5px}
.status-badge.danger {background:rgba(208,70,128,.12);color:#e07090;border:1px solid rgba(208,70,128,.3)}
.status-badge.warning{background:rgba(224,160,32,.12);color:#e0b040;border:1px solid rgba(224,160,32,.3)}
.status-badge.done   {background:rgba(168,85,247,.14);color:#c084fc;border:1px solid rgba(168,85,247,.4)}
.status-badge.over   {background:rgba(232,121,249,.16);color:#f0a0ff;border:1px solid rgba(232,121,249,.45);font-size:13px;font-weight:700;letter-spacing:0}

/* ── weekly quest tiles ── */
.quest-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.2rem}
@media(max-width:480px){.quest-grid{grid-template-columns:repeat(2,1fr)}}
.quest-tile{padding:20px 10px 16px;border-radius:10px;text-align:center;background:rgba(168,85,247,.04);border:1px solid rgba(168,85,247,.1);user-select:none}
.quest-tile.on{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.35);box-shadow:0 0 14px rgba(168,85,247,.12)}
.quest-tile .qico{font-size:26px;display:block;margin-bottom:8px;filter:grayscale(1);opacity:.28}
.quest-tile.on .qico{filter:none;opacity:1}
.quest-tile .qlabel{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:#333}
.quest-tile.on .qlabel{color:rgba(168,85,247,.6)}
.quest-tile .qcheck{font-size:15px;margin-top:7px;color:#252525}
.quest-tile.on .qcheck{color:#a855f7}
/* act highlight flash */
.act-highlight{animation:actFlash .9s ease-out}
@keyframes actFlash{0%,40%{background:rgba(168,85,247,.22);border-color:rgba(168,85,247,.6)}100%{background:inherit;border-color:inherit}}
/* strava link button */
.act-strava-link{display:inline-flex;align-items:center;gap:2px;flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;color:rgba(168,85,247,.95);text-decoration:none;border:1px solid rgba(168,85,247,.45);background:rgba(168,85,247,.1);white-space:nowrap;line-height:1.4;transition:background .15s,border-color .15s}
.act-strava-link:hover{background:rgba(168,85,247,.25);border-color:#a855f7}
.activity-name-wrap{display:flex;align-items:center;gap:8px;min-width:0}
.lap-toggle{background:transparent;border:none;color:rgba(168,85,247,.6);font-size:10px;cursor:pointer;padding:2px 4px;letter-spacing:.5px;display:inline-block}
.lap-toggle:hover{color:#a855f7}

/* ── section title ── */
.section-title{
  font-size:11px;font-weight:600;color:#a855f7;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:1rem;padding-bottom:.5rem;
  border-bottom:1px solid rgba(168,85,247,.18);
  display:flex;align-items:center;gap:8px;
}

/* ── ITT segments ── */
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2.2rem}
@media(max-width:600px){.seg-grid{grid-template-columns:1fr}}
.seg-card{background:rgba(255,255,255,.03);border:1px solid rgba(168,85,247,.15);border-radius:10px;padding:1rem}
.seg-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.seg-name{font-size:13px;font-weight:700;color:#eeebe8;line-height:1.3}
.seg-dist{font-size:11px;color:#888;margin-top:2px}
.seg-pr-badge{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:.5rem}
.seg-pr-time{font-size:17px;font-weight:700;color:#a855f7;font-variant-numeric:tabular-nums}
.seg-pr-label{font-size:9px;color:#888;letter-spacing:1.5px;text-transform:uppercase}
.seg-table{width:100%;border-collapse:collapse;font-size:11px}
.seg-table th{color:#666;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06);text-align:left}
.seg-table th:not(:first-child){text-align:right}
.seg-table td{padding:5px 0;color:#aaa;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.seg-table td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.seg-row-pr td{color:#a855f7 !important;font-weight:700}
.seg-crown{font-size:13px;margin-right:4px}
.seg-time-pr{color:#a855f7 !important}
.seg-more-wrap{margin-top:0}
.seg-fade{height:30px;margin-top:-30px;background:linear-gradient(transparent,#080614);pointer-events:none}
.seg-more-btn{width:100%;padding:5px 0;background:transparent;border:none;border-top:1px solid rgba(168,85,247,.12);color:rgba(168,85,247,.4);font-size:11px;cursor:pointer;letter-spacing:1px;margin-top:2px;display:block}
.seg-more-btn:hover{color:#a855f7}

/* ── monthly chart ── */
.monthly-chart{margin-bottom:2.2rem}
.chart-rows{display:flex;flex-direction:column;gap:10px}
.chart-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.chart-label{font-size:12px;color:#aaa;width:24px;text-align:right;flex-shrink:0}
.chart-bar-wrap{
  flex:1;height:44px;
  background:rgba(168,85,247,.08);
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(168,85,247,.15);
}
.chart-bar{
  height:100%;border-radius:8px;
  background:linear-gradient(90deg,#4a1a9e,#a855f7,#c084fc);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;min-width:44px;
  width:0;transition:width 1s cubic-bezier(.25,.46,.45,.94);
  box-shadow:0 0 12px rgba(168,85,247,.5),inset 0 1px 0 rgba(255,255,255,.12);
}
/* diamond pattern overlay */
.chart-bar::before{
  content:'';
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,rgba(255,255,255,.06) 0,rgba(255,255,255,.06) 1px,transparent 1px,transparent 8px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.06) 0,rgba(255,255,255,.06) 1px,transparent 1px,transparent 8px);
  pointer-events:none;
}
.chart-bar-val{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;position:relative;z-index:1}
.chart-unit-label{font-size:11px;color:#666;width:28px;flex-shrink:0}

/* ── chart year toggle ── */
.chart-year-header{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;color:#a855f7;letter-spacing:2.5px;
  text-transform:uppercase;padding:12px 0 4px;
  cursor:pointer;user-select:none;opacity:.8;
}
.chart-year-header:hover{opacity:1}
.chart-year-arrow{transition:transform .25s;font-style:normal;font-size:10px}
.chart-year-rows{overflow:hidden;transition:max-height .35s ease}

/* ── sport tabs ── */
.sport-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.sport-tab{
  display:flex;align-items:center;gap:5px;
  font-size:12px;padding:5px 14px;border-radius:20px;
  border:1px solid rgba(168,85,247,.2);color:#777;background:transparent;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.sport-tab.active{background:rgba(168,85,247,.14);border-color:#a855f7;color:#c084fc}
.sport-tab:hover:not(.active){border-color:rgba(168,85,247,.4);color:#a855f7}

/* ── timeline ── */
.timeline{margin-bottom:2.2rem}
.timeline-day{margin-bottom:1.4rem}
.timeline-date{
  font-size:16px;font-weight:600;color:#c084fc;
  margin-bottom:.75rem;padding-left:22px;position:relative;
}
.timeline-date::before{
  content:'✦';position:absolute;left:0;top:50%;transform:translateY(-50%);
  font-size:10px;color:#a855f7;
}
.activity-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:.85rem 1rem;border-radius:9px;
  background:rgba(168,85,247,.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,.2);
  box-shadow:0 0 15px rgba(168,85,247,.08),inset 0 1px 0 rgba(255,255,255,.06);
  margin-bottom:8px;margin-left:22px;
  transition:border-color .2s,background .2s;
}
.activity-card:hover{border-color:rgba(168,85,247,.45);background:rgba(168,85,247,.1)}
.activity-icon{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;
  background:rgba(168,85,247,.18);border:1px solid rgba(168,85,247,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.activity-icon svg{width:24px;height:24px;fill:#a855f7}
.activity-info{flex:1;min-width:0}
.activity-name{font-size:16px;font-weight:500;color:#eeebe8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.indoor-tag,.bike-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;line-height:1;border-radius:3px;padding:2px 5px 2px 4px;vertical-align:middle;margin-right:5px;flex-shrink:0;white-space:nowrap}
.indoor-tag{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.bike-tag{background:rgba(100,200,255,.08);color:#60c8f0;border:1px solid rgba(100,200,255,.3)}
.activity-meta{font-size:11px;color:#666;margin-top:3px}
.activity-meta .tag{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.2);
  border-radius:4px;padding:2px 8px;margin-right:4px;margin-top:3px;
  color:#b07fd0;font-size:12px;white-space:nowrap;
}
.activity-meta .tag.hr{border-color:rgba(232,121,249,.25);background:rgba(232,121,249,.06);color:#d86ef5}
.activity-dist{
  font-size:18px;font-weight:700;color:#e879f9;flex-shrink:0;white-space:nowrap;padding-top:2px;line-height:1;
}
.activity-dist::after{content:' ✦';font-size:10px;color:rgba(168,85,247,.5)}/* lap strip */
.lap-strip{
  margin-top:4px;padding:4px 8px;border-radius:5px;
  background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.18);
  font-size:11px;color:#888;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.lap-strip .lap-name{color:#b07fd0;font-weight:500;font-size:11px}
.lap-strip .lap-tag{color:#999;white-space:nowrap}.empty{font-size:13px;color:#555;padding:2rem 0;text-align:center}

/* ── show more ── */
.show-more-btn{
  width:100%;padding:10px;border-radius:8px;margin-top:6px;
  border:1px solid rgba(168,85,247,.25);background:transparent;
  color:#a855f7;font-size:12px;cursor:pointer;letter-spacing:1.5px;
  transition:background .2s;text-transform:uppercase;
}
.show-more-btn:hover{background:rgba(168,85,247,.1)}

/* ITT inline badge in activity log */
.itt-badge{display:flex;align-items:center;gap:10px;padding:6px 12px 7px 12px;border-left:2px solid rgba(168,85,247,.2);margin:4px 0 0;background:rgba(168,85,247,.04);border-radius:0 6px 6px 0}
.itt-badge.pr{background:rgba(168,85,247,.1);border-left-color:#a855f7}
.itt-crown{font-size:17px;line-height:1;flex-shrink:0}
.itt-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.itt-seg-name{font-size:9px;color:#555;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itt-badge.pr .itt-seg-name{color:rgba(168,85,247,.6)}
.itt-time{font-size:13px;font-weight:700;color:#a855f7;line-height:1}
.itt-attempt{font-size:9px;color:#444;letter-spacing:1px}
.itt-badge.pr .itt-attempt{color:rgba(168,85,247,.5)}

/* ── bottom totals ── */
.totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.total-card{
  padding:1rem;border-radius:10px;
  background:rgba(168,85,247,.06);
  backdrop-filter:blur(8px);
  border:1px solid rgba(168,85,247,.2);
  box-shadow:0 0 12px rgba(168,85,247,.08),inset 0 1px 0 rgba(255,255,255,.06);
  text-align:center;
}
.total-val{font-size:20px;font-weight:600;color:#e879f9}
.total-label{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:5px}

/* ── CTA button ── */
.strava-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;border-radius:10px;
  background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.4);
  color:#a855f7;font-size:14px;font-weight:500;
  text-decoration:none;transition:background .2s,border-color .2s;
  box-shadow:0 0 20px rgba(168,85,247,.1);
}
.strava-cta:hover{background:rgba(168,85,247,.2);border-color:#a855f7}
.strava-cta svg{width:16px;height:16px;fill:#a855f7;flex-shrink:0}

/* ── footer ── */
.page-footer{
  text-align:center;padding:3rem 0 1rem;
}
.footer-members{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(168,85,247,.4);margin-bottom:.6rem;
}
.footer-aespa{
  font-family:Georgia,'Times New Roman',serif;
  font-size:32px;font-weight:700;font-style:italic;
  background:linear-gradient(135deg,#a855f7,#e879f9,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.25;
}

/* ── loading / error ── */
.loading{text-align:center;padding:4rem 0;color:#555;font-size:14px}

@media(max-width:520px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .hero{flex-direction:column;align-items:flex-start}
  .hero-right{align-self:flex-end}
  .aespa-brand{font-size:38px}
  .stat-val{font-size:18px}
  .totals-grid{grid-template-columns:repeat(3,1fr)}
  .total-val{font-size:16px}
  .consistency-row{grid-template-columns:auto 1fr;row-gap:8px}
  .consistency-row .status-badge{grid-column:1 / -1;justify-self:start}
}

/* ── Disc Modal ── */
#disc-modal{
  display:none;position:fixed;inset:0;z-index:8888;
  align-items:center;justify-content:center;
}
#disc-modal.open{display:flex}
body.disc-open{overflow:hidden}
.disc-bd{
  position:absolute;inset:0;
  background:rgba(4,0,14,.88);
  backdrop-filter:blur(10px);
  cursor:pointer;
}
.disc-scene{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
}
.disc-close{
  position:absolute;top:-50px;right:0;
  width:38px;height:38px;border-radius:50%;
  background:rgba(168,85,247,.14);border:1.5px solid rgba(168,85,247,.5);
  color:#a855f7;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,box-shadow .2s;
  box-shadow:0 0 10px rgba(168,85,247,.2);
  z-index:2;
}
.disc-close:hover{background:rgba(168,85,247,.38);box-shadow:0 0 20px rgba(168,85,247,.55)}
/* Main disc container */
.disc-outer{
  position:relative;
  width:min(88vmin,520px);height:min(88vmin,520px);
  border-radius:50%;
  border:2px solid rgba(168,85,247,.6);
  box-shadow:
    0 0 28px rgba(168,85,247,.6),
    0 0 60px rgba(168,85,247,.28),
    0 0 110px rgba(168,85,247,.12),
    inset 0 0 40px rgba(0,0,0,.55);
  overflow:hidden;
  animation:discIn .55s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes discIn{
  from{opacity:0;transform:scale(.55) rotate(-12deg)}
  to{opacity:1;transform:scale(1) rotate(0deg)}
}
@keyframes discOut{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:scale(.62)}
}
.disc-outer.closing{animation:discOut .28s ease-in both}
/* Rotating groove layer */
.disc-groove{
  position:absolute;inset:0;border-radius:50%;
  background:
    repeating-radial-gradient(
      circle at 50% 50%,
      transparent 0,transparent 3px,
      rgba(168,85,247,.07) 3px,rgba(168,85,247,.07) 3.6px
    ),
    conic-gradient(
      from 0deg,
      rgba(168,85,247,.24) 0%,rgba(10,3,28,.82) 10%,
      rgba(200,100,255,.18) 20%,rgba(10,3,28,.82) 30%,
      rgba(168,85,247,.22) 40%,rgba(10,3,28,.82) 50%,
      rgba(180,80,240,.2) 60%,rgba(10,3,28,.82) 70%,
      rgba(168,85,247,.24) 80%,rgba(10,3,28,.82) 90%,
      rgba(168,85,247,.24) 100%
    ),
    radial-gradient(circle,rgba(28,8,62,.94) 0%,rgba(5,1,12,.98) 65%);
  animation:discSpin 22s linear infinite;
}
.disc-groove::after{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:linear-gradient(
    145deg,
    rgba(255,255,255,.06) 0%,transparent 35%,
    rgba(255,255,255,.025) 65%,transparent 100%
  );
  pointer-events:none;
}
@keyframes discSpin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
/* Static inner label */
.disc-label{
  position:absolute;
  width:63%;height:63%;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 38% 32%,rgba(130,55,210,.45) 0%,transparent 50%),
    radial-gradient(circle at 65% 72%,rgba(90,20,160,.28) 0%,transparent 40%),
    linear-gradient(148deg,rgba(28,8,62,.97) 0%,rgba(7,2,18,.98) 100%);
  border:1.5px solid rgba(168,85,247,.32);
  box-shadow:0 0 18px rgba(168,85,247,.22),inset 0 1px 0 rgba(255,255,255,.07);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;padding:8%;text-align:center;gap:0;
  z-index:2;
}
/* Center hole */
.disc-hole{
  position:absolute;top:50%;left:50%;
  width:4.5%;aspect-ratio:1;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:rgba(2,0,8,.98);
  border:1px solid rgba(168,85,247,.42);
  box-shadow:0 0 7px rgba(168,85,247,.5);
  z-index:10;
}
/* ── disc label inner content ── */
.disc-meta{
  font-size:8px;letter-spacing:2.5px;color:rgba(168,85,247,.52);
  text-transform:uppercase;margin-bottom:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;
}
.disc-avatar-sm{
  width:40px;height:40px;border-radius:50%;
  border:1.5px solid rgba(168,85,247,.5);
  object-fit:cover;
  box-shadow:0 0 12px rgba(168,85,247,.4);
  margin-bottom:5px;flex-shrink:0;
}
.disc-avatar-fb{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#1a0a2e,#3d1080);
  border:1.5px solid rgba(168,85,247,.5);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:5px;flex-shrink:0;font-size:16px;
}
.disc-title{
  font-family:Georgia,'Times New Roman',serif;
  font-size:clamp(20px,5.5vmin,32px);
  font-weight:700;font-style:italic;
  background:linear-gradient(135deg,#a855f7,#e879f9,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;letter-spacing:-1px;margin-bottom:3px;
}
.disc-upd{font-size:8px;color:rgba(168,85,247,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px}
/* stats 2×2 */
.disc-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:5px 7px;width:100%;margin-bottom:9px;
}
.disc-stat{
  background:rgba(168,85,247,.09);
  border:1px solid rgba(168,85,247,.22);
  border-radius:7px;padding:5px 4px;text-align:center;
}
.disc-stat-l{font-size:7.5px;color:#888;margin-bottom:2px;letter-spacing:.4px}
.disc-stat-v{font-size:clamp(12px,3.2vmin,17px);font-weight:700;color:#e879f9;line-height:1}
.disc-stat-u{font-size:7.5px;color:rgba(168,85,247,.48);margin-top:1px}
/* mini chart */
.disc-chart{
  width:100%;display:flex;align-items:flex-end;
  gap:3px;margin-bottom:8px;height:34px;
}
.disc-bar-wrap{
  display:flex;flex-direction:column;align-items:center;
  flex:1;gap:2px;justify-content:flex-end;
}
.disc-bar{
  width:100%;min-height:2px;border-radius:2px 2px 0 0;
  background:linear-gradient(180deg,#e879f9,#a855f7);
  opacity:.78;transition:height .6s ease;
}
.disc-bar-lbl{font-size:6.5px;color:rgba(168,85,247,.38);white-space:nowrap}
/* slogan */
.disc-slogan{
  font-size:7.5px;color:rgba(168,85,247,.38);
  letter-spacing:2px;font-style:italic;
}
/* open button (hero) */
.disc-open-btn{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:10px;padding:7px 14px;
  background:rgba(168,85,247,.1);
  border:1px solid rgba(168,85,247,.45);
  border-radius:20px;
  color:#a855f7;font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;
  transition:background .2s,box-shadow .2s,border-color .2s;
  box-shadow:0 0 10px rgba(168,85,247,.14);
}
.disc-open-btn:hover{
  background:rgba(168,85,247,.22);
  border-color:#a855f7;
  box-shadow:0 0 22px rgba(168,85,247,.4);
}
.disc-open-btn .dico{font-size:13px}
@media(max-width:520px){
  .disc-close{top:-44px}
  .disc-stats{gap:4px 5px}
}

<script>
/* ── aespa animated background (extra flashy) ── */
;(function(){
  const c=document.getElementById('star-canvas'),ctx=c.getContext('2d')
  let W,H,stars=[],orbs=[],grid=[],glyphs=[],comets=[],rings=[],bolts=[],t=0,flash=0
  const SYMS=['æ','Æ','⬡','◆','✦','✧','⬟','◇','★','✴','♢','✺','❉']
  function resize(){
    W=c.width=innerWidth; H=c.height=innerHeight
    orbs=[
      {x:W*.15,y:H*.2, r:W*.28, a:0, da:.004, hueBase:280, hueAmp:30, phase:0},
      {x:W*.85,y:H*.8, r:W*.24, a:0, da:.0028,hueBase:310, hueAmp:35, phase:1.2},
      {x:W*.5, y:H*.5, r:W*.34, a:0, da:.002, hueBase:260, hueAmp:25, phase:2.3},
      {x:W*.3, y:H*.85,r:W*.18, a:0, da:.0035,hueBase:325, hueAmp:30, phase:.7},
      {x:W*.75,y:H*.15,r:W*.16, a:0, da:.0042,hueBase:200, hueAmp:40, phase:1.8},
    ]
  }
  function spawnComet(){
    const fromLeft=Math.random()>.5
    const y=Math.random()*H*.7
    comets.push({
      x: fromLeft?-50:W+50, y,
      vx:(fromLeft?1:-1)*(8+Math.random()*6),
      vy:1.5+Math.random()*2,
      life:1, len:90+Math.random()*70,
      hue:270+Math.random()*70
    })
  }
  function spawnRing(){
    rings.push({
      x:Math.random()*W, y:Math.random()*H,
      r:5, maxR:120+Math.random()*80,
      a:.7, hue:260+Math.random()*80
    })
  }
  function spawnBolt(){
    const x=Math.random()*W
    const segs=[]
    let cx=x, cy=0
    while(cy<H){
      const nx=cx+(Math.random()-.5)*60
      const ny=cy+25+Math.random()*35
      segs.push([nx,ny])
      cx=nx; cy=ny
    }
    bolts.push({x,segs,life:1,hue:280+Math.random()*40})
    flash=Math.min(1,flash+.25)
  }
  function init(){
    stars=[]
    const n=Math.floor(W*H/1100)
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.6+.25,
      a:Math.random()*.9, da:(Math.random()-.5)*.012,
      speed:Math.random()*.12+.01,
      pink:Math.random()>.5,
      twinkle:Math.random()>.85
    })
    grid=[]
    const spacing=64
    for(let x=0;x<=W;x+=spacing) grid.push({type:'v',pos:x,phase:Math.random()*6})
    for(let y=0;y<=H;y+=spacing) grid.push({type:'h',pos:y,phase:Math.random()*6})
    glyphs=[]
    for(let i=0;i<22;i++) glyphs.push({
      x:Math.random()*W, y:Math.random()*H,
      ch:SYMS[Math.floor(Math.random()*SYMS.length)],
      a:0, da:(Math.random()>.5?.002:-.002),
      maxA:Math.random()*.14+.05,
      sz:Math.floor(Math.random()*24+12),
      speed:Math.random()*.5+.15,
      dx:(Math.random()-.5)*.4,
      rot:Math.random()*Math.PI*2,
      drot:(Math.random()-.5)*.01,
      hueBase:260+Math.random()*80
    })
    comets=[]; rings=[]; bolts=[]
  }
  function drawGrid(){
    ctx.save()
    grid.forEach(g=>{
      const alpha=.04+.04*Math.sin(t*.6+g.phase)
      const hue=270+30*Math.sin(t*.3+g.phase)
      ctx.strokeStyle=`hsla(${hue},80%,65%,${alpha})`
      ctx.lineWidth=.6; ctx.beginPath()
      if(g.type==='v'){ctx.moveTo(g.pos,0);ctx.lineTo(g.pos,H)}

    ctx.restore()
  }
  function draw(){
    ctx.clearRect(0,0,W,H)
    t+=.016
    // ===== aurora waves (more layers, more color) =====
    for(let k=0;k<5;k++){
      ctx.save()
      const baseY=H*(.2+k*.13)
      const hue=260+k*18+20*Math.sin(t*.4+k)
      const grd=ctx.createLinearGradient(0,baseY,W,baseY+H*.2)
      grd.addColorStop(0,'transparent')
      grd.addColorStop(.3,`hsla(${hue},85%,60%,${.06+.025*Math.sin(t*.7+k)})`)
      grd.addColorStop(.7,`hsla(${hue+30},90%,70%,${.05+.02*Math.cos(t*.5+k)})`)
      grd.addColorStop(1,'transparent')
      ctx.fillStyle=grd
      ctx.beginPath()
      ctx.moveTo(0,baseY)
      for(let i=1;i<=14;i++){
        const px=i/14*W, py=baseY+Math.sin(t*.6+i*.5+k*1.7)*H*.07
        ctx.lineTo(px,py)
      }

      ctx.fill()
      ctx.restore()
    }
    // ===== nebula orbs (hue cycling) =====

      const hue=o.hueBase+Math.sin(t*.3+o.phase)*o.hueAmp

    drawGrid()
    // ===== pulse rings =====
    if(Math.random()<.018) spawnRing()
    rings=rings.filter(r=>{
      r.r+=2.4; r.a*=.972
      ctx.save()
      ctx.strokeStyle=`hsla(${r.hue},90%,68%,${r.a})`
      ctx.lineWidth=2
      ctx.shadowColor=`hsla(${r.hue},90%,70%,${r.a})`; ctx.shadowBlur=14
      ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke()
      ctx.restore()
      return r.r<r.maxR && r.a>.04
    })
    // ===== stars (twinkle + glow) =====
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<0||s.a>1)s.da*=-1
      s.y-=s.speed; if(s.y<-2)s.y=H
      const aa=s.twinkle?s.a*(.5+.5*Math.sin(t*8+s.x*.05)):s.a
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
      ctx.fillStyle=s.pink?`rgba(244,114,255,${aa*.85})`:`rgba(170,120,255,${aa*.7})`
      if(s.twinkle){ctx.shadowColor='rgba(232,121,249,.9)'; ctx.shadowBlur=8}
      ctx.fill()
      ctx.shadowBlur=0
    })
    // ===== shooting stars / comets =====
    if(Math.random()<.025) spawnComet()
    comets=comets.filter(co=>{
      co.x+=co.vx; co.y+=co.vy; co.life*=.985
      const tx=co.x-co.vx*co.len/10, ty=co.y-co.vy*co.len/10
      const grd=ctx.createLinearGradient(co.x,co.y,tx,ty)
      grd.addColorStop(0,`hsla(${co.hue},95%,75%,${co.life})`)
      grd.addColorStop(1,`hsla(${co.hue},95%,75%,0)`)
      ctx.strokeStyle=grd; ctx.lineWidth=2.2
      ctx.shadowColor=`hsla(${co.hue},95%,80%,${co.life})`; ctx.shadowBlur=12
      ctx.beginPath(); ctx.moveTo(co.x,co.y); ctx.lineTo(tx,ty); ctx.stroke()
      ctx.shadowBlur=0
      // head
      ctx.fillStyle=`hsla(${co.hue},100%,90%,${co.life})`
      ctx.beginPath(); ctx.arc(co.x,co.y,2.2,0,Math.PI*2); ctx.fill()
      return co.life>.05 && co.x>-100 && co.x<W+100 && co.y<H+50
    })
    // ===== lightning bolts (rare flash) =====
    if(Math.random()<.004) spawnBolt()
    bolts=bolts.filter(b=>{
      b.life*=.82
      ctx.save()
      ctx.strokeStyle=`hsla(${b.hue},100%,85%,${b.life})`
      ctx.lineWidth=1.6
      ctx.shadowColor=`hsla(${b.hue},100%,75%,${b.life})`; ctx.shadowBlur=18
      ctx.beginPath(); ctx.moveTo(b.x,0)
      b.segs.forEach(([x,y])=>ctx.lineTo(x,y))
      ctx.stroke()
      ctx.restore()
      return b.life>.05
    })
    // global flash overlay (when bolt strikes)
    if(flash>.01){
      ctx.fillStyle=`rgba(220,180,255,${flash*.08})`
      ctx.fillRect(0,0,W,H)
      flash*=.88
    }
    // ===== floating rotating glyphs =====
    glyphs.forEach(g=>{
      g.a+=g.da; if(g.a<0||g.a>g.maxA)g.da*=-1
      g.y-=g.speed; g.x+=g.dx; g.rot+=g.drot
      if(g.y<-30)g.y=H+20
      if(g.x<-30)g.x=W+20
      if(g.x>W+30)g.x=-20
      const hue=g.hueBase+Math.sin(t*.5+g.x*.01)*30
      ctx.save()
      ctx.translate(g.x,g.y); ctx.rotate(g.rot)
      ctx.font=`${g.sz}px serif`
      ctx.shadowColor=`hsla(${hue},90%,70%,${g.a*2})`; ctx.shadowBlur=10
      ctx.fillStyle=`hsla(${hue},90%,75%,${g.a*1.4})`
      ctx.fillText(g.ch,0,0)
      ctx.restore()
    })
    // ===== animated scan line (brighter, double) =====
    const scanY=((t*80)%H)
    const scanGrd=ctx.createLinearGradient(0,scanY-10,0,scanY+10)
    scanGrd.addColorStop(0,'transparent')
    scanGrd.addColorStop(.5,`hsla(${280+30*Math.sin(t)},90%,70%,.08)`)
    scanGrd.addColorStop(1,'transparent')
    ctx.fillStyle=scanGrd; ctx.fillRect(0,scanY-10,W,20)
    const scan2=((t*40+H*.5)%H)
    const sg2=ctx.createLinearGradient(0,scan2-6,0,scan2+6)
    sg2.addColorStop(0,'transparent')
    sg2.addColorStop(.5,`hsla(320,90%,75%,.05)`)
    sg2.addColorStop(1,'transparent')
    ctx.fillStyle=sg2; ctx.fillRect(0,scan2-6,W,12)
    requestAnimationFrame(draw)
  }
  resize(); init(); draw()
  addEventListener('resize',()=>{resize();init()})
})()

/* ── helpers ── */
function toggleLaps(btn, gid) {
  const els = [...document.querySelectorAll('[data-lapgrp="' + gid + '"]')]
  if (!els.length) return
  const show = els[0].style.display === 'none'
  els.forEach(e => { e.style.display = show ? '' : 'none' })
  btn.textContent = show ? '▲ 收起' : '▼ +' + els.length + ' 分段'
}
function fmtMovingTime(hr) {
  // PRD FR-4: 避免 "1:00" 歧義，改為 "45 分" / "1 小時" / "1 小時 30 分"
  const totalMin = Math.max(0, Math.round((hr || 0) * 60))
  if (totalMin < 60) return `${totalMin} 分`
  const h = Math.floor(totalMin / 60)
  const m = totalMin % 60
  if (m === 0) return `${h} 小時`
  return `${h} 小時 ${m} 分`
}
const SPORT_META = {
  ride:   { icon: '🚴', label: '單車' },
  run:    { icon: '🏃', label: '跑步' },
  swim:   { icon: '🏊', label: '游泳' },
  weight: { icon: '🏋️', label: '重訓' },
}
const STATUS_META = {
  danger:  { emoji: '🔴', text: '嚴重落後' },
  warning: { emoji: '🟡', text: '近期需補課' },
  done:    { emoji: '🟢', text: '達標' },

function renderMonthlySummary(ms) {

  const m = (v, u) => `<div class="stat-metric"><div class="stat-val">${v}</div><div class="stat-unit">${u}</div></div>`
  const div = '<div class="stat-vdiv"></div>'
  const hr = v => v != null ? v : '—'
  return `
    <div class="section-title"><span>✦</span> 本月訓練量 <span style="color:rgba(168,85,247,.4);font-size:10px">· MONTHLY SUMMARY</span></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">🚴 單車</div><div class="stat-metrics">${m((+(ms.ride_km??0)).toFixed(1),'km')}${div}${m(hr(ms.ride_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏃 跑步</div><div class="stat-metrics">${m((+(ms.run_km??0)).toFixed(1),'km')}${div}${m(hr(ms.run_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏔️ 游泳</div><div class="stat-metrics">${m(ms.swim_m??0,'m')}${div}${m(hr(ms.swim_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏋️ 重訓</div><div class="stat-metrics">${m(ms.weight_count??0,'次')}${div}${m(hr(ms.weight_hr),'hr')}</div></div>

function renderMonthlyGoals(mg) {
  if (!mg) return ''
  const order = ['ride','run','swim','weight']
  const rows = order.map(k => {
    const g = mg[k]; if (!g) return ''
    const meta = SPORT_META[k]
    const sm = STATUS_META[g.status] || STATUS_META.danger
    const pct = Math.min(100, g.target > 0 ? (g.count / g.target) * 100 : 0)
    return `
      <div class="consistency-row">
        <div class="consistency-name">${meta.icon} ${meta.label}<span class="count"><b>${g.count}</b> / ${g.target}</span></div>
        <div class="progress-bar"><div class="progress-fill ${g.status}" data-pct="${pct}"></div></div>
        <div class="status-badge ${g.status}">${g.status === 'over' ? `+${g.count - g.target}` : `${sm.emoji} ${sm.text}`}</div>
      </div>`
  }).join('')
  return `
    <div class="section-title"><span>✦</span> 月度紀律 <span style="color:rgba(168,85,247,.4);font-size:10px">· MONTHLY CONSISTENCY (TARGET 4 / MONTH)</span></div>

}

function renderSegments(segs) {
  if (!segs || segs.length === 0) return ''
  const _today = new Date(Date.now() + 8*3600*1000).toISOString().slice(0,10)
  const _sincePRLine = (efforts) => {
    const pr = efforts.find(e => e.is_pr)
    if (!pr || !pr.date) return ''
    const d = Math.max(0, Math.round((Date.parse(_today) - Date.parse(pr.date.slice(0,10))) / 86400000))
    if (d === 0) return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:linear-gradient(90deg,rgba(232,121,249,.2),rgba(168,85,247,.04));border-left:3px solid #e879f9;border-radius:4px;letter-spacing:.5px;color:#f3d4ff">✨ 今天創下最快紀錄！</div>`
    return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:rgba(168,85,247,.06);border-left:3px solid rgba(168,85,247,.55);border-radius:4px;letter-spacing:.5px;color:rgba(243,212,255,.88)">⏱ 距PR紀錄已 <b style="font-weight:700;color:#e879f9">${d}</b> 天</div>`
  }
  const cards = segs.map(seg => {
    const rowArr = seg.efforts.map(e => {
      const crown = e.is_pr ? '<span class="seg-crown">👑</span>' : ''
      const timeClass = e.is_pr ? ' seg-time-pr' : ''
      const watts = e.avg_watts ? `${e.avg_watts}W` : '—'
      const hr    = e.avg_heartrate ? `${e.avg_heartrate}` : '—'
      const dateKey = (e.date || '').slice(0, 10)
      return `<tr class="${e.is_pr ? 'seg-row-pr' : ''}" data-date="${dateKey}" data-actid="${e.activity_id || ''}" style="cursor:pointer" title="跳至活動紀錄">
        <td>${fmtDate(e.date)}</td>
        <td class="${timeClass}">${crown}${e.elapsed_str}</td>
        <td>${watts}</td>
        <td>${hr}</td>
      </tr>`
    })
    const visRows  = rowArr.slice(0, 2).join('')
    const moreRows = rowArr.slice(2).join('')
    const extraTbody = moreRows ? `<tbody class="seg-extra" style="display:none">${moreRows}</tbody>` : ''
    const moreWrap   = moreRows ? `<div class="seg-more-wrap"><div class="seg-fade"></div><button class="seg-more-btn" onclick="var c=this.closest('.seg-card');c.querySelector('.seg-extra').style.display='';this.closest('.seg-more-wrap').remove()">▼ 全部 ${rowArr.length} 筆</button></div>` : ''
    return `<div class="seg-card">
      <div class="seg-header">
        <div>
          <div class="seg-name">${seg.name}</div>
          <div class="seg-dist">${seg.distance_km} km</div>
        </div>
        ${seg.pr_time_str ? `<div class="seg-pr-badge">
          <div class="seg-pr-time">${seg.pr_time_str}</div>
          <div class="seg-pr-label">PR</div>
        </div>` : ''}
      </div>
      ${_sincePRLine(seg.efforts)}
      <table class="seg-table">
        <thead><tr><th>日期</th><th>時間</th><th>功率</th><th>HR</th></tr></thead>
        <tbody>${visRows}</tbody>${extraTbody}
      </table>${moreWrap}
    </div>`
  }).join('')
  return `
    <div class="section-title"><span>✦</span> ITT 區間 <span style="color:rgba(168,85,247,.4);font-size:10px">· SEGMENT EFFORTS</span></div>
    <div class="seg-grid">${cards}</div>`
}
function fmtDate(d) {
  const [,mm,dd] = d.split('-')
  return `${mm} / ${dd}`
}
function fmtMonthLabel(m) {
  return m.replace(/^\d{4}-/, '')
}
function monthDist(h) {
  if (h.ride && typeof h.ride === 'object') return h.ride.distance_km || 0
  return h.distance_km || 0
}

/* ── group activities by date ── */
function groupByDate(list) {
  const map = {}
  ;(list || []).forEach(a => {
    const d = (a.date || '').slice(0, 10)
    if (!map[d]) map[d] = []
    map[d].push(a)
  })
  return Object.entries(map)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([d, acts]) => [
      d,
      acts.slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''))
    ])
}

/* ── render timeline ── */
function renderTimeline(list, type, expanded, ittMap) {
  if (!list || !list.length) return '<div class="empty">暫無資料</div>'
  const isAll    = type === 'all'
  const groups = groupByDate(list)
  const LIMIT = 10
  const hasMore = !expanded && groups.length > LIMIT
  const visible = hasMore ? groups.slice(0, LIMIT) : groups

  const html = visible.map(([date, acts]) => `
    <div class="timeline-day" id="act-${date}">
      <div class="timeline-date">${fmtDate(date)}</div>
      ${acts.map(a => {
        const aType    = isAll ? (a._type || 'ride') : type
        const aIsWeight = aType === 'weight'
        const aIsSwim   = aType === 'swim'
        const aIsRun    = aType === 'run'
        const aIsRide   = aType === 'ride'
        const aIcon = ICONS[aType] || ICONS.ride
        const tags = []
        if (aIsSwim && a.distance_km)   tags.push(`<span class="tag">🏊 ${Math.round(a.distance_km * 1000)} m</span>`)
        tags.push(`<span class="tag">⏱ ${fmtMovingTime(a.moving_time_hr || 0)}</span>`)
        if (!aIsWeight && !aIsSwim && a.elevation_m >= 100) tags.push(`<span class="tag">↑${a.elevation_m}m</span>`)
        if (aIsRun && a.avg_pace_km)     tags.push(`<span class="tag">💨 ${a.avg_pace_km}/km</span>`)
        if (aIsRun && a.avg_cadence_spm) tags.push(`<span class="tag">🦵 ${a.avg_cadence_spm} spm</span>`)
        if (!aIsRun && !aIsSwim && !aIsWeight && a.avg_speed_kmh) tags.push(`<span class="tag">${a.avg_speed_kmh} km/h</span>`)
        if (aIsSwim && a.pace_per_100m)  tags.push(`<span class="tag">💧 ${a.pace_per_100m}/100m</span>`)
        if (a.avg_heartrate)             tags.push(`<span class="tag hr">♥️ ${a.avg_heartrate} bpm</span>`)
        const lapArr = (aIsRide && a.top_laps) ? a.top_laps.slice(0, 10) : []
        const lapHtml = lapArr.length ? (() => {
          const lid = a.id || Math.floor(Date.now()*Math.random())
          const mkLap = l => `<div class="lap-strip"><span class="lap-name">🏁 ${l.name}</span><span class="lap-tag">⏱ ${l.moving_time_str}</span>${l.average_heartrate?`<span class="lap-tag">♥️ ${l.average_heartrate}</span>`:''}${l.average_watts?`<span class="lap-tag">⚡ ${l.average_watts}W</span>`:''}</div>`
          const vis = lapArr.slice(0,3).map(mkLap).join('')
          const hidLaps = lapArr.slice(3)
          if (!hidLaps.length) return vis
          return vis + hidLaps.map(l=>mkLap(l).replace('<div class="lap-strip">',`<div class="lap-strip" data-lapgrp="${lid}" style="display:none">`)).join('') +
            `<button class="lap-toggle" onclick="toggleLaps(this,'${lid}')">▼ +${hidLaps.length} 分段</button>`
        })() : ''
        const stravaLink = a.id ? `<a class="act-strava-link" href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">Strava ↗</a>` : ''
        const ittBadges = (aIsRide && ittMap && ittMap[date])
          ? ittMap[date].map(it => {
              const isPr = it.is_pr
              const crown = isPr ? '👑' : `<span style="font-size:11px;color:#555">#${it.attemptNum}</span>`
              const rankStr = it.rank ? (it.rank === 1 ? '🥇 第1名' : `第${it.rank}名`) : ''
              const attempt = isPr ? `第${it.attemptNum}次 · 🏆 PR ${rankStr}` : `第${it.attemptNum} / ${it.total} 次 · ${rankStr}`
              return `<div class="itt-badge${isPr ? ' pr' : ''}">
                <div class="itt-crown">${crown}</div>
                <div class="itt-info">
                  <div class="itt-seg-name">${it.segName}</div>
                  <div class="itt-time">${it.elapsed_str}</div>
                </div>
                <div class="itt-attempt">${attempt}</div>
              </div>`
            }).join('')
          : ''
        return `
        <div class="activity-card">
          <div class="activity-icon"><svg viewBox="0 0 24 24">${aIcon}</svg></div>
          <div class="activity-info">
            <div class="activity-name-wrap"><div class="activity-name">${a.trainer ? INDOOR_TAG : (aIsRide ? BIKE_TAG : '')}${a.name || '—'}</div>${stravaLink}</div>
            <div class="activity-meta">${tags.join('')}</div>
            ${lapHtml}
            ${ittBadges}
          </div>
          ${(!aIsWeight && !aIsSwim && a.distance_km) ? `<div class="activity-dist">${a.distance_km}<small style="font-size:11px;font-weight:400;margin-left:2px">km</small></div>` : (!aIsWeight && aIsSwim && a.distance_km) ? `<div class="activity-dist">${Math.round(a.distance_km*1000)}<small style="font-size:11px;font-weight:400;margin-left:2px">m</small></div>` : ''}
        </div>`
      }).join('')}
    </div>
  `).join('')

  const moreBtn = hasMore
    ? `<button class="show-more-btn" id="show-more-btn">▼ 顯示全部 ${groups.length} 天記錄</button>`
    : ''
  return html + moreBtn
}

/* ── main render ── */
function render(data) {
  _discData = data
  const s = data.summary || {}
  const history = (data.monthly_history || []).slice().reverse()
  const maxDist = Math.max(...history.map(monthDist), 1)

  // ── Fallback: derive monthly data from existing JSON if Action hasn't run yet ──
  if (!data.monthly_summary || !data.monthly_goals || !data.weekly_quest) {
    const tpeNow = new Date(Date.now() + 8 * 3600 * 1000)
    const tY = tpeNow.getUTCFullYear(), tM = tpeNow.getUTCMonth(), tD = tpeNow.getUTCDate()
    const thisMonth = tY + '-' + String(tM + 1).padStart(2, '0')
    const mh = (data.monthly_history || []).find(h => h.month === thisMonth)
    const TARGET = 4
    const TARGET_WEIGHT = 10
    const sOf = (c, t) => { const r = c / t; return r >= 1.5 ? 'over' : r >= 1 ? 'done' : r >= 0.5 ? 'warning' : 'danger' }
    if (!data.monthly_summary && mh) {
      data.monthly_summary = {
        ride_km:      mh.ride?.distance_km ?? 0,
        run_km:       mh.run?.distance_km ?? 0,
        swim_m:       Math.round((mh.swim?.distance_km ?? 0) * 1000),
        weight_count: mh.weight_training?.count ?? 0,
      }
    }
    if (!data.monthly_goals && mh) {
      const rc = mh.ride?.count ?? 0, rnc = mh.run?.count ?? 0, sc = mh.swim?.count ?? 0, wc = mh.weight_training?.count ?? 0
      data.monthly_goals = {
        ride:   { count: rc,  target: TARGET,        status: sOf(rc,  TARGET)        },
        run:    { count: rnc, target: TARGET,        status: sOf(rnc, TARGET)        },
        swim:   { count: sc,  target: TARGET,        status: sOf(sc,  TARGET)        },
        weight: { count: wc,  target: TARGET_WEIGHT, status: sOf(wc,  TARGET_WEIGHT) },
      }
    }
    if (!data.weekly_quest) {
      const dow = tpeNow.getUTCDay()
      const daysFromMon = (dow + 6) % 7
      const weekStart = new Date(Date.UTC(tY, tM, tD - daysFromMon)).toISOString().slice(0, 10)
      const inWeek = a => (a.date || '') >= weekStart
      data.weekly_quest = {
        ride:   (data.recent_rides   || []).some(inWeek),
        run:    (data.recent_runs    || []).some(inWeek),
        swim:   (data.recent_swims   || []).some(inWeek),
        weight: (data.recent_weights || []).some(inWeek),
      }
    }
  }

  // update topbar date
  const updatedAt = (data.updated_at || '').slice(0, 10)
  const topbarDate = document.getElementById('topbar-date')
  if (topbarDate) topbarDate.textContent = 'UPDATED ' + (updatedAt || '—')

  // build ALL list
  const allList = []
  ;(data.recent_rides   || []).forEach(a => allList.push({...a, _type:'ride'}))
  ;(data.recent_runs    || []).forEach(a => allList.push({...a, _type:'run'}))
  ;(data.recent_swims   || []).forEach(a => allList.push({...a, _type:'swim'}))
  ;(data.recent_weights || []).forEach(a => allList.push({...a, _type:'weight'}))
  allList.sort((a,b) => {
    const dc = (b.date||'').localeCompare(a.date||'')
    return dc !== 0 ? dc : (b.time||'').localeCompare(a.time||'')
  })

  const tabs = [
    { key:'all',    label:'📋 全部',   list: allList             },
    { key:'ride',   label:'🚴 單車',   list: data.recent_rides   },
    { key:'run',    label:'🏃 跑步',   list: data.recent_runs    },
    { key:'swim',   label:'🏊 游泳',   list: data.recent_swims   },
    { key:'weight', label:'🏋️ 重訓', list: data.recent_weights },
  ]
  const activeTabs = tabs.filter(t => t.list && t.list.length > 0)
  let activeTab = activeTabs[0]?.key || 'all'
  const showMore = {}

  // ── ITT date → efforts map ──
  const ittMap = {}
  ;(data.segments || []).forEach(seg => {
    const sorted = seg.efforts.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    const byTime = seg.efforts.slice().sort((a, b) => (a.elapsed_sec || 0) - (b.elapsed_sec || 0))
    const rankOf = {}; byTime.forEach((e, i) => { rankOf[e.activity_id] = i + 1 })
    sorted.forEach((e, idx) => {
      const d = (e.date || '').slice(0, 10)
      if (!ittMap[d]) ittMap[d] = []
      ittMap[d].push({ segName: seg.name, elapsed_str: e.elapsed_str, is_pr: e.is_pr, attemptNum: idx + 1, total: sorted.length, rank: rankOf[e.activity_id], activityId: e.activity_id })
    })
  })

  function tabHTML() {
    return activeTabs.map(t => `
      <button class="sport-tab${t.key === activeTab ? ' active' : ''}" data-tab="${t.key}">${t.label}</button>
    `).join('')
  }
  function timelineHTML() {
    const t = activeTabs.find(t => t.key === activeTab)
    return renderTimeline(t?.list, activeTab, showMore[activeTab] || false, ittMap)
  }

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-left">
        <div class="avatar">
          <img src="docs/avatar_aespa.jpg" alt="SC"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <svg viewBox="0 0 24 24" style="display:none">${ICONS.ride}</svg>
        </div>
        <div class="hero-info">
          <h1>STEVE ✦</h1>
          <div class="hero-sub">Strava · Cyclist · Athlete</div>
        </div>
      </div>
      <div class="hero-right">
        <div class="aespa-brand">aespa</div>
        <div class="aespa-tagline">WELCOME TO MY WORLD</div>
        <button class="disc-open-btn" onclick="openDiscModal()"><span class="dico">◉</span> AESPACORE VIEW</button>
      </div>
    </div>

    ${renderMonthlySummary(data.monthly_summary)}
    ${renderMonthlyGoals(data.monthly_goals)}
    ${renderWeeklyQuest(data.weekly_quest)}
    ${renderSegments(data.segments)}

    ${history.length ? `
    <div class="monthly-chart">
      <div class="section-title"><span>✦</span> 月度里程分佈 <span style="color:rgba(168,85,247,.4);font-size:10px">· MONTHLY DISTANCE (KM)</span></div>
      <div class="chart-rows" id="chart-rows">
        ${(() => {
          const byYear = {}
          history.forEach(h => {
            const y = h.month.slice(0, 4)
            if (!byYear[y]) byYear[y] = []
            byYear[y].push(h)
          })
          const years = Object.keys(byYear).sort((a,b) => b.localeCompare(a))
          const currentYear = new Date().getFullYear().toString()
          return years.map(year => {
            const collapsed = year !== currentYear
            const rows = byYear[year].map(h => {
              const dist = monthDist(h)
              const pct = dist > 0 ? Math.max((dist / maxDist) * 100, 4) : 0
              return `
                <div class="chart-row">
                  <div class="chart-label">${fmtMonthLabel(h.month)}</div>
                  <div class="chart-bar-wrap">
                    <div class="chart-bar" data-pct="${pct}">
                      <span class="chart-bar-val">${dist}</span>
                    </div>
                  </div>
                  <div class="chart-unit-label">km</div>
                </div>
              `
            }).join('')
            return `
              <div class="chart-year-header" data-year="${year}">
                <span class="chart-year-arrow" id="arrow-${year}">${collapsed ? '▶' : '▼'}</span>
                ${year}
              </div>
              <div class="chart-year-rows" id="year-rows-${year}" style="max-height:${collapsed ? '0' : '9999px'}" data-collapsed="${collapsed ? '1' : ''}">
                ${rows}
              </div>
            `
          }).join('')
        })()}
      </div>
    </div>
    ` : ''}

    <div class="section-title"><span>✦</span> 活動紀錄 <span style="color:rgba(168,85,247,.4);font-size:10px">· ACTIVITY LOG</span></div>
    <div class="sport-tabs" id="sport-tabs">${tabHTML()}</div>
    <div class="timeline" id="timeline">${timelineHTML()}</div>

    <div class="totals-grid">
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_distance_km==='number'?s.all_time_distance_km.toLocaleString():s.all_time_distance_km??'—'}</div>
        <div class="total-label">Total KM</div>
      </div>
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_elevation_m==='number'?s.all_time_elevation_m.toLocaleString():s.all_time_elevation_m??'—'}</div>
        <div class="total-label">Total Elev</div>
      </div>
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_rides==='number'?s.all_time_rides.toLocaleString():s.all_time_rides??'—'}</div>
        <div class="total-label">Total Rides</div>
      </div>
    </div>

    <a class="strava-cta" href="https://www.strava.com/athletes/161539959" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
      View full profile on Strava
    </a>

    <div class="page-footer">
      <div class="footer-members">KARINA · GISELLE · WINTER · NINGNING</div>
      <div class="footer-aespa">aespa</div>
    </div>
  `

  // animate chart bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.chart-bar').forEach(bar => {
      const pct = bar.dataset.pct
      bar.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { bar.style.width = pct + '%' }, 80)
      })
    })
    // animate consistency bars
    document.querySelectorAll('.progress-fill').forEach(fill => {
      const pct = fill.dataset.pct
      fill.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { fill.style.width = pct + '%' }, 120)
      })
    })
  })

  // year collapse toggle
  const chartRows = document.getElementById('chart-rows')
  if (chartRows) {
    chartRows.addEventListener('click', e => {
      const header = e.target.closest('.chart-year-header')
      if (!header) return
      const year = header.dataset.year
      const rows = document.getElementById(`year-rows-${year}`)
      const arrow = document.getElementById(`arrow-${year}`)
      const isCollapsed = rows.dataset.collapsed === '1'
      if (isCollapsed) {
        rows.dataset.collapsed = ''
        rows.style.maxHeight = rows.scrollHeight + 'px'
        arrow.textContent = '▼'
        rows.querySelectorAll('.chart-bar').forEach(bar => {
          bar.style.width = '0'
          requestAnimationFrame(() => {
            setTimeout(() => { bar.style.width = bar.dataset.pct + '%' }, 60)
          })
        })
        setTimeout(() => { if (rows.dataset.collapsed !== '1') rows.style.maxHeight = '9999px' }, 400)
      } else {
        rows.style.maxHeight = rows.scrollHeight + 'px'
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            rows.style.maxHeight = '0'
            rows.dataset.collapsed = '1'
            arrow.textContent = '▶'
          })
        })
      }
    })
  }

  // seg row click → scroll to activity
  document.addEventListener('click', e => {
    const tr = e.target.closest('tr[data-date]')
    if (!tr) return
    const date = tr.dataset.date
    const actId = tr.dataset.actid || ''
    const actEl = document.getElementById('act-' + date)
    if (actEl) {
      actEl.scrollIntoView({ behavior: 'smooth', block: 'center' })
      actEl.classList.add('act-highlight')
      setTimeout(() => actEl.classList.remove('act-highlight'), 1500)
    } else {
      activeTab = 'all'
      showMore['all'] = true
      document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'all'))
      document.getElementById('timeline').innerHTML = timelineHTML()
      setTimeout(() => {
        const el = document.getElementById('act-' + date)
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' })
          el.classList.add('act-highlight')
          setTimeout(() => el.classList.remove('act-highlight'), 1500)
        } else {
          const toast = document.createElement('div')
          toast.innerHTML = actId
            ? `📅 ${date} 不在最近記錄 &nbsp;<a href="https://www.strava.com/activities/${actId}" target="_blank" style="color:#a855f7;font-weight:700;text-decoration:underline">前往 Strava ↗</a>`
            : `📅 ${date} 的活動不在最近記錄內`
          toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,8,40,.9);color:#a855f7;border:1px solid rgba(168,85,247,.4);padding:8px 18px;border-radius:8px;font-size:12px;letter-spacing:1px;z-index:9999'
          document.body.appendChild(toast)
          setTimeout(() => toast.remove(), 3500)
        }
      }, 80)
    }
  })

  // tab switching
  document.getElementById('sport-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.sport-tab')
    if (!btn) return
    activeTab = btn.dataset.tab
    document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab))
    document.getElementById('timeline').innerHTML = timelineHTML()
  })

  // show more
  document.getElementById('timeline').addEventListener('click', e => {
    if (e.target.id === 'show-more-btn') {
      showMore[activeTab] = true
      document.getElementById('timeline').innerHTML = timelineHTML()
    }
  })
}

/* ── fetch strava.json ── */
fetch('strava.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json() })
  .then(render)
  .catch(err => {
    document.getElementById('content').innerHTML = `
      <div class="loading" style="color:#a855f7">
        載入失敗：${err.message}<br><br>
        <span style="color:#555;font-size:12px">請先執行 GitHub Actions 產生 strava.json</span>
      </div>
    `
  })

/* ── Disc Modal ── */
function _discPopulate(data) {
  const s = data.summary || {}
  const history = (data.monthly_history || []).slice().reverse()

  // updated_at
  const upd = (data.updated_at || '').slice(0, 10)
  const updEl = document.getElementById('disc-upd')
  if (updEl) updEl.textContent = upd ? 'UPDATED ' + upd : 'UPDATED —'

  // ytd stats
  const fmtHr = v => {
    if (v == null || isNaN(+v)) return '—'
    const h = Math.floor(+v), m = Math.round((+v - h) * 60)
    return h > 0 ? (m > 0 ? `${h}h${m}m` : `${h}h`) : `${m}m`
  }
  const fmtNum = v => (typeof v === 'number') ? v.toLocaleString() : (v ?? '—')
  const totalActs = (+(s.ytd_rides||0)) + (+(s.ytd_runs||0)) + (+(s.ytd_swims||0))
  const stats = [
    { l:'今年里程', v: fmtNum(s.ytd_distance_km), u:'km' },
    { l:'今年爬升', v: fmtNum(s.ytd_elevation_m), u:'m' },
    { l:'今年活動', v: totalActs || '—', u:'次' },
    { l:'今年時數', v: fmtHr(s.ytd_moving_time_hr), u:'' },
  ]
  const statsEl = document.getElementById('disc-stats')
  if (statsEl) statsEl.innerHTML = stats.map(st =>
    `<div class="disc-stat">
      <div class="disc-stat-l">${st.l}</div>
      <div class="disc-stat-v">${st.v}</div>
      ${st.u ? `<div class="disc-stat-u">${st.u}</div>` : ''}
    </div>`
  ).join('')

  // mini chart: last 5 months ride distance
  const chartData = history.slice(-5)
  const maxD = Math.max(...chartData.map(h => (typeof h.ride === 'object' ? (h.ride.distance_km||0) : (h.distance_km||0))), 1)
  const chartEl = document.getElementById('disc-chart')
  if (chartEl) {
    chartEl.innerHTML = chartData.map(h => {
      const d = typeof h.ride === 'object' ? (h.ride.distance_km||0) : (h.distance_km||0)
      const barH = Math.max(Math.round((d / maxD) * 22), d > 0 ? 3 : 0)
      const label = (h.month || '').slice(5)
      return `<div class="disc-bar-wrap">
        <div class="disc-bar" style="height:${barH}px"></div>
        <div class="disc-bar-lbl">${label}</div>
      </div>`
    }).join('')
  }
}

function openDiscModal() {
  const modal = document.getElementById('disc-modal')
  const outer = document.getElementById('disc-outer')
  if (!modal) return
  outer.classList.remove('closing')
  // Read offsetWidth to flush pending style changes and restart the CSS animation
  const _reflow = outer.offsetWidth // eslint-disable-line no-unused-expressions
  modal.style.display = 'flex'
  modal.setAttribute('aria-hidden', 'false')
  document.body.classList.add('disc-open')
  if (_discData) _discPopulate(_discData)
}

function closeDiscModal() {
  const modal = document.getElementById('disc-modal')
  const outer = document.getElementById('disc-outer')
  if (!modal || modal.getAttribute('aria-hidden') === 'true') return
  const CLOSE_MS = 280  // must match discOut animation duration (0.28s)
  outer.classList.add('closing')
  document.body.classList.remove('disc-open')
  modal.setAttribute('aria-hidden', 'true')
  setTimeout(() => {
    modal.style.display = 'none'
    outer.classList.remove('closing')
  }, CLOSE_MS)
}

;(function(){
  document.getElementById('disc-bd').addEventListener('click', closeDiscModal)
  document.getElementById('disc-close').addEventListener('click', closeDiscModal)
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDiscModal()
  })
})()
