<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STEVE · Strava Cyclist (Maple)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --wood-1:#8a5a2b;
  --wood-2:#6b4220;
  --wood-3:#3e2410;
  --paper:#fff5d8;
  --paper-2:#ffe9b0;
  --grass-1:#7bd24a;
  --grass-2:#4ea832;
  --gold-1:#ffd84a;
  --gold-2:#e5a418;
  --sky-1:#7ec8ee;
  --sky-2:#a8dff5;
  --leaf:#3fa030;
  --ink:#2a1a08;
  --shadow:rgba(38,22,8,.25);
}
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
html,body{
  min-height:100%;
  font-family:'DotGothic16','Press Start 2P','Microsoft JhengHei',sans-serif;
  color:var(--ink);
  background: url('docs/maple_bg.png') center bottom/cover fixed no-repeat;
  letter-spacing:.5px;
}

/* dark overlay so text stays readable */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:rgba(0,0,0,.38);
}

/* pixel cloud field (CSS-only) */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 12% 14%, #fff 0 22px, transparent 23px),
    radial-gradient(circle at 18% 12%, #fff 0 18px, transparent 19px),
    radial-gradient(circle at 80% 10%, #fff 0 24px, transparent 25px),
    radial-gradient(circle at 86% 16%, #fff 0 18px, transparent 19px),
    radial-gradient(circle at 50% 6%,  #fff 0 16px, transparent 17px);
  opacity:.55;
}

/* floating items canvas */
#maple-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

#app{position:relative;z-index:2;max-width:780px;margin:0 auto;padding:14px 14px 60px}

/* ── pixel-frame mixin via box-shadow staircase ── */
.frame{
  background:var(--paper);
  border:3px solid var(--wood-3);
  border-radius:6px;
  box-shadow:
    0 0 0 3px var(--paper),
    0 0 0 6px var(--wood-3),
    6px 6px 0 6px var(--shadow);
  padding:14px 16px;
  margin-bottom:18px;
}

/* ── topbar ── */
.topbar{
  display:flex;align-items:center;gap:10px;
  background:var(--paper);
  border:3px solid var(--wood-3);
  border-radius:8px;
  padding:8px 12px;
  margin-bottom:14px;
  box-shadow:0 3px 0 var(--wood-3);
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--gold-1);border:2px solid var(--wood-3);
  border-radius:4px;padding:5px 10px;
  font-family:inherit;font-size:13px;color:var(--ink);
  text-decoration:none;cursor:pointer;
  box-shadow:0 2px 0 var(--wood-3);
}
.back-btn:hover{background:var(--gold-2)}
.topbar-title{font-size:12px;color:var(--wood-2);letter-spacing:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.topbar-spacer{flex:1}
.topbar-portal{font-size:18px}

/* ── hero (wooden sign) ── */
.hero{
  position:relative;
  background:
    repeating-linear-gradient(180deg, #a06a35 0 6px, #8a5a2b 6px 12px, #7a4d23 12px 18px);
  border:4px solid var(--wood-3);
  border-radius:10px;
  padding:18px 16px 16px;
  margin-bottom:18px;
  box-shadow:
    0 0 0 3px #5a3614,
    8px 8px 0 var(--shadow);
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:14px;align-items:center;
}
.hero::before,.hero::after{
  content:'🍁';position:absolute;font-size:22px;
}
.hero::before{top:-12px;left:14px;transform:rotate(-15deg)}
.hero::after{top:-10px;right:18px;transform:rotate(20deg)}

.hero-char{
  width:78px;height:78px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#7bd24a,#4ea832);
  border:3px solid var(--wood-3);border-radius:8px;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.18);
  font-size:42px;line-height:1;
  flex-shrink:0;
}
.hero-char img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.hero-name{
  text-align:center;
  text-shadow:2px 2px 0 var(--wood-3);
}
.hero-name h1{
  font-size:30px;color:var(--paper);
  letter-spacing:6px;font-weight:normal;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.hero-name .sub{
  margin-top:6px;font-size:11px;color:var(--gold-1);
  letter-spacing:3px;
}
.hero-name .sub::before{content:'✦ '}
.hero-name .sub::after{content:' ✦'}
.hero-portal{
  width:60px;height:60px;
  background:radial-gradient(circle, #6ee7ff 0 18px, #3b82f6 19px 26px, transparent 27px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;
  flex-shrink:0;
  filter:drop-shadow(0 0 6px rgba(110,231,255,.7));
}
.hero-updated{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  background:var(--paper);border:2px solid var(--wood-3);
  border-radius:4px;padding:2px 10px;
  font-size:10px;color:var(--wood-2);letter-spacing:1px;
  white-space:nowrap;
}

/* ── stats row ── */
.stats-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  align-items:end;
}
.stat-card{
  text-align:center;
  padding:4px 6px;
  border-right:2px dashed rgba(106,66,32,.25);
}
.stat-card:last-child{border-right:none}
.stat-card .stat-icon{font-size:18px;display:block;margin-bottom:2px}
.stat-card .stat-label{font-size:11px;color:var(--wood-2);letter-spacing:1px}
.stat-card .stat-val{font-size:22px;color:var(--ink);line-height:1.1;margin-top:4px;font-weight:normal}
.stat-card .stat-unit{font-size:10px;color:var(--wood-2);margin-top:2px}

/* ── monthly summary 左右並排 ── */
.ms-head{font-size:10px;color:var(--wood-2);letter-spacing:2px;margin-bottom:10px;text-align:center}
.ms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;align-items:start}
.ms-card{text-align:center;padding:6px 6px 8px;border-right:2px dashed rgba(106,66,32,.25)}
.ms-card:last-child{border-right:none}
.ms-metrics{display:flex;align-items:flex-start;gap:0;justify-content:center}
.ms-metric{flex:1;min-width:0;text-align:center}
.ms-metric .stat-val{font-size:22px;color:var(--ink);line-height:1.1;font-weight:bold}
.ms-metric .stat-unit{font-size:9px;color:var(--wood-2);margin-top:1px}
.ms-vdiv{width:1px;background:rgba(106,66,32,.2);align-self:stretch;margin:2px 4px 4px;flex-shrink:0}
.ms-card .ms-label{font-size:11px;color:var(--wood-3);letter-spacing:1px;font-weight:bold;margin-bottom:6px}

/* ── two column row (chart + goals) ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}

/* card with leaf header */
.section-head{
  display:flex;align-items:center;gap:6px;
  font-size:14px;color:var(--ink);letter-spacing:1px;
  margin-bottom:10px;
  padding-bottom:6px;
  border-bottom:2px dashed rgba(106,66,32,.3);
}
.section-head .ico{font-size:16px}
.section-head .right{margin-left:auto;font-size:10px;color:var(--wood-2);letter-spacing:1px}

/* ── monthly bar chart (本月里程分佈) ── */
.bar-chart{
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:6px;
  height:170px;
}
.bar-chart-grid{
  position:relative;
  border-left:2px solid var(--wood-2);
  border-bottom:2px solid var(--wood-2);
  margin:8px 4px 0 28px;
  height:120px;
}
.bar-chart-y{
  position:absolute;left:-26px;top:0;bottom:0;width:24px;
  display:flex;flex-direction:column;justify-content:space-between;
  font-size:9px;color:var(--wood-2);text-align:right;
  padding-right:4px;
}
.bar-chart-bars{
  position:absolute;inset:0;
  display:flex;align-items:flex-end;justify-content:space-around;
  padding:0 8px;
}
.bar-col{
  width:14%;height:100%;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
  position:relative;
}
.bar-col .bar{
  width:100%;
  background:linear-gradient(180deg,#9be466 0%,#5ab832 100%);
  border:2px solid var(--wood-3);border-bottom:none;
  border-radius:3px 3px 0 0;
  transition:height .8s cubic-bezier(.25,.46,.45,.94);
  height:0;
}
.bar-col.current .bar{
  background:linear-gradient(180deg,var(--gold-1),var(--gold-2));
}
.bar-col .bar-val{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--wood-3);white-space:nowrap;
}
.bar-chart-x{
  display:flex;justify-content:space-around;
  font-size:11px;color:var(--wood-2);
  margin-top:4px;padding:0 8px 0 32px;
}
.bar-chart-x span{width:14%;text-align:center}
.bar-unit-hint{font-size:9px;color:var(--wood-2);text-align:right}

/* ── monthly goals (CLEAR! badges) ── */
.goals-list{display:flex;flex-direction:column;gap:8px}
.goal-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;
}
.goal-row .gico{font-size:18px;width:22px;text-align:center}
.goal-row .gname{font-size:12px;color:var(--ink);min-width:46px}
.goal-row .gname .gcount{font-size:11px;color:var(--wood-2);margin-left:3px}
.goal-row .gbar{
  position:relative;height:12px;
  background:#e6d2a0;border:2px solid var(--wood-3);border-radius:8px;
  overflow:hidden;
}
.goal-row .gfill{
  height:100%;width:0;
  transition:width .8s cubic-bezier(.25,.46,.45,.94);
}
.gfill.danger{background:linear-gradient(90deg,#d04848,#e87070)}
.gfill.warning{background:linear-gradient(90deg,#e0a020,#f0c050)}
.gfill.done{background:linear-gradient(90deg,#4ea832,#7bd24a)}
.gfill.over{background:linear-gradient(90deg,#e88030,#f0a050)}
.goal-row .gbadge{
  font-family:'Press Start 2P',inherit;
  font-size:9px;letter-spacing:1px;
  background:var(--gold-1);color:var(--wood-3);
  border:2px solid var(--wood-3);border-radius:4px;
  padding:4px 6px;
  box-shadow:0 2px 0 var(--wood-3);
  white-space:nowrap;
}
.gbadge.danger{background:#f0c0c0}
.gbadge.warning{background:#f0e0a0}
.gbadge.done,.gbadge.over{background:var(--gold-1)}

/* ── ITT segments ── */
.seg-frame{margin-bottom:1.5rem}
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.seg-grid{grid-template-columns:1fr}}
.seg-card{background:var(--paper);border:3px solid var(--wood-2);border-radius:6px;padding:.8rem;box-shadow:0 3px 0 var(--wood-3)}
.seg-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.seg-name{font-size:11px;font-weight:700;color:var(--ink);letter-spacing:1px;line-height:1.3}
.seg-dist{font-size:9px;color:var(--wood-1);margin-top:2px;letter-spacing:1px}
.seg-pr-badge{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:.5rem}
.seg-pr-time{font-family:'Press Start 2P',inherit;font-size:13px;font-weight:700;color:#c54a0d}
.seg-pr-label{font-size:7px;color:var(--wood-1);letter-spacing:2px;text-transform:uppercase}
.seg-table{width:100%;border-collapse:collapse;font-size:11px}
.seg-table th{color:var(--wood-2);font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 8px 5px 0;border-bottom:2px solid var(--wood-2);text-align:left}
.seg-table th:not(:first-child){text-align:right;padding-left:8px}
.seg-table td{padding:6px 8px 6px 0;color:var(--ink);border-bottom:1px solid var(--paper-2);vertical-align:middle}
.seg-table td:not(:first-child){text-align:right;padding-left:8px}
.seg-row-pr td{color:#c54a0d !important;font-weight:700}
.seg-more-wrap{margin-top:0}
.seg-fade{height:30px;margin-top:-30px;background:linear-gradient(transparent,#fff5d8);pointer-events:none}
.seg-more-btn{width:100%;padding:5px 0;background:transparent;border:none;border-top:2px solid var(--wood-2);color:var(--wood-2);font-size:10px;cursor:pointer;letter-spacing:1px;margin-top:2px;display:block;font-family:inherit}
.seg-more-btn:hover{color:var(--wood-1)}
.seg-crown{font-size:11px;margin-right:3px}
.seg-time-pr{color:#c54a0d !important}

/* ── weekly quest ── */
.quest-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.quest-tile{
  background:#e6d2a0;
  border:3px solid var(--wood-3);border-radius:8px;
  padding:10px 6px;
  text-align:center;
  box-shadow:0 3px 0 var(--wood-3);
}
.quest-tile .qico{font-size:26px;display:block;line-height:1}
.quest-tile .qlabel{font-size:13px;color:var(--ink);margin-top:4px;letter-spacing:2px}
.quest-tile .qstamp{
  display:inline-block;margin-top:6px;
  font-family:'Press Start 2P',inherit;font-size:8px;
  padding:3px 6px;border-radius:3px;border:2px solid;
  letter-spacing:1px;
}
.quest-tile.done .qstamp{
  background:#c8f0b8;color:#1d6420;border-color:#1d6420;
}
.quest-tile.todo{opacity:.55;filter:saturate(.5)}
.quest-tile.todo .qstamp{
  background:#e0e0e0;color:#666;border-color:#666;
}
.quest-tile .qprog-wrap{margin:7px auto 0;width:80%;height:3px;border-radius:3px;background:rgba(100,80,40,.15)}
.quest-tile .qprog-fill{height:100%;border-radius:3px;background:rgba(100,80,40,.5);transition:width .6s ease}
.quest-tile .qpct{font-size:8px;margin-top:3px;color:rgba(100,80,40,.55);letter-spacing:.5px;font-family:inherit}

/* ── activity log timeline ── */
.timeline{position:relative;padding-left:22px;margin-top:6px}
.timeline::before{
  content:'';position:absolute;left:6px;top:6px;bottom:6px;
  width:3px;background:var(--gold-2);
  border-radius:2px;
}
.timeline-day{position:relative;margin-bottom:10px}
.timeline-date{
  display:inline-block;font-family:'Press Start 2P',inherit;
  font-size:10px;background:var(--gold-1);color:var(--wood-3);
  border:2px solid var(--wood-3);border-radius:4px;
  padding:3px 8px;margin-bottom:6px;margin-left:4px;
  position:relative;
  box-shadow:0 2px 0 var(--wood-3);
  letter-spacing:1px;
}
.timeline-day::before{
  content:'';position:absolute;left:-12px;top:8px;
  width:11px;height:11px;border-radius:50%;
  background:var(--gold-1);border:2px solid var(--wood-3);
  z-index:1;
}
.act-card{
  display:flex;align-items:flex-start;gap:10px;
  background:#fff5d8;border:2px solid var(--wood-3);border-radius:8px;
  padding:8px 12px;margin-bottom:6px;
  box-shadow:0 2px 0 var(--wood-3);
}
.act-icon{
  width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:#e6d2a0;border:2px solid var(--wood-3);border-radius:6px;
  font-size:20px;
}
.act-info{flex:1;min-width:0}
.act-name{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.indoor-tag,.bike-tag{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;line-height:1;border-radius:2px;padding:2px 5px 2px 4px;vertical-align:middle;margin-right:4px;flex-shrink:0;white-space:nowrap}
.indoor-tag{background:rgba(138,90,43,.12);color:var(--wood-1);border:1px solid rgba(138,90,43,.3)}
.bike-tag{background:rgba(125,210,74,.1);color:var(--grass-2);border:1px solid rgba(125,210,74,.35)}
.act-meta{font-size:10px;color:var(--wood-2);margin-top:2px;letter-spacing:.5px}
.act-meta .sep{margin:0 5px;color:#c0a070}
.act-dist{
  font-family:'Press Start 2P',inherit;font-size:16px;
  color:#c54a0d;flex-shrink:0;white-space:nowrap;letter-spacing:1px;padding-top:2px;line-height:1;
}
.act-dist small{font-size:9px;color:var(--wood-2);margin-left:2px}
/* act highlight flash & strava link */
.act-highlight{animation:actFlash .9s ease-out}
@keyframes actFlash{0%,40%{background:#ffe8b0;border-color:#e87a30}100%{background:#fff5d8;border-color:var(--wood-3)}}
.act-strava-link{display:inline-flex;align-items:center;gap:2px;flex-shrink:0;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;color:rgba(165,90,30,.95);text-decoration:none;border:1px solid rgba(165,90,30,.45);background:rgba(165,90,30,.1);white-space:nowrap;line-height:1.4;transition:background .15s,border-color .15s}
.act-strava-link:hover{background:rgba(165,90,30,.22);border-color:#c54a0d}
.act-name-wrap{display:flex;align-items:center;gap:8px;min-width:0}
.lap-toggle{background:transparent;border:none;color:rgba(165,90,30,.6);font-size:10px;cursor:pointer;padding:2px 4px;letter-spacing:.5px;display:inline-block}
.lap-toggle:hover{color:#c54a0d}

/* lap strip (cycling only) */
.act-lap{
  margin-top:6px;padding:3px 8px;
  background:rgba(255,216,74,.25);
  border:1px dashed var(--wood-2);border-radius:4px;
  font-size:10px;color:var(--wood-3);
  display:flex;flex-wrap:wrap;gap:6px;
}
.act-lap .lap-name{color:#a04018;font-weight:bold}

.show-more-btn{
  width:100%;font-family:inherit;font-size:12px;
  background:var(--gold-1);color:var(--wood-3);
  border:2px solid var(--wood-3);border-radius:6px;
  padding:8px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 3px 0 var(--wood-3);
  margin-top:6px;
}
.show-more-btn:hover{background:var(--gold-2)}

/* ITT inline badge in activity log */
.itt-badge{display:flex;align-items:center;gap:10px;padding:5px 10px 6px 10px;border-left:3px solid rgba(165,90,30,.25);margin:4px 0 0;background:rgba(165,90,30,.04);border-radius:0 5px 5px 0}
.itt-badge.pr{background:rgba(197,74,13,.1);border-left-color:#c54a0d}
.itt-crown{font-size:16px;line-height:1;flex-shrink:0}
.itt-info{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.itt-seg-name{font-size:9px;color:var(--wood-2);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itt-badge.pr .itt-seg-name{color:rgba(197,74,13,.65)}
.itt-time{font-size:12px;font-weight:700;color:#c54a0d;line-height:1}
.itt-attempt{font-size:9px;color:var(--wood-2);letter-spacing:.5px}
.itt-badge.pr .itt-attempt{color:rgba(197,74,13,.55)}

/* sport tabs */
.sport-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.sport-tab{
  font-family:inherit;font-size:12px;
  background:#e6d2a0;color:var(--wood-3);
  border:2px solid var(--wood-3);border-radius:6px;
  padding:5px 10px;cursor:pointer;
  box-shadow:0 2px 0 var(--wood-3);
}
.sport-tab.active{background:var(--gold-1);transform:translateY(1px);box-shadow:0 1px 0 var(--wood-3)}

/* footer image area (decoration anchor) */
.deco-floor{
  display:flex;justify-content:space-between;align-items:flex-end;
  font-size:32px;margin:14px 4px 0;
}
.deco-floor .grass{font-size:18px;color:var(--leaf)}

.empty{font-size:12px;color:var(--wood-2);padding:20px;text-align:center}
.loading{
  text-align:center;padding:60px 0;color:var(--wood-3);
  font-size:14px;letter-spacing:2px;
}
@media(max-width:640px){
  #app{padding:12px 12px 60px}
  .frame{padding:12px;margin-bottom:16px}
  .hero{grid-template-columns:1fr;text-align:center;padding:16px 12px}
  .hero-char,.hero-portal{margin:0 auto}
  .hero-name h1{font-size:24px;letter-spacing:4px}
  .stats-grid,.ms-grid{grid-template-columns:repeat(2,1fr)}
  .stat-card:nth-child(2),.ms-card:nth-child(2){border-right:none}
  .stat-card:nth-child(-n+2),.ms-card:nth-child(-n+2){border-bottom:2px dashed rgba(106,66,32,.25)}
  .quest-row{grid-template-columns:repeat(2,1fr)}
  .act-card{gap:8px;padding:8px 10px}
  .act-name-wrap{flex-wrap:wrap}
  .itt-badge{align-items:flex-start}
}
@media(max-width:420px){
  .topbar{flex-wrap:wrap;padding:8px 10px}
  .topbar-title{flex:1;min-width:0}
  .topbar-portal{display:none}
  .hero-name h1{font-size:20px;letter-spacing:3px}
  .stats-grid,.ms-grid,.quest-row{grid-template-columns:1fr}
  .stat-card,.ms-card{border-right:none;border-bottom:2px dashed rgba(106,66,32,.25)}
  .stat-card:last-child,.ms-card:last-child{border-bottom:none}
  .timeline{padding-left:14px}
  .timeline::before{left:4px}
  .timeline-day::before{left:-9px}
  .act-card{align-items:flex-start}
  .act-icon{width:30px;height:30px;font-size:18px}
  .act-dist{font-size:13px;margin-left:auto}
  .itt-attempt{text-align:right;max-width:38%}
  #theme-switcher{right:12px;bottom:18px}
  #ts-toggle{width:38px;height:38px}
  #ts-panel{max-width:calc(100vw - 24px)}
  #to-top-btn{right:14px!important;bottom:74px!important}
}

.strava-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:12px;border-radius:8px;
  background:#fc4c02;border:3px solid var(--wood-3);color:#fff;

.pixel-img{image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>
<body>

<canvas id="maple-canvas"></canvas>

<div id="app">
  <div class="topbar">
    <a class="back-btn" href="javascript:history.length>1?history.back():location.href='linkTreeIndex.html'">← BACK</a>
    <span class="topbar-title">MAPLE WORLD · STRAVA</span>
    <span class="topbar-spacer"></span>
    <span class="topbar-portal">🍄</span>
  </div>

  <div id="content"><div class="loading">⛏ Loading adventurer data…</div></div>
</div>

<script>
/* ── maple floating canvas ── */
;(function(){
  const c=document.getElementById('maple-canvas'),ctx=c.getContext('2d')
  let W,H,items=[],t=0
  // sprite emojis & pixel chars to fly around
  const SPRITES=['🍁','🍂','🍀','🌿','⭐','💛','🌸','🍄','✨','🌟']
  const PIXEL=['♦','◆','▲','◇','✦']
  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight }
  function initItems(){
    items=[]
    const n=Math.min(28, Math.floor(W*H/18000)+8)
    for(let i=0;i<n;i++){
      const isSprite=Math.random()>.4
      items.push({
        x:Math.random()*W,
        y:Math.random()*H,
        ch: isSprite ? SPRITES[Math.floor(Math.random()*SPRITES.length)]
                     : PIXEL[Math.floor(Math.random()*PIXEL.length)],
        sz: isSprite ? Math.floor(Math.random()*14+10) : Math.floor(Math.random()*12+8),
        a: Math.random()*.7+.15,
        da:(Math.random()-.5)*.008,
        speed:Math.random()*.55+.2,
        dx:(Math.random()-.5)*.35,
        rot:Math.random()*Math.PI*2,
        drot:(Math.random()-.5)*.025,
        swing:Math.random()*Math.PI*2,
        swingAmp:Math.random()*1.5+.5,
        swingFreq:Math.random()*.03+.01,
        isSprite
      })
    }
  }
  function draw(){
    ctx.clearRect(0,0,W,H)
    t+=.016
    items.forEach(it=>{
      it.a+=it.da; if(it.a<.06||it.a>.9)it.da*=-1
      it.y+=it.speed
      it.x+=it.dx+Math.sin(t*it.swingFreq+it.swing)*it.swingAmp
      it.rot+=it.drot
      if(it.y>H+40){ it.y=-30; it.x=Math.random()*W }
      if(it.x<-50) it.x=W+30
      if(it.x>W+50) it.x=-30
      ctx.save()
      ctx.globalAlpha=it.a
      ctx.translate(it.x,it.y)
      if(!it.isSprite) ctx.rotate(it.rot)
      if(it.isSprite){
        ctx.font=`${it.sz}px serif`
        ctx.fillText(it.ch,0,0)
      } else {
        ctx.font=`bold ${it.sz}px monospace`
        ctx.fillStyle='rgba(255,220,80,.9)'
        ctx.fillText(it.ch,0,0)
      }
      ctx.restore()
    })
    requestAnimationFrame(draw)
  }
  resize(); initItems(); draw()
  addEventListener('resize',()=>{ resize(); initItems() })
})()

/* ── helpers ── */
function toggleLaps(btn, gid) {
  const els = [...document.querySelectorAll('[data-lapgrp="' + gid + '"]')]
  if (!els.length) return
  const show = els[0].style.display === 'none'
  els.forEach(e => { e.style.display = show ? '' : 'none' })
  btn.textContent = show ? '▲ 收起' : '▼ +' + els.length + ' 分段'
}
function fmtMovingTime(hr) {
  const totalMin = Math.max(0, Math.round((hr || 0) * 60))
  if (totalMin < 60) return `${totalMin} 分`
  const h = Math.floor(totalMin / 60)
  const m = totalMin % 60
  return m === 0 ? `${h} 小時` : `${h} 小時 ${m} 分`
}
const SPORT_META = {
  ride:   { icon:'🚴', label:'單車' },
  run:    { icon:'🏃', label:'跑步' },
  swim:   { icon:'🏊', label:'游泳' },
  weight: { icon:'🏋️', label:'重訓' },
}
const INDOOR_TAG = '<span class="indoor-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/><line x1="12" y1="9.5" x2="12" y2="3"/><line x1="12" y1="14.5" x2="12" y2="21"/><line x1="9.5" y1="12" x2="3" y2="12"/><line x1="14.5" y1="12" x2="21" y2="12"/></svg>飛輪機</span>'
const BIKE_TAG   = '<span class="bike-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15.5,8.5 22,9.5 17,14.5 18.5,22 12,18.5 5.5,22 7,14.5 2,9.5 8.5,8.5"/></svg>TCR Pro 0</span>'
const STATUS_TEXT = { danger:'TRAIN!', warning:'KEEP!', done:'CLEAR!', over:'BONUS!' }

function fmtDate(d){ const [,mm,dd]=d.split('-'); return `${+mm} / ${+dd}` }

/* ── renderers ── */
function renderHero(updatedAt){
  return `
    <div class="hero">
      <div class="hero-char">
        <img class="pixel-img" src="docs/maple-char.png" alt=""
             onerror="this.style.display='none';this.parentElement.innerHTML='🚴'">
      </div>
      <div class="hero-name">
        <h1>STEVE</h1>
        <div class="sub">STRAVA CYCLIST</div>
      </div>
      <div class="hero-portal">🌀</div>
      <div class="hero-updated">UPDATED ${(updatedAt||'').slice(0,10) || '—'}</div>
    </div>`
}

function renderStats(s){
  s = s || {}
  return `
    <div class="frame">
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">🚴</span><div class="stat-label">總距離</div><div class="stat-val">${(s.all_time_distance_km ?? 0).toLocaleString()}</div><div class="stat-unit">km</div></div>
        <div class="stat-card"><span class="stat-icon">⛰</span><div class="stat-label">總爬升</div><div class="stat-val">${(s.all_time_elevation_m ?? 0).toLocaleString()}</div><div class="stat-unit">m</div></div>
        <div class="stat-card"><span class="stat-icon">🏆</span><div class="stat-label">總騎乘次數</div><div class="stat-val">${(s.all_time_rides ?? 0).toLocaleString()}</div><div class="stat-unit">次</div></div>
        <div class="stat-card"><span class="stat-icon">⏱</span><div class="stat-label">總時數</div><div class="stat-val">${(s.ytd_moving_time_hr ?? 0).toLocaleString()}</div><div class="stat-unit">hrs (YTD)</div></div>
      </div>
    </div>`
}

/* monthly distance chart (current year only, last 4 months) */
function renderMonthlySummary(ms) {
  if (!ms) return ''
  const m = (v, u) => `<div class="ms-metric"><div class="stat-val">${v}</div><div class="stat-unit">${u}</div></div>`
  const div = '<div class="ms-vdiv"></div>'
  const hr = v => v != null ? v : '—'
  return `
    <div class="frame">
      <div class="ms-head">🍁 本月訓練量 · MONTHLY SUMMARY</div>
      <div class="ms-grid">
        <div class="ms-card"><div class="ms-label">🚴 單車</div><div class="ms-metrics">${m((+(ms.ride_km??0)).toFixed(1),'km')}${div}${m(hr(ms.ride_hr),'hr')}</div></div>
        <div class="ms-card"><div class="ms-label">🏃 跑步</div><div class="ms-metrics">${m((+(ms.run_km??0)).toFixed(1),'km')}${div}${m(hr(ms.run_hr),'hr')}</div></div>
        <div class="ms-card"><div class="ms-label">🏔️ 游泳</div><div class="ms-metrics">${m(ms.swim_m??0,'m')}${div}${m(hr(ms.swim_hr),'hr')}</div></div>
        <div class="ms-card"><div class="ms-label">🏋️ 重訓</div><div class="ms-metrics">${m(ms.weight_count??0,'次')}${div}${m(hr(ms.weight_hr),'hr')}</div></div>
      </div>
    </div>`
}

function renderMonthChart(history){
  // take current year, last 4 months including current
  const now = new Date(Date.now() + 8*3600*1000)
  const tY = now.getUTCFullYear(), tM = now.getUTCMonth()+1
  const months = []
  for (let i=3;i>=0;i--){
    const m = tM - i
    if (m < 1) continue
    const key = `${tY}-${String(m).padStart(2,'0')}`
    const h = (history||[]).find(x => x.month === key)
    const dist = h ? (h.ride?.distance_km || 0) : 0
    months.push({ label:String(m).padStart(2,'0'), dist, current:i===0 })
  }
  if (months.length === 0) return ''
  const max = Math.max(...months.map(x=>x.dist), 1)
  // round max up to nice value
  const ceil = max < 200 ? 200 : max < 400 ? 400 : max < 600 ? 600 : Math.ceil(max/200)*200
  const ticks = [ceil, Math.round(ceil*0.75), Math.round(ceil*0.5), Math.round(ceil*0.25), 0]

  const bars = months.map(m => `
    <div class="bar-col ${m.current?'current':''}">
      <div class="bar-val">${m.dist}</div>
      <div class="bar" data-h="${(m.dist/ceil)*100}"></div>
    </div>`).join('')
  const xLabels = months.map(m => `<span>${m.label}</span>`).join('')

  return `
    <div class="frame">
      <div class="section-head"><span class="ico">🍃</span>本月里程分佈<span class="right">單位 : km</span></div>
      <div class="bar-chart">
        <div></div>
        <div class="bar-chart-grid">
          <div class="bar-chart-y">${ticks.map(t=>`<div>${t}</div>`).join('')}</div>
          <div class="bar-chart-bars">${bars}</div>
        </div>
        <div class="bar-chart-x">${xLabels}</div>
      </div>
    </div>`
}

function renderGoals(mg){
  if (!mg) return ''
  const order = ['ride','run','swim','weight']
  const rows = order.map(k => {
    const g = mg[k]; if (!g) return ''
    const meta = SPORT_META[k]
    const pct = Math.min(100, g.target>0 ? (g.count/g.target)*100 : 0)
    const stamp = STATUS_TEXT[g.status] || 'TRAIN!'
    return `
      <div class="goal-row">
        <span class="gico">${meta.icon}</span>
        <div>
          <span class="gname">${meta.label} <span class="gcount">${g.count}/${g.target}</span></span>
          <div class="gbar"><div class="gfill ${g.status}" data-pct="${pct}"></div></div>
        </div>
        <span class="gbadge ${g.status}">${stamp}</span>
      </div>`
  }).join('')
  return `
    <div class="frame">
      <div class="section-head"><span class="ico">🎯</span>月度目標進度</div>
      <div class="goals-list">${rows}</div>
    </div>`
}

function renderSegments(segs) {
  if (!segs || segs.length === 0) return ''
  const _today = new Date(Date.now() + 8*3600*1000).toISOString().slice(0,10)
  const _sincePRLine = (efforts) => {
    const pr = efforts.find(e => e.is_pr)
    if (!pr || !pr.date) return ''
    const d = Math.max(0, Math.round((Date.parse(_today) - Date.parse(pr.date.slice(0,10))) / 86400000))
    if (d === 0) return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:linear-gradient(90deg,rgba(255,193,7,.22),rgba(255,193,7,.04));border-left:3px solid #ffc107;border-radius:4px;letter-spacing:.5px;color:#fff3c4">⭐ 今天爆击最快紀錄！</div>`
    return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:rgba(0,0,0,.45);border-left:3px solid #ffc107;border-radius:4px;letter-spacing:.5px;color:#ffffff;text-shadow:0 1px 5px rgba(0,0,0,.9)">⏱ 距BOSS記錄已 <b style="font-weight:700;color:#ffd740">${d}</b> 天</div>`
  }
  const cards = segs.map(seg => {
    const rowArr = seg.efforts.map(e => {
      const crown = e.is_pr ? '<span class="seg-crown">👑</span>' : ''
      const watts = e.avg_watts ? `${e.avg_watts}W` : '—'
      const hr    = e.avg_heartrate ? `${e.avg_heartrate}` : '—'
      return `<tr class="${e.is_pr ? 'seg-row-pr' : ''}" data-date="${(e.date||'').slice(0,10)}" data-actid="${e.activity_id || ''}" style="cursor:pointer" title="跳至活動紀錄">
        <td>${e.date.slice(5).split('-').map(Number).join('/')}</td>
        <td class="${e.is_pr ? 'seg-time-pr' : ''}">${crown}${e.elapsed_str}</td>
        <td>${watts}</td>
        <td>${hr}</td>
      </tr>`
    })
    const visRows  = rowArr.slice(0, 2).join('')
    const moreRows = rowArr.slice(2).join('')
    const extraTbody = moreRows ? `<tbody class="seg-extra" style="display:none">${moreRows}</tbody>` : ''
    const moreWrap   = moreRows ? `<div class="seg-more-wrap"><div class="seg-fade"></div><button class="seg-more-btn" onclick="var c=this.closest('.seg-card');c.querySelector('.seg-extra').style.display='';this.closest('.seg-more-wrap').remove()">▼ 全部 ${rowArr.length} 筆</button></div>` : ''
    return `<div class="seg-card">
      <div class="seg-header">
        <div><div class="seg-name">${seg.name}</div><div class="seg-dist">${seg.distance_km} km</div></div>
        ${seg.pr_time_str ? `<div class="seg-pr-badge"><div class="seg-pr-time">${seg.pr_time_str}</div><div class="seg-pr-label">PR</div></div>` : ''}
      </div>
      ${_sincePRLine(seg.efforts)}
      <table class="seg-table"><thead><tr><th>日期</th><th>時間</th><th>功率</th><th>HR</th></tr></thead><tbody>${visRows}</tbody>${extraTbody}</table>${moreWrap}
    </div>`
  }).join('')
  return `
    <div class="frame seg-frame">
      <div class="section-head"><span class="ico">🏍️</span>ITT 區間</div>
      <div class="seg-grid">${cards}</div>
    </div>`
}

function renderQuest(wq){
  if (!wq) return ''
  const order = ['ride','run','swim','weight']
  const targetLabels = {ride:'30km / 1hr', run:'10km / 1hr', swim:'1000m', weight:'1 次'}
  function isDone(val) { return typeof val === 'object' ? val.done : !!val }
  function getPct(key, val) {
    if (typeof val !== 'object') return val ? 100 : 0
    if (key==='ride'||key==='run') { const bd=val.target_km>0?(val.distance_km||0)/val.target_km:0; const bt=val.target_hr>0?(val.moving_time_hr||0)/val.target_hr:0; return Math.min(100,Math.round(Math.max(bd,bt)*100)) }
    if (key==='swim') return Math.min(100,Math.round((val.distance_m||0)/val.target_m*100))
    if (key==='weight') return val.count>=val.target?100:0
    return 0
  }
  function getDetail(key, val) {
    if (typeof val !== 'object') return ''
    if (key==='ride'||key==='run') { const bd=val.target_km>0?(val.distance_km||0)/val.target_km:0; const bt=val.target_hr>0?(val.moving_time_hr||0)/val.target_hr:0; return bd>=bt?`${val.distance_km||0}km`:`${val.moving_time_hr||0}hr` }
    if (key==='swim') return `${val.distance_m||0}m`
    if (key==='weight') return `${val.count||0} 次`
    return ''
  }
  const tiles = order.map(k => {
    const meta = SPORT_META[k], val = wq[k], on = isDone(val)
    const pct = getPct(k, val), detail = getDetail(k, val)
    const progHtml = !on ? `
      <div class="qprog-wrap"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <div class="qpct">${detail ? `${detail} · ` : ''}${pct}%</div>` : ''
    return `
      <div class="quest-tile ${on?'done':'todo'}">
        <span class="qico">${meta.icon}</span>
        <div class="qlabel">${meta.label}</div>
        <span class="qstamp">${on ? '✅COMPLETE!' : `⬜ ${targetLabels[k]}`}</span>
        ${progHtml}
      </div>`
  }).join('')
  return `
    <div class="frame">
      <div class="section-head"><span class="ico">🍁</span>本週任務</div>
      <div class="quest-row">${tiles}</div>
    </div>`
}

function groupByDate(list){
  const map={}; (list||[]).forEach(a=>{ const d=(a.date||'').slice(0,10); (map[d]=map[d]||[]).push(a) })
  return Object.entries(map)
    .sort((a,b)=>b[0].localeCompare(a[0]))
    .map(([d,acts])=>[d, acts.slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''))])
}

function renderTimeline(list, type, expanded, ittMap){
  if (!list || !list.length) return '<div class="empty">暫無資料</div>'
  const isAll = type === 'all'
  const groups = groupByDate(list)
  const LIMIT = 6
  const hasMore = !expanded && groups.length > LIMIT
  const visible = hasMore ? groups.slice(0, LIMIT) : groups

  const html = visible.map(([date, acts]) => `
    <div class="timeline-day" id="act-${date}">
      <div class="timeline-date">${fmtDate(date)}</div>
      ${acts.map(a => {
        const aType = isAll ? (a._type || 'ride') : type
        const meta = SPORT_META[aType] || SPORT_META.ride
        const aIsWeight = aType === 'weight'
        const aIsSwim   = aType === 'swim'
        const aIsRun    = aType === 'run'
        const aIsRide   = aType === 'ride'
        const metas = []
        if (aIsSwim && a.distance_km) metas.push(`🏊 ${Math.round(a.distance_km * 1000)} m`)
        if (aIsRide && a.avg_speed_kmh)  metas.push(`${a.avg_speed_kmh} km/h`)
        if (aIsRun  && a.avg_pace_km)    metas.push(`${a.avg_pace_km}/km`)
        if (aIsSwim && a.pace_per_100m)  metas.push(`${a.pace_per_100m}/100m`)
        if (!aIsWeight && !aIsSwim && a.elevation_m >= 100) metas.push(`${a.elevation_m} m`)
        if (a.avg_heartrate)             metas.push(`♥ ${a.avg_heartrate}`)
        metas.push(fmtMovingTime(a.moving_time_hr || 0))
        const lapArr = (aIsRide && a.top_laps) ? a.top_laps.slice(0, 10) : []
        const lapHtml = lapArr.length ? (() => {
          const lid = a.id || Math.floor(Date.now()*Math.random())
          const mkLap = l => `<div class="act-lap"><span class="lap-name">🏁 ${l.name}</span><span>⏱ ${l.moving_time_str}</span>${l.average_heartrate?`<span>♥ ${l.average_heartrate}</span>`:''}${l.average_watts?`<span>⚡ ${l.average_watts}W</span>`:''}</div>`
          const vis = lapArr.slice(0,3).map(mkLap).join('')
          const hidLaps = lapArr.slice(3)
          if (!hidLaps.length) return vis
          return vis + hidLaps.map(l=>mkLap(l).replace('<div class="act-lap">',`<div class="act-lap" data-lapgrp="${lid}" style="display:none">`)).join('') +
            `<button class="lap-toggle" onclick="toggleLaps(this,'${lid}')">▼ +${hidLaps.length} 分段</button>`
        })() : ''
        const dist = aIsWeight ? '' :
          aIsSwim && a.distance_km ? `<div class="act-dist">${Math.round(a.distance_km*1000)}<small>m</small></div>` :
          a.distance_km ? `<div class="act-dist">${a.distance_km}<small>km</small></div>` : ''
        const stravaLink = a.id ? `<a class="act-strava-link" href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">Strava ↗</a>` : ''
        const ittBadges = (aIsRide && ittMap && ittMap[date])
          ? ittMap[date].map(it => {
              const isPr = it.is_pr
              const crown = isPr ? '👑' : `<span style="font-size:11px;color:#888">#${it.attemptNum}</span>`
              const rankStr = it.rank ? (it.rank === 1 ? '🥇 第1名' : `第${it.rank}名`) : ''
              const attempt = isPr ? `第${it.attemptNum}次 · 🏆 PR ${rankStr}` : `第${it.attemptNum} / ${it.total} 次 · ${rankStr}`
              return `<div class="itt-badge${isPr ? ' pr' : ''}">
                <div class="itt-crown">${crown}</div>
                <div class="itt-info">
                  <div class="itt-seg-name">${it.segName}</div>
                  <div class="itt-time">${it.elapsed_str}</div>
                </div>
                <div class="itt-attempt">${attempt}</div>
              </div>`
            }).join('')
          : ''
        return `
          <div class="act-card">
            <div class="act-icon">${meta.icon}</div>
            <div class="act-info">
              <div class="act-name-wrap"><div class="act-name">${a.trainer ? INDOOR_TAG : (aIsRide ? BIKE_TAG : '')}${a.name || '—'}</div>${stravaLink}</div>
              <div class="act-meta">${metas.join('<span class="sep">·</span>')}</div>
              ${lapHtml}
              ${ittBadges}
            </div>
            ${dist}
          </div>`
      }).join('')}
    </div>
  `).join('')
  return html + (hasMore ? `<button class="show-more-btn" id="show-more-btn">▼ 顯示全部 ${groups.length} 天</button>` : '')
}

/* ── main render ── */
function render(data){
  const s = data.summary || {}

  // fallback derive monthly_summary/goals/quest from monthly_history if missing
  if (!data.monthly_summary || !data.monthly_goals || !data.weekly_quest) {
    const tpeNow = new Date(Date.now() + 8*3600*1000)
    const tY = tpeNow.getUTCFullYear(), tM = tpeNow.getUTCMonth(), tD = tpeNow.getUTCDate()
    const thisMonth = tY + '-' + String(tM+1).padStart(2,'0')
    const mh = (data.monthly_history || []).find(h => h.month === thisMonth)
    const TARGET = 4
    const sOf = c => { const r = c/TARGET; return r>=1.5?'over':r>=1?'done':r>=0.5?'warning':'danger' }
    if (!data.monthly_goals && mh) {
      const rc = mh.ride?.count ?? 0, rnc = mh.run?.count ?? 0, sc = mh.swim?.count ?? 0, wc = mh.weight_training?.count ?? 0
      data.monthly_goals = {
        ride:   { count:rc,  target:TARGET, status:sOf(rc)  },
        run:    { count:rnc, target:TARGET, status:sOf(rnc) },
        swim:   { count:sc,  target:TARGET, status:sOf(sc)  },
        weight: { count:wc,  target:TARGET, status:sOf(wc)  },
      }
    }
    if (!data.weekly_quest) {
      const dow = tpeNow.getUTCDay(), daysFromMon = (dow+6)%7
      const weekStart = new Date(Date.UTC(tY, tM, tD - daysFromMon)).toISOString().slice(0,10)
      const inWeek = a => (a.date || '') >= weekStart
      const wRides   = (data.recent_rides   || []).filter(inWeek)
      const wRuns    = (data.recent_runs    || []).filter(inWeek)
      const wSwims   = (data.recent_swims   || []).filter(inWeek)
      const wWeights = (data.recent_weights || []).filter(inWeek)
      const wRideDist = Math.round(wRides.reduce((s,a)=>s+(a.distance_km||0),0)*10)/10
      const wRideHr   = Math.round(wRides.reduce((s,a)=>s+(a.moving_time_hr||0),0)*10)/10
      const wRunDist  = Math.round(wRuns.reduce((s,a)=>s+(a.distance_km||0),0)*10)/10
      const wRunHr    = Math.round(wRuns.reduce((s,a)=>s+(a.moving_time_hr||0),0)*10)/10
      const wSwimM    = Math.round(wSwims.reduce((s,a)=>s+(a.distance_km||0)*1000,0))
      const wWeightCt = wWeights.length
      data.weekly_quest = {
        ride:   { done: wRideDist>=30||wRideHr>=1, distance_km:wRideDist, moving_time_hr:wRideHr, target_km:30, target_hr:1 },
        run:    { done: wRunDist>=10 ||wRunHr>=1,  distance_km:wRunDist,  moving_time_hr:wRunHr,  target_km:10, target_hr:1 },
        swim:   { done: wSwimM>=1000,               distance_m:wSwimM,    target_m:1000 },
        weight: { done: wWeightCt>=1,               count:wWeightCt,      target:1 },
      }
    }
  }

  // build ALL list
  const allList = []
  ;(data.recent_rides   || []).forEach(a => allList.push({...a, _type:'ride'}))
  ;(data.recent_runs    || []).forEach(a => allList.push({...a, _type:'run'}))
  ;(data.recent_swims   || []).forEach(a => allList.push({...a, _type:'swim'}))
  ;(data.recent_weights || []).forEach(a => allList.push({...a, _type:'weight'}))
  allList.sort((a,b)=>{
    const dc = (b.date||'').localeCompare(a.date||'')
    return dc!==0 ? dc : (b.time||'').localeCompare(a.time||'')
  })

  const tabs = [
    { key:'all',    label:'📋 全部', list: allList },
    { key:'ride',   label:'🚴 單車', list: data.recent_rides },
    { key:'run',    label:'🏃 跑步', list: data.recent_runs },
    { key:'swim',   label:'🏊 游泳', list: data.recent_swims },
    { key:'weight', label:'🏋️ 重訓', list: data.recent_weights },
  ].filter(t => t.list && t.list.length > 0)
  let activeTab = tabs[0]?.key || 'all'
  const showMore = {}

  // ── ITT date → efforts map ──
  const ittMap = {}
  ;(data.segments || []).forEach(seg => {
    const sorted = seg.efforts.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    const byTime = seg.efforts.slice().sort((a, b) => (a.elapsed_sec || 0) - (b.elapsed_sec || 0))
    const rankOf = {}; byTime.forEach((e, i) => { rankOf[e.activity_id] = i + 1 })
    sorted.forEach((e, idx) => {
      const d = (e.date || '').slice(0, 10)
      if (!ittMap[d]) ittMap[d] = []
      ittMap[d].push({ segName: seg.name, elapsed_str: e.elapsed_str, is_pr: e.is_pr, attemptNum: idx + 1, total: sorted.length, rank: rankOf[e.activity_id], activityId: e.activity_id })
    })
  })

  function tabHTML(){
    return tabs.map(t => `<button class="sport-tab${t.key===activeTab?' active':''}" data-tab="${t.key}">${t.label}</button>`).join('')
  }
  function timelineHTML(){
    const t = tabs.find(t => t.key === activeTab)
    return renderTimeline(t?.list, activeTab, showMore[activeTab] || false, ittMap)
  }

  document.getElementById('content').innerHTML = `
    ${renderHero(data.updated_at)}
    ${renderStats(s)}
    ${renderMonthlySummary(data.monthly_summary)}
    <div class="two-col">
      ${renderMonthChart(data.monthly_history)}
      ${renderGoals(data.monthly_goals)}
    </div>
    ${renderQuest(data.weekly_quest)}
    ${renderSegments(data.segments)}

    <div class="frame">
      <div class="section-head"><span class="ico">🍀</span>活動紀錄<span class="right">ACTIVITY LOG</span></div>
      <div class="sport-tabs" id="sport-tabs">${tabHTML()}</div>
      <div class="timeline" id="timeline">${timelineHTML()}</div>
    </div>

    <div class="deco-floor">
      <span>🐷</span>
      <span class="grass">🌿 🌱 🌿 🌱 🌿 🌱 🌿</span>
      <span>🍄</span>
    </div>

    <a class="strava-cta" href="https://www.strava.com/athletes/161539959" target="_blank">
      ✦ View on Strava ✦
    </a>
  `

  // animate bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-col .bar').forEach(b => {
      const h = b.dataset.h || 0
      setTimeout(() => { b.style.height = h + '%' }, 80)
    })
    document.querySelectorAll('.gfill').forEach(f => {
      const p = f.dataset.pct || 0
      setTimeout(() => { f.style.width = p + '%' }, 120)
    })
  })

  // seg row click → scroll to activity
  document.addEventListener('click', e => {
    const tr = e.target.closest('tr[data-date]')
    if (!tr) return
    const date = tr.dataset.date
    const actId = tr.dataset.actid || ''
    const actEl = document.getElementById('act-' + date)
    if (actEl) {
      actEl.scrollIntoView({ behavior: 'smooth', block: 'center' })
      actEl.classList.add('act-highlight')
      setTimeout(() => actEl.classList.remove('act-highlight'), 1500)
    } else {
      activeTab = 'all'
      showMore['all'] = true
      document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'all'))
      document.getElementById('timeline').innerHTML = timelineHTML()
      setTimeout(() => {
        const el = document.getElementById('act-' + date)
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' })
          el.classList.add('act-highlight')
          setTimeout(() => el.classList.remove('act-highlight'), 1500)
        } else {
          const toast = document.createElement('div')
          toast.innerHTML = actId
            ? `📅 ${date} 不在最近記錄 &nbsp;<a href="https://www.strava.com/activities/${actId}" target="_blank" style="color:#c54a0d;font-weight:700;text-decoration:underline">前往 Strava ↗</a>`
            : `📅 ${date} 的活動不在最近記錄內`
          toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff5d8;color:#8a5a2b;border:2px solid #8a5a2b;padding:8px 18px;border-radius:6px;font-size:12px;letter-spacing:1px;z-index:9999'
          document.body.appendChild(toast)
          setTimeout(() => toast.remove(), 3500)
        }
      }, 80)
    }
  })

  // tab switching
  document.getElementById('sport-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.sport-tab')
    if (!btn) return
    activeTab = btn.dataset.tab
    document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab))
    document.getElementById('timeline').innerHTML = timelineHTML()
  })
  // show more
  document.getElementById('timeline').addEventListener('click', e => {
    if (e.target.id === 'show-more-btn') {
      showMore[activeTab] = true
      document.getElementById('timeline').innerHTML = timelineHTML()
    }
  })
}

fetch('strava.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json() })
  .then(render)
  .catch(err => {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        ⚠ 載入失敗：${err.message}
      </div>`
  })
</script>

  <div id="ts-panel">
    <div class="ts-label">THEME</div>
    <a href="strava.html"      class="ts-item"><span class="ts-icon">🔥</span><span class="ts-name">Orange</span><span class="ts-sub">Classic</span></a>
    <a href="strava_aespa.html" class="ts-item"><span class="ts-icon">💜</span><span class="ts-name">Purple</span><span class="ts-sub">Aespa</span></a>
    <a href="strava_maple.html" class="ts-item active"><span class="ts-icon">🍁</span><span class="ts-name">Maple</span><span class="ts-sub">Pixel</span></a>

  </div>
</div>
<style>
#theme-switcher{position:fixed;bottom:24px;right:20px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
#ts-toggle{
  width:42px;height:42px;border-radius:50%;
  background:rgba(163,107,50,.2);border:2px solid rgba(163,107,50,.6);
  color:#a36b32;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(163,107,50,.2);font-family:inherit;
}
#ts-toggle:hover,#ts-toggle.open{background:rgba(163,107,50,.35);border-color:#a36b32}
#ts-panel{
  display:none;flex-direction:column;gap:6px;
  background:#faf0d8;border:2px solid #a36b32;
  border-radius:6px;padding:10px 10px 8px;
  box-shadow:0 4px 0 #a36b32;
  min-width:140px;
}
#ts-panel.open{display:flex}
.ts-label{font-size:8px;letter-spacing:3px;color:#c0a070;text-transform:uppercase;padding:0 4px 4px;border-bottom:1px solid #d4b880;margin-bottom:2px;font-family:'Press Start 2P',monospace}
.ts-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:4px;
  text-decoration:none;transition:background .15s;
  color:#7a5530;
}
.ts-item:hover{background:rgba(163,107,50,.12)}
.ts-item.active{background:rgba(163,107,50,.15);border:2px solid rgba(163,107,50,.4)}
.ts-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.ts-name{font-size:13px;font-weight:700;color:#3d1f00;flex:1;font-family:'Press Start 2P',monospace;font-size:9px}
.ts-sub{font-size:8px;color:#b08050;letter-spacing:1px}
.ts-item.active .ts-name{color:#a36b32}
</style>
<script>
;(function(){
  const btn = document.getElementById('ts-toggle')
  const panel = document.getElementById('ts-panel')
  btn.addEventListener('click', () => {
    const open = panel.classList.toggle('open')
    btn.classList.toggle('open', open)
  })
  document.addEventListener('click', e => {
    if (!document.getElementById('theme-switcher').contains(e.target)) {
      panel.classList.remove('open')
      btn.classList.remove('open')
    }
  })
})();

/* ── To Top ── */
;(function(){
  const b = document.createElement('button')
  b.id = 'to-top-btn'
  b.textContent = '▲'
  b.title = '回到頂部'
  b.style.cssText = 'position:fixed;bottom:90px;right:22px;z-index:9998;width:38px;height:38px;border-radius:3px;border:2px solid rgba(165,90,30,.55);background:rgba(40,22,8,.85);color:#c54a0d;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;image-rendering:pixelated;font-family:"Press Start 2P",monospace;transition:opacity .2s,background .2s'
  document.body.appendChild(b)
  window.addEventListener('scroll', () => { b.style.display = window.scrollY > 300 ? 'flex' : 'none' })
  b.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}))
  b.addEventListener('mouseenter', () => b.style.background='rgba(165,90,30,.3)')
  b.addEventListener('mouseleave', () => b.style.background='rgba(40,22,8,.85)')
})()
</script>
