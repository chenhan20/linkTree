
<style>
*{box-sizing:border-box;margin:0;padding:0}
.space-root{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:2.5rem 1rem 3.5rem;
  position:relative;overflow:hidden;
  background:#050818;
}
canvas#stars-bg{
  position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;
}
.nebula{
  position:absolute;border-radius:50%;pointer-events:none;z-index:0;
  animation:nebula-pulse 8s ease-in-out infinite alternate;
}
@keyframes nebula-pulse{0%{opacity:.18;transform:scale(1)}100%{opacity:.32;transform:scale(1.12)}}
.orbit-ring{
  position:relative;width:120px;height:120px;margin-bottom:1.2rem;z-index:1;
  animation:avatar-drop .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes avatar-drop{from{transform:translateY(-40px) scale(.5);opacity:0}to{transform:none;opacity:1}}
.orbit-ring svg{position:absolute;inset:0;width:100%;height:100%}
.orbit-ring .planet{
  position:absolute;width:14px;height:14px;border-radius:50%;top:50%;left:50%;
  transform-origin:0 0;
  animation:orbit-go 5s linear infinite;
}
.orbit-ring .planet::before{
  content:'';display:block;width:100%;height:100%;border-radius:50%;
  background:var(--p-color);
  animation:planet-glow 2s ease-in-out infinite alternate;
}
@keyframes planet-glow{0%{opacity:.8}100%{opacity:1;box-shadow:0 0 6px 2px var(--p-color)}}
@keyframes orbit-go{to{transform:rotate(360deg) translateX(52px) rotate(-360deg)}}
.avatar-circle{
  position:absolute;inset:14px;border-radius:50%;
  background:linear-gradient(135deg,#1a1060 0%,#2d1b7a 50%,#0a2a6e 100%);
  border:1.5px solid rgba(127,119,221,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:500;color:#c8c4f8;letter-spacing:1px;
}
.sc-name{
  font-size:24px;font-weight:500;color:#e8e4ff;
  letter-spacing:2px;text-transform:uppercase;z-index:1;
  animation:fade-up .5s .2s both;
}
.sc-sub{
  font-size:12px;color:#8884bb;letter-spacing:3px;text-transform:uppercase;
  margin-top:5px;margin-bottom:2rem;z-index:1;
  animation:fade-up .5s .32s both;
}
.divider{
  width:60px;height:1px;background:linear-gradient(90deg,transparent,#7F77DD,transparent);
  margin-bottom:2rem;z-index:1;
  animation:divider-grow .6s .4s both;
}
@keyframes divider-grow{from{width:0;opacity:0}to{width:60px;opacity:1}}
@keyframes fade-up{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.links-wrap{width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;z-index:1}
.sp-btn{
  display:flex;align-items:center;gap:14px;
  width:100%;padding:13px 18px;
  border-radius:10px;
  border:1px solid rgba(127,119,221,.22);
  background:rgba(10,8,40,.65);
  color:#ddd8ff;
  font-size:14px;font-weight:500;
  cursor:pointer;text-align:left;
  position:relative;overflow:hidden;
  transition:transform .18s ease,border-color .2s,background .2s;
  animation:btn-in .45s both;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.sp-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(127,119,221,.08),transparent);
  transform:translateX(-100%);
  transition:transform .4s;
}
.sp-btn:hover::before,.sp-btn:active::before{transform:translateX(100%)}
.sp-btn:hover,.sp-btn:active{
  transform:translateX(5px) scale(1.012);
  border-color:var(--b-color);
  background:rgba(20,14,60,.8);
}
.sp-btn:active{transform:translateX(5px) scale(.97)}
@keyframes btn-in{from{transform:translateX(-24px);opacity:0}to{transform:none;opacity:1}}
.btn-icon{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--b-bg);border:1px solid var(--b-color);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.sp-btn:hover .btn-icon,.sp-btn:active .btn-icon{transform:rotate(20deg) scale(1.18)}
.btn-icon svg{width:16px;height:16px;fill:var(--b-color)}
.btn-label{flex:1;color:#ddd8ff}
.btn-arrow{font-size:14px;color:#6660aa;opacity:0;transform:translateX(-6px);transition:opacity .2s,transform .2s}
.sp-btn:hover .btn-arrow{opacity:1;transform:none}
.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:ripple .55s linear;opacity:.18;pointer-events:none}
@keyframes ripple{to{transform:scale(5);opacity:0}}
.shooting-star{
  position:absolute;height:1px;border-radius:1px;
  background:linear-gradient(90deg,transparent,#fff,transparent);
  pointer-events:none;z-index:0;
  animation:shoot linear forwards;
}
@keyframes shoot{0%{opacity:0;transform:translateX(0)}10%{opacity:1}90%{opacity:.6}100%{opacity:0;transform:translateX(260px)}}
.footer{
  margin-top:2rem;font-size:11px;color:#4a4870;letter-spacing:2px;
  text-transform:uppercase;z-index:1;
  animation:fade-up .5s 1.2s both;
}
.scan-line{
  position:absolute;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(127,119,221,.15),transparent);
  pointer-events:none;z-index:0;
  animation:scan 7s linear infinite;
}
@keyframes scan{0%{top:0;opacity:0}5%{opacity:1}95%{opacity:.4}100%{top:100%;opacity:0}}
</style>

const wrap=document.getElementById('links');
links.forEach(l=>{
  const btn=document.createElement('button');
  btn.className='sp-btn';
  btn.style.cssText=`--b-color:${l.color};--b-bg:${l.bg};animation-delay:${l.delay}s`;
  btn.innerHTML=`<span class="btn-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${l.icon}</svg></span><span class="btn-label">${l.label}</span><span class="btn-arrow">→</span>`;
  btn.addEventListener('click',e=>{
    const r=btn.getBoundingClientRect();
    const rp=document.createElement('span');
    const sz=Math.max(btn.offsetWidth,btn.offsetHeight);
    rp.className='ripple';
    rp.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px;background:${l.color}`;
    btn.appendChild(rp);
    setTimeout(()=>rp.remove(),600);
    setTimeout(()=>window.open(l.url,'_blank'),220);
  });
  wrap.appendChild(btn);
});

const canvas=document.getElementById('stars-bg');
const ctx=canvas.getContext('2d');
let W,H,stars=[];

function resize(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight||window.innerHeight;
}

function initStars(){
  stars=[];
  const count=Math.floor((W*H)/3000);
  for(let i=0;i<count;i++){
    stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.4,
      a:Math.random(),
      da:(Math.random()-.5)*.008,
      speed:Math.random()*.15+.02,
    });
  }
}

function drawStars(){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.a+=s.da;
    if(s.a<0||s.a>1) s.da*=-1;
    s.y-=s.speed;
    if(s.y<0) s.y=H;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,196,255,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resize();initStars();drawStars();
window.addEventListener('resize',()=>{resize();initStars();});

function shootStar(){
  const root=document.getElementById('root');
  const el=document.createElement('div');
  el.className='shooting-star';
  const top=Math.random()*60+5;
  const left=Math.random()*30-20;
  const len=80+Math.random()*120;
  const dur=.6+Math.random()*.5;
  el.style.cssText=`top:${top}%;left:${left}%;width:${len}px;animation-duration:${dur}s`;
  root.appendChild(el);
  setTimeout(()=>el.remove(),(dur+.1)*1000);
}
setInterval(shootStar,2200);
shootStar();
