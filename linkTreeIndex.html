<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steve's Moon Base | Link Tree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --moon-grey: #a0a0a0;
            --dust-grey: #505050;
            --space-black: #050505;
            --glow-blue: rgba(173, 216, 230, 0.5);
            --strava-orange: #fc4c02;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--space-black);
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 核心背景：月球表面視差層 */
        #moon-parallax {
            position: fixed;
            top: -10%; left: -10%;
            width: 120%; height: 120%;
            background: url('https://raw.githubusercontent.com/chenhan20/linkTree/master/treeViewPreview.jpg') no-repeat center center;
            background-size: cover;
            filter: grayscale(100%) brightness(0.7); /* 強化寂靜感 */
            z-index: -2;
            will-change: transform;
        }

        /* 太空盔甲 HUD 掃描線 */
        .hud-scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
            opacity: 0.6;
        }

        /* 零重力進場動畫 */
        @keyframes zeroGFloat {
            0% { opacity: 0; transform: translateY(50px) rotate(5deg); }
            100% { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        .main-container {
            width: 100%;
            max-width: 480px;
            padding: 3rem 1.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 頭像與裝飾環 */
        .avatar-section {
            margin-bottom: 3rem;
            animation: zeroGFloat 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .avatar-ring {
            width: 110px; height: 110px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            padding: 5px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            position: relative;
            box-shadow: 0 0 15px var(--glow-blue);
            animation: ringRotate 15s linear infinite;
        }

        @keyframes ringRotate { to { transform: rotate(360deg); } }

        .avatar-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #000;
        }

        .name-title {
            letter-spacing: 4px;
            font-weight: 600;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .sub-title {
            font-weight: 300;
            font-size: 0.8rem;
            color: var(--moon-grey);
            margin-top: 0.3rem;
        }

        /* 按鈕容器 */
        .link-list {
            display: grid;
            gap: 1.5rem;
        }

        /* 隕石坑按鈕核心設計 */
        .moon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            text-decoration: none !important;
            color: white !important;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            
            /* 預設的凹陷感 (Crater shadow) */
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8), 0 2px 3px rgba(255,255,255,0.05);
            
            /* 手機 RWD 進場延遲 */
            opacity: 0;
            animation: zeroGFloat 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* 按鈕進場時間差 */
        .moon-btn:nth-child(1) { animation-delay: 0.3s; }
        .moon-btn:nth-child(2) { animation-delay: 0.5s; }
        .moon-btn:nth-child(3) { animation-delay: 0.7s; }

        .moon-btn i {
            font-size: 1.3rem;
            margin-right: 1.2rem;
            color: var(--moon-grey);
            transition: color 0.3s;
        }

        .moon-btn span {
            font-weight: 600;
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        /* 按鈕懸停特效 */
        .moon-btn:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            /* 從凹陷變成發光 (Glow shadow) */
            box-shadow: 0 0 20px var(--glow-blue), inset 0 0 5px rgba(255,255,255,0.1);
        }

        .moon-btn:hover i {
            color: white;
        }

        /* STRAVA 專屬橙色霓虹 */
        .moon-btn.strava {
            color: var(--strava-orange) !important;
            border-color: rgba(252, 76, 2, 0.3);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.8), 0 2px 3px rgba(252,76,2,0.1);
        }

        .moon-btn.strava:hover {
            border-color: var(--strava-orange);
            box-shadow: 0 0 20px rgba(252, 76, 2, 0.6), inset 0 0 5px rgba(252,76,2,0.2);
        }

        /* 手機 RWD 微調 */
        @media (max-width: 480px) {
            .container { padding: 2rem 1rem; }
            .moon-btn { padding: 1rem; }
            .moon-btn span { font-size: 0.8rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div id="moon-parallax"></div>
    <div class="hud-scanlines"></div>

    <main class="main-container container">
        <section class="avatar-section">
            <div class="avatar-ring">
                <img src="https://raw.githubusercontent.com/chenhan20/linkTree/master/logo.ico" alt="Steve Chuang">
            </div>
            <h1 class="name-title">STEVE CHUANG</h1>
            <p class="sub-title">LUNAR ENGINEER / TRIATHLETE</p>
        </section>

        <nav class="link-list">
            <a href="https://github.com/chenhan20" target="_blank" class="moon-btn">
                <i class="fab fa-github"></i>
                <span>GITHUB BASE</span>
            </a>
            
            <a href="https://www.strava.com/athletes/161539959" target="_blank" class="moon-btn strava">
                <i class="fab fa-strava"></i>
                <span>TRAINING DATA</span>
            </a>
            
            <a href="#" class="moon-btn">
                <i class="fas fa-satellite-dish"></i>
                <span>COMMUNICATION</span>
            </a>
        </nav>
    </main>

    <script>
        // 核心：簡單高效的視差滾動效果
        const moonParallax = document.getElementById('moon-parallax');

        // 電腦端：滑鼠移動視差
        if ('ontouchstart' in window === false) {
            window.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX / window.innerWidth - 0.5;
                const mouseY = e.clientY / window.innerHeight - 0.5;
                // 背景微幅反向移動
                moonParallax.style.transform = `translate(${-mouseX * 30}px, ${-mouseY * 30}px) scale(1.1)`;
            });
        }

        // 手機端：滾動時背景移動 (視差)
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            moonParallax.style.transform = `translateY(${scrolled * 0.1}px) scale(1.1)`;
        });
    </script>
</body>
</html>
