<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Athletics · SteveChuang</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060810;color:#ddd}

#star-canvas{position:fixed;inset:0;width:100%;height:100%;background:#060810;z-index:0;pointer-events:none}

#app{position:relative;z-index:1;min-height:100vh;max-width:800px;margin:0 auto;padding:0 1.2rem 5rem}

/* ── topbar ── */
.topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:14px 1.2rem;margin:0 -1.2rem;
  border-bottom:1px solid rgba(252,76,2,.15);
  background:rgba(6,8,16,.95);
  backdrop-filter:blur(8px);
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(252,76,2,.1);border:1px solid rgba(252,76,2,.3);
  border-radius:20px;padding:6px 14px;
  color:#FC4C02;font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:none;transition:background .2s;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:hover{background:rgba(252,76,2,.2)}
.topbar-title{font-size:12px;color:rgba(252,76,2,.55);letter-spacing:2.5px;text-transform:uppercase}

/* ── hero ── */
.hero{display:flex;align-items:center;gap:1.5rem;padding:2rem 0 1.5rem;flex-wrap:wrap}
.avatar{
  width:110px;height:110px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1a0800,#3d1200);
  border:2.5px solid #FC4C02;
  overflow:hidden;
  box-shadow:0 0 22px rgba(252,76,2,.3);
  display:flex;align-items:center;justify-content:center;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avatar svg{width:52px;height:52px;fill:#FC4C02}
.hero-info h1{font-size:26px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.verified{width:20px;height:20px;fill:#FC4C02;flex-shrink:0}
.hero-sub{font-size:11px;color:#FC4C02;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.hero-updated{font-size:11px;color:rgba(252,76,2,.35);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}

/* ── stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2.2rem}
.stat-card{
  padding:.9rem 1rem;border-radius:10px;
  border:1px solid rgba(252,76,2,.2);background:rgba(252,76,2,.05);
}
.stat-val{font-size:20px;font-weight:600;color:#FF6B35;line-height:1}
.stat-unit{font-size:10px;color:rgba(252,76,2,.55);margin-top:2px}
.stat-label{font-size:11px;color:#777;margin-top:5px}

/* ── monthly consistency ── */
.consistency-list{display:flex;flex-direction:column;gap:10px;margin-bottom:2.2rem}
.consistency-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:.7rem .9rem;border-radius:9px;
  border:1px solid rgba(252,76,2,.15);background:rgba(10,4,0,.4);
}
.consistency-name{font-size:13px;color:#eeebe8;display:flex;align-items:center;gap:6px;white-space:nowrap}
.consistency-name .count{font-size:12px;color:#aaa;margin-left:4px}
.consistency-name .count b{color:#FC4C02;font-weight:600}
.progress-bar{position:relative;height:8px;border-radius:6px;background:rgba(252,76,2,.1);overflow:hidden}
.progress-fill{height:100%;border-radius:6px;width:0;transition:width .8s cubic-bezier(.25,.46,.45,.94)}
.progress-fill.danger {background:linear-gradient(90deg,#7a1010,#c83232)}
.progress-fill.warning{background:linear-gradient(90deg,#7a5510,#e0a020)}
.progress-fill.done   {background:linear-gradient(90deg,#1e6b1e,#3fcc4a)}
.progress-fill.over   {background:linear-gradient(90deg,#992b00,#FC4C02,#ff7040)}
.status-badge{font-size:10px;padding:3px 8px;border-radius:10px;white-space:nowrap;letter-spacing:.5px}
.status-badge.danger {background:rgba(220,60,60,.12);color:#e06060;border:1px solid rgba(220,60,60,.3)}
.status-badge.warning{background:rgba(224,160,32,.12);color:#e0b040;border:1px solid rgba(224,160,32,.3)}
.status-badge.done   {background:rgba(63,204,74,.12);color:#5fd060;border:1px solid rgba(63,204,74,.3)}
.status-badge.over   {background:rgba(252,76,2,.15);color:#ff7040;border:1px solid rgba(252,76,2,.4)}

/* ── weekly quest ── */
.quest-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2.2rem}
.quest-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:18px;font-size:13px;
  border:1px solid rgba(252,76,2,.15);background:rgba(10,4,0,.4);color:#777;
  transition:all .2s;
}
.quest-pill.on{border-color:rgba(63,204,74,.4);background:rgba(63,204,74,.08);color:#7fd57f}
.quest-pill .mark{font-size:14px}

/* ── section title ── */
.section-title{
  font-size:11px;font-weight:600;color:#FC4C02;letter-spacing:3px;text-transform:uppercase;
  margin-bottom:1rem;padding-bottom:.5rem;
  border-bottom:1px solid rgba(252,76,2,.15);
}
.section-title .muted{color:rgba(252,76,2,.4)}

/* ── monthly chart ── */
.monthly-chart{margin-bottom:2.2rem}
.chart-rows{display:flex;flex-direction:column;gap:10px}
.chart-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.chart-label{font-size:12px;color:#aaa;width:24px;text-align:right;flex-shrink:0}
.chart-bar-wrap{flex:1;height:44px;background:rgba(252,76,2,.1);border-radius:6px;overflow:hidden}
.chart-bar{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,#992b00,#FC4C02,#ff7040);
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;min-width:44px;
  width:0;transition:width 1s cubic-bezier(.25,.46,.45,.94);
}
.chart-bar-val{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.chart-unit-label{font-size:11px;color:#666;width:28px;flex-shrink:0}

/* ── chart year toggle ── */
.chart-year-header{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;color:#FC4C02;letter-spacing:2.5px;
  text-transform:uppercase;padding:12px 0 4px;
  cursor:pointer;user-select:none;opacity:.8;
}
.chart-year-header:hover{opacity:1}
.chart-year-arrow{transition:transform .25s;font-style:normal;font-size:10px}
.chart-year-rows{overflow:hidden;transition:max-height .35s ease}

/* ── sport tabs ── */
.sport-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.sport-tab{
  display:flex;align-items:center;gap:5px;
  font-size:12px;padding:5px 14px;border-radius:20px;
  border:1px solid rgba(252,76,2,.2);color:#777;background:transparent;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.sport-tab.active{background:rgba(252,76,2,.14);border-color:#FC4C02;color:#FC4C02}
.sport-tab:hover:not(.active){border-color:rgba(252,76,2,.4);color:#FC4C02}

/* ── timeline ── */
.timeline{margin-bottom:2.2rem}
.timeline-day{margin-bottom:1.4rem}
.timeline-date{
  font-size:17px;font-weight:600;color:#FC4C02;
  margin-bottom:.75rem;padding-left:22px;position:relative;
}
.timeline-date::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;
  background:#FC4C02;box-shadow:0 0 8px rgba(252,76,2,.7);
}
.activity-card{
  display:flex;align-items:center;gap:12px;
  padding:.85rem 1rem;border-radius:9px;
  border:1px solid rgba(252,76,2,.12);background:rgba(10,4,0,.45);
  margin-bottom:8px;margin-left:22px;
  transition:border-color .2s,background .2s;
}
.activity-card:hover{border-color:rgba(252,76,2,.32);background:rgba(22,8,0,.55)}
.activity-icon{
  width:46px;height:46px;border-radius:10px;flex-shrink:0;
  background:rgba(252,76,2,.18);border:1px solid rgba(252,76,2,.3);
  display:flex;align-items:center;justify-content:center;
}
.activity-icon svg{width:24px;height:24px;fill:#FC4C02}
.activity-info{flex:1;min-width:0}
.activity-name{font-size:16px;font-weight:500;color:#eeebe8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-meta{font-size:11px;color:#666;margin-top:3px}
.activity-meta .tag{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(252,76,2,.08);border:1px solid rgba(252,76,2,.15);
  border-radius:4px;padding:2px 8px;margin-right:4px;margin-top:3px;
  color:#b05030;font-size:12px;white-space:nowrap;
}
.activity-meta .tag.hr{border-color:rgba(220,60,60,.2);background:rgba(220,60,60,.06);color:#c04040}
.activity-dist{font-size:15px;font-weight:600;color:#FC4C02;flex-shrink:0;white-space:nowrap}
.empty{font-size:13px;color:#555;padding:2rem 0;text-align:center}

/* ── show more ── */
.show-more-btn{
  width:100%;padding:10px;border-radius:8px;margin-top:6px;
  border:1px solid rgba(252,76,2,.2);background:transparent;
  color:#FC4C02;font-size:12px;cursor:pointer;letter-spacing:1.5px;
  transition:background .2s;text-transform:uppercase;
}
.show-more-btn:hover{background:rgba(252,76,2,.1)}

/* ── bottom totals ── */
.totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
.total-card{
  padding:1rem;border-radius:10px;
  border:1px solid rgba(252,76,2,.12);background:rgba(10,4,0,.3);text-align:center;
}
.total-val{font-size:20px;font-weight:600;color:#FF6B35}
.total-label{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:5px}

/* ── CTA button ── */
.strava-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;border-radius:10px;
  background:rgba(252,76,2,.1);border:1px solid rgba(252,76,2,.4);
  color:#FC4C02;font-size:14px;font-weight:500;
  text-decoration:none;transition:background .2s,border-color .2s;
}
.strava-cta:hover{background:rgba(252,76,2,.2);border-color:#FC4C02}
.strava-cta svg{width:16px;height:16px;fill:#FC4C02;flex-shrink:0}

/* ── loading / error ── */
.loading{text-align:center;padding:4rem 0;color:#555;font-size:14px}

@media(max-width:520px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .hero-info h1{font-size:22px}
  .stat-val{font-size:18px}
  .totals-grid{grid-template-columns:repeat(3,1fr)}
  .total-val{font-size:16px}
  .consistency-row{grid-template-columns:auto 1fr;row-gap:8px}
  .consistency-row .status-badge{grid-column:1 / -1;justify-self:start}
}
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div id="app">
  <div class="topbar">
    <a class="back-btn" href="javascript:history.length>1?history.back():location.href='linkTreeIndex.html'">← BACK</a>
    <span class="topbar-title">Athletics · Strava</span>
  </div>
  <div id="content"><div class="loading">Loading athlete data…</div></div>
</div>

<script>
/* ── star canvas ── */
;(function(){
  const c=document.getElementById('star-canvas'),ctx=c.getContext('2d')
  let W,H,stars=[]
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  function init(){stars=[];const n=Math.floor(W*H/3500);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,a:Math.random(),da:(Math.random()-.5)*.006,speed:Math.random()*.1+.02})}
  function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;s.y-=s.speed;if(s.y<0)s.y=H;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,160,120,${s.a*.5})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();init();draw()
  addEventListener('resize',()=>{resize();init()})
})()

/* ── SVG icons ── */
const ICONS = {
  ride:   '<path d="M5 20.5A3.5 3.5 0 0 1 1.5 17 3.5 3.5 0 0 1 5 13.5 3.5 3.5 0 0 1 8.5 17 3.5 3.5 0 0 1 5 20.5M5 12A5 5 0 0 0 0 17a5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m8.8-5.4L11 9.5l1.5 1.5H16v2h-4.5l-2.5-2.5L11.5 8H9.8l-1.5 4.5 2.2 2.2A5 5 0 0 0 14 17a5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5l-1.1.1-2.7-2.6.8-2H18V6h-3.2l-.9 2.6M14.5 5a1.5 1.5 0 0 0 1.5-1.5A1.5 1.5 0 0 0 14.5 2 1.5 1.5 0 0 0 13 3.5 1.5 1.5 0 0 0 14.5 5m4.5 7a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5A3.5 3.5 0 0 1 15.5 17 3.5 3.5 0 0 1 19 13.5z"/>',
  run:    '<path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>',
  swim:   '<path d="M2 12c.7 0 1.3.3 2 1 1 1 2.2 1.5 3.5 1.5S10 14 11 13c.7-.7 1.3-1 2-1s1.3.3 2 1c1 1 2.2 1.5 3.5 1.5s2.5-.5 3.5-1.5c.7-.7 1.3-1 2-1v-2c-1.3 0-2.5.5-3.5 1.5-.7.7-1.3 1-2 1s-1.3-.3-2-1C15.5 10.5 14.3 10 13 10s-2.5.5-3.5 1.5C8.8 12.2 8.2 12.5 7.5 12.5s-1.3-.3-2-1C4.5 10.5 3.3 10 2 10v2m0 5c.7 0 1.3.3 2 1 1 1 2.2 1.5 3.5 1.5S10 19 11 18c.7-.7 1.3-1 2-1s1.3.3 2 1c1 1 2.2 1.5 3.5 1.5s2.5-.5 3.5-1.5c.7-.7 1.3-1 2-1v-2c-1.3 0-2.5.5-3.5 1.5-.7.7-1.3 1-2 1s-1.3-.3-2-1C15.5 15.5 14.3 15 13 15s-2.5.5-3.5 1.5c-.7.7-1.3 1-2 1s-1.3-.3-2-1C4.5 15.5 3.3 15 2 15v2M17.5 7.3c-.7.7-1.2 1.7-3 1.7-1.5 0-2.2-.7-3-1.5C10.7 6.7 9.8 6 8.5 6 7 6 5.8 6.7 5 7.5L6.5 9c.5-.5 1-.9 2-.9 1.5 0 2.2.7 3 1.5.8.8 1.7 1.5 3 1.5 1.5 0 2.5-.7 3.3-1.5L19 8c-.2-.3-.5-.5-.8-.8l-.7.1z"/>',
  weight: '<path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/>',
}

/* ── helpers ── */
function fmtMovingTime(hr) {
  // PRD FR-4: 避免 "1:00" 歧義，改為 "45 分" / "1 小時" / "1 小時 30 分"
  const totalMin = Math.max(0, Math.round((hr || 0) * 60))
  if (totalMin < 60) return `${totalMin} 分`
  const h = Math.floor(totalMin / 60)
  const m = totalMin % 60
  if (m === 0) return `${h} 小時`
  return `${h} 小時 ${m} 分`
}
const SPORT_META = {
  ride:   { icon: '🚴', label: '單車' },
  run:    { icon: '🏃', label: '跑步' },
  swim:   { icon: '🏊', label: '游泳' },
  weight: { icon: '🏋️', label: '重訓' },
}
const STATUS_META = {
  danger:  { emoji: '🔴', text: '嚴重落後' },
  warning: { emoji: '🟡', text: '近期需補課' },
  done:    { emoji: '🟢', text: '達標' },
  over:    { emoji: '🔥', text: '超標' },
}
function renderMonthlySummary(ms) {
  if (!ms) return ''
  return `
    <div class="section-title">本月訓練量 <span class="muted">· MONTHLY SUMMARY</span></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${ms.ride_km ?? 0}</div><div class="stat-unit">km</div><div class="stat-label">🚴 單車</div></div>
      <div class="stat-card"><div class="stat-val">${ms.run_km ?? 0}</div><div class="stat-unit">km</div><div class="stat-label">🏃 跑步</div></div>
      <div class="stat-card"><div class="stat-val">${ms.swim_m ?? 0}</div><div class="stat-unit">m</div><div class="stat-label">🏊 游泳</div></div>
      <div class="stat-card"><div class="stat-val">${ms.weight_count ?? 0}</div><div class="stat-unit">次</div><div class="stat-label">🏋️ 重訓</div></div>
    </div>`
}
function renderMonthlyGoals(mg) {
  if (!mg) return ''
  const order = ['ride','run','swim','weight']
  const rows = order.map(k => {
    const g = mg[k]; if (!g) return ''
    const meta = SPORT_META[k]
    const sm = STATUS_META[g.status] || STATUS_META.danger
    const pct = Math.min(100, g.target > 0 ? (g.count / g.target) * 100 : 0)
    return `
      <div class="consistency-row">
        <div class="consistency-name">${meta.icon} ${meta.label}<span class="count"><b>${g.count}</b> / ${g.target}</span></div>
        <div class="progress-bar"><div class="progress-fill ${g.status}" data-pct="${pct}"></div></div>
        <div class="status-badge ${g.status}">${sm.emoji} ${sm.text}</div>
      </div>`
  }).join('')
  return `
    <div class="section-title">月度紀律 <span class="muted">· MONTHLY CONSISTENCY (TARGET 4 / MONTH)</span></div>
    <div class="consistency-list">${rows}</div>`
}
function renderWeeklyQuest(wq) {
  if (!wq) return ''
  const order = ['ride','run','swim','weight']
  const pills = order.map(k => {
    const meta = SPORT_META[k]
    const on = !!wq[k]
    return `<span class="quest-pill${on ? ' on' : ''}"><span class="mark">${on ? '✅' : '⬜'}</span>${meta.icon} ${meta.label}</span>`
  }).join('')
  return `
    <div class="section-title">本週任務 <span class="muted">· WEEKLY QUEST</span></div>
    <div class="quest-list">${pills}</div>`
}
function fmtDate(d) {
  // "2026-04-22" → "04 / 22"
  const [,mm,dd] = d.split('-')
  return `${mm} / ${dd}`
}
function fmtMonthLabel(m) {
  return m.replace(/^\d{4}-/, '')
}
function monthDist(h) {
  if (h.ride && typeof h.ride === 'object') return h.ride.distance_km || 0
  return h.distance_km || 0
}

/* ── group activities by date ── */
function groupByDate(list) {
  const map = {}
  ;(list || []).forEach(a => {
    const d = (a.date || '').slice(0, 10)
    if (!map[d]) map[d] = []
    map[d].push(a)
  })
  // days: newest first; within each day: earliest first (by time field)
  return Object.entries(map)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([d, acts]) => [
      d,
      acts.slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''))
    ])
}

/* ── render timeline ── */
function renderTimeline(list, type, expanded) {
  if (!list || !list.length) return '<div class="empty">暫無資料</div>'
  const isAll    = type === 'all'
  const icon = ICONS[type] || ICONS.ride
  const groups = groupByDate(list)
  const LIMIT = 10
  const hasMore = !expanded && groups.length > LIMIT
  const visible = hasMore ? groups.slice(0, LIMIT) : groups

  const html = visible.map(([date, acts]) => `
    <div class="timeline-day">
      <div class="timeline-date">${fmtDate(date)}</div>
      ${acts.map(a => {
        const aType    = isAll ? (a._type || 'ride') : type
        const aIsWeight = aType === 'weight'
        const aIsSwim   = aType === 'swim'
        const aIsRun    = aType === 'run'
        const aIcon = ICONS[aType] || ICONS.ride
        const tags = []
        tags.push(`<span class="tag">⏱ ${fmtMovingTime(a.moving_time_hr || 0)}</span>`)
        if (!aIsWeight && !aIsSwim && a.elevation_m != null) tags.push(`<span class="tag">↑${a.elevation_m}m</span>`)
        if (aIsRun && a.avg_pace_km)     tags.push(`<span class="tag">💨 ${a.avg_pace_km}/km</span>`)
        if (aIsRun && a.avg_cadence_spm) tags.push(`<span class="tag">🦵 ${a.avg_cadence_spm} spm</span>`)
        if (!aIsRun && !aIsSwim && !aIsWeight && a.avg_speed_kmh) tags.push(`<span class="tag">${a.avg_speed_kmh} km/h</span>`)
        if (aIsSwim && a.pace_per_100m)  tags.push(`<span class="tag">💧 ${a.pace_per_100m}/100m</span>`)
        if (a.avg_heartrate)             tags.push(`<span class="tag hr">♥️ ${a.avg_heartrate} bpm</span>`)
        return `
        <div class="activity-card">
          <div class="activity-icon"><svg viewBox="0 0 24 24">${aIcon}</svg></div>
          <div class="activity-info">
            <div class="activity-name">${a.name || '—'}</div>
            <div class="activity-meta">${tags.join('')}</div>
          </div>
          ${aIsWeight ? '' : `<div class="activity-dist">${a.distance_km} <small style="font-size:11px;font-weight:400">km</small></div>`}
        </div>`
      }).join('')}
    </div>
  `).join('')

  const moreBtn = hasMore
    ? `<button class="show-more-btn" id="show-more-btn">▼ 顯示全部 ${groups.length} 天記錄</button>`
    : ''
  return html + moreBtn
}

/* ── main render ── */
function render(data) {
  const s = data.summary || {}
  const history = (data.monthly_history || []).slice().reverse()

  // ── Fallback: derive monthly data from existing JSON if Action hasn't run yet ──
  if (!data.monthly_summary || !data.monthly_goals || !data.weekly_quest) {
    const tpeNow = new Date(Date.now() + 8 * 3600 * 1000)
    const tY = tpeNow.getUTCFullYear(), tM = tpeNow.getUTCMonth(), tD = tpeNow.getUTCDate()
    const thisMonth = tY + '-' + String(tM + 1).padStart(2, '0')
    const mh = (data.monthly_history || []).find(h => h.month === thisMonth)
    const TARGET = 4
    const sOf = c => { const r = c / TARGET; return r >= 1.5 ? 'over' : r >= 1 ? 'done' : r >= 0.5 ? 'warning' : 'danger' }
    if (!data.monthly_summary && mh) {
      data.monthly_summary = {
        ride_km:      mh.ride?.distance_km ?? 0,
        run_km:       mh.run?.distance_km ?? 0,
        swim_m:       Math.round((mh.swim?.distance_km ?? 0) * 1000),
        weight_count: mh.weight_training?.count ?? 0,
      }
    }
    if (!data.monthly_goals && mh) {
      const rc = mh.ride?.count ?? 0, rnc = mh.run?.count ?? 0, sc = mh.swim?.count ?? 0, wc = mh.weight_training?.count ?? 0
      data.monthly_goals = {
        ride:   { count: rc,  target: TARGET, status: sOf(rc)  },
        run:    { count: rnc, target: TARGET, status: sOf(rnc) },
        swim:   { count: sc,  target: TARGET, status: sOf(sc)  },
        weight: { count: wc,  target: TARGET, status: sOf(wc)  },
      }
    }
    if (!data.weekly_quest) {
      const dow = tpeNow.getUTCDay()
      const daysFromMon = (dow + 6) % 7
      const weekStart = new Date(Date.UTC(tY, tM, tD - daysFromMon)).toISOString().slice(0, 10)
      const inWeek = a => (a.date || '') >= weekStart
      data.weekly_quest = {
        ride:   (data.recent_rides   || []).some(inWeek),
        run:    (data.recent_runs    || []).some(inWeek),
        swim:   (data.recent_swims   || []).some(inWeek),
        weight: (data.recent_weights || []).some(inWeek),
      }
    }
  }
  const maxDist = Math.max(...history.map(monthDist), 1)

  // build ALL list (merged, sorted by date)
  const allList = []
  ;(data.recent_rides   || []).forEach(a => allList.push({...a, _type:'ride'}))
  ;(data.recent_runs    || []).forEach(a => allList.push({...a, _type:'run'}))
  ;(data.recent_swims   || []).forEach(a => allList.push({...a, _type:'swim'}))
  ;(data.recent_weights || []).forEach(a => allList.push({...a, _type:'weight'}))
  // sort by date desc, then time desc (so groupByDate re-sorts within day asc)
  allList.sort((a,b) => {
    const dc = (b.date||'').localeCompare(a.date||'')
    return dc !== 0 ? dc : (b.time||'').localeCompare(a.time||'')
  })

  // tabs config
  const tabs = [
    { key:'all',    label:'📋 全部',   list: allList             },
    { key:'ride',   label:'🚴 單車',   list: data.recent_rides   },
    { key:'run',    label:'🏃 跑步',   list: data.recent_runs    },
    { key:'swim',   label:'🏊 游泳',   list: data.recent_swims   },
    { key:'weight', label:'🏋️ 重訓', list: data.recent_weights },
  ]
  // only show tabs that have data
  const activeTabs = tabs.filter(t => t.list && t.list.length > 0)
  let activeTab = activeTabs[0]?.key || 'all'
  const showMore = {} // tab key → expanded boolean

  function tabHTML() {
    return activeTabs.map(t => `
      <button class="sport-tab${t.key === activeTab ? ' active' : ''}" data-tab="${t.key}">${t.label}</button>
    `).join('')
  }
  function timelineHTML() {
    const t = activeTabs.find(t => t.key === activeTab)
    return renderTimeline(t?.list, activeTab, showMore[activeTab] || false)
  }

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="avatar">
        <img src="docs/avatar.jpg" alt="SC"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <svg viewBox="0 0 24 24" style="display:none">${ICONS.ride}</svg>
      </div>
      <div class="hero-info">
        <h1>承翰 莊
          <svg class="verified" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </h1>
        <div class="hero-sub">Strava · Cyclist · Athlete</div>
        <div class="hero-updated">Updated ${(data.updated_at || '').slice(0, 10)}</div>
      </div>
    </div>

    ${renderMonthlySummary(data.monthly_summary)}
    ${renderMonthlyGoals(data.monthly_goals)}
    ${renderWeeklyQuest(data.weekly_quest)}

    ${history.length ? `
    <div class="monthly-chart">
      <div class="section-title">月度里程分佈 <span class="muted">· MONTHLY DISTANCE (KM)</span></div>
      <div class="chart-rows" id="chart-rows">
        ${(() => {
          // group by year
          const byYear = {}
          history.forEach(h => {
            const y = h.month.slice(0, 4)
            if (!byYear[y]) byYear[y] = []
            byYear[y].push(h)
          })
          const years = Object.keys(byYear).sort((a,b) => b.localeCompare(a)) // newest first
          const currentYear = new Date().getFullYear().toString()
          return years.map(year => {
            const collapsed = year !== currentYear
            const rows = byYear[year].map(h => {
              const dist = monthDist(h)
              const pct = dist > 0 ? Math.max((dist / maxDist) * 100, 4) : 0
              return `
                <div class="chart-row">
                  <div class="chart-label">${fmtMonthLabel(h.month)}</div>
                  <div class="chart-bar-wrap">
                    <div class="chart-bar" data-pct="${pct}">
                      <span class="chart-bar-val">${dist}</span>
                    </div>
                  </div>
                  <div class="chart-unit-label">km</div>
                </div>
              `
            }).join('')
            const rowHeight = byYear[year].length * 50 // approx px per row
            return `
              <div class="chart-year-header" data-year="${year}">
                <span class="chart-year-arrow" id="arrow-${year}">${collapsed ? '▶' : '▼'}</span>
                ${year}
              </div>
              <div class="chart-year-rows" id="year-rows-${year}" style="max-height:${collapsed ? '0' : '9999px'}" data-collapsed="${collapsed ? '1' : ''}">
                ${rows}
              </div>
            `
          }).join('')
        })()}
      </div>
    </div>
    ` : ''}

    <div class="section-title">活動紀錄 <span class="muted">· ACTIVITY LOG</span></div>
    <div class="sport-tabs" id="sport-tabs">${tabHTML()}</div>
    <div class="timeline" id="timeline">${timelineHTML()}</div>

    <div class="totals-grid">
      <div class="total-card">
        <div class="total-val">${s.all_time_distance_km ?? '—'}</div>
        <div class="total-label">Total KM</div>
      </div>
      <div class="total-card">
        <div class="total-val">${s.all_time_elevation_m ?? '—'}</div>
        <div class="total-label">Total Elev</div>
      </div>
      <div class="total-card">
        <div class="total-val">${s.all_time_rides ?? '—'}</div>
        <div class="total-label">Total Rides</div>
      </div>
    </div>

    <a class="strava-cta" href="https://www.strava.com/athletes/161539959" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
      View full profile on Strava
    </a>
  `

  // animate chart bars (only visible ones)
  requestAnimationFrame(() => {
    document.querySelectorAll('.chart-bar').forEach(bar => {
      const pct = bar.dataset.pct
      bar.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { bar.style.width = pct + '%' }, 80)
      })
    })
    // animate consistency bars
    document.querySelectorAll('.progress-fill').forEach(fill => {
      const pct = fill.dataset.pct
      fill.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { fill.style.width = pct + '%' }, 120)
      })
    })
  })

  // year collapse toggle
  const chartRows = document.getElementById('chart-rows')
  if (chartRows) {
    chartRows.addEventListener('click', e => {
      const header = e.target.closest('.chart-year-header')
      if (!header) return
      const year = header.dataset.year
      const rows = document.getElementById(`year-rows-${year}`)
      const arrow = document.getElementById(`arrow-${year}`)
      const isCollapsed = rows.dataset.collapsed === '1'
      if (isCollapsed) {
        rows.dataset.collapsed = ''
        rows.style.maxHeight = rows.scrollHeight + 'px'
        arrow.textContent = '▼'
        // animate newly visible bars
        rows.querySelectorAll('.chart-bar').forEach(bar => {
          bar.style.width = '0'
          requestAnimationFrame(() => {
            setTimeout(() => { bar.style.width = bar.dataset.pct + '%' }, 60)
          })
        })
        // after transition, set to unrestricted so content can grow
        setTimeout(() => { if (rows.dataset.collapsed !== '1') rows.style.maxHeight = '9999px' }, 400)
      } else {
        // set explicit height first so transition has a from-value
        rows.style.maxHeight = rows.scrollHeight + 'px'
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            rows.style.maxHeight = '0'
            rows.dataset.collapsed = '1'
            arrow.textContent = '▶'
          })
        })
      }
    })
  }

  // tab switching
  document.getElementById('sport-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.sport-tab')
    if (!btn) return
    activeTab = btn.dataset.tab
    document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab))
    document.getElementById('timeline').innerHTML = timelineHTML()
  })

  // show more
  document.getElementById('timeline').addEventListener('click', e => {
    if (e.target.id === 'show-more-btn') {
      showMore[activeTab] = true
      document.getElementById('timeline').innerHTML = timelineHTML()
    }
  })
}

/* ── fetch strava.json ── */
fetch('strava.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json() })
  .then(render)
  .catch(err => {
    document.getElementById('content').innerHTML = `
      <div class="loading" style="color:#FC4C02">
        載入失敗：${err.message}<br><br>
        <span style="color:#555;font-size:12px">請先執行 GitHub Actions 產生 strava.json</span>
      </div>
    `
  })
</script>
</body>
</html>
