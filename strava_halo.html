<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HALO 117 · Spartan Telemetry</title>
<style>
:root{
  --gold-1:#ffd84a;
  --gold-2:#ffc724;
  --gold-3:#f0a818;
  --gold-4:#a86c10;
  --gold-deep:#5a3a08;
  --cortana-1:#67d8ff;
  --cortana-2:#42b8ff;
  --cortana-3:#1c7ad9;
  --plate-0:#0a0d12;
  --plate-1:#11161e;
  --plate-2:#1a2230;
  --plate-edge:rgba(255,199,36,.42);
  --plate-edge-soft:rgba(255,199,36,.18);
  --plate-edge-faint:rgba(255,199,36,.10);
  --ink:#e9ecef;
  --ink-2:#9aa3ad;
  --ink-3:#5d6571;
  --danger:#ff5050;
  --done:#7be060;
  --warn:#ffc24a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  min-height:100%;
  font-family:'Rajdhani','Orbitron',-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;
  background:#06080c;color:var(--ink);
  letter-spacing:.3px;
}

/* ── 3D backdrop (placeholder for user-supplied bg) ── */
#space-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 35%, rgba(255,199,36,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 18% 90%, rgba(255,140,40,.10) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 15%, rgba(66,184,255,.10) 0%, transparent 55%),
    linear-gradient(180deg, #050810 0%, #0a0e16 50%, #04060a 100%);
}
/* if user drops a halo_bg image into docs/, it will layer on top of the gradient */
#space-bg::before{
  content:'';position:absolute;inset:0;
  background:url('docs/halo_bg.jpg') center/cover no-repeat;
  background-attachment:fixed;
  opacity:.55;mix-blend-mode:screen;
  filter:saturate(1.05) brightness(.85) contrast(1.05);
}
/* hex grid overlay — Forerunner panels */
#space-bg::after{
  content:'';position:absolute;inset:0;opacity:.18;
  background-image:
    linear-gradient(60deg, transparent 49.4%, rgba(255,199,36,.18) 49.4% 50.6%, transparent 50.6%),
    linear-gradient(-60deg, transparent 49.4%, rgba(255,199,36,.18) 49.4% 50.6%, transparent 50.6%),
    linear-gradient(0deg,   transparent 49.4%, rgba(255,199,36,.18) 49.4% 50.6%, transparent 50.6%);
  background-size:46px 80px;
  mask-image:radial-gradient(ellipse at 50% 40%, #000 0%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 40%, #000 0%, transparent 75%);
}
@keyframes halo-scan{0%{transform:translateY(-12%)}100%{transform:translateY(12%)}}

#star-canvas{position:fixed;inset:0;width:100%;height:100%;background:transparent;z-index:1;pointer-events:none;mix-blend-mode:screen;opacity:.7}

#app{position:relative;z-index:2;min-height:100vh;max-width:880px;margin:0 auto;padding:0 1.2rem 5rem}

/* ── 3D armor-plate mixin (used by every card via .frame-3d helper class) ── */
.plate{
  position:relative;
  background:
    linear-gradient(180deg, rgba(20,28,40,.92) 0%, rgba(10,14,22,.92) 100%);
  border:1px solid var(--plate-edge);
  border-top-color:rgba(255,216,74,.55);
  border-bottom-color:rgba(168,108,16,.5);
  /* layered armor depth */
  box-shadow:
    inset 0 1px 0 rgba(255,216,74,.18),
    inset 0 -1px 0 rgba(0,0,0,.6),
    0 1px 0 rgba(255,199,36,.08),
    0 6px 0 -1px rgba(0,0,0,.5),
    0 14px 30px -10px rgba(0,0,0,.7),
    0 0 18px rgba(255,199,36,.06);
  border-radius:4px;
  /* chamfered Halo-style corner */
  clip-path:polygon(
    14px 0, calc(100% - 14px) 0, 100% 14px,
    100% calc(100% - 14px), calc(100% - 14px) 100%,
    14px 100%, 0 calc(100% - 14px), 0 14px);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
/* tiny corner brackets */
.plate::before, .plate::after{
  content:'';position:absolute;width:10px;height:10px;pointer-events:none;
  border:1.5px solid var(--gold-2);opacity:.85;
}
.plate::before{top:5px;left:5px;border-right:none;border-bottom:none}
.plate::after{bottom:5px;right:5px;border-left:none;border-top:none}
/* Hover highlight — gold sweep + lift */
.plate.hoverable:hover{
  transform:translateY(-2px);
  border-color:var(--gold-2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,200,.35),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 1px 0 rgba(255,199,36,.18),
    0 8px 0 -1px rgba(0,0,0,.55),
    0 18px 38px -8px rgba(0,0,0,.75),
    0 0 38px rgba(255,199,36,.32);
}
/* moving highlight bar on hover */
.plate.hoverable{overflow:hidden}
.plate.hoverable .plate-shine{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg, transparent 35%, rgba(255,255,180,.18) 50%, transparent 65%);
  transform:translateX(-120%);
  transition:transform .6s ease;
}
.plate.hoverable:hover .plate-shine{transform:translateX(120%)}

/* ── topbar ── */
.topbar{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;gap:12px;
  padding:14px 1.2rem;margin:0 -1.2rem 14px;
  border-bottom:1px solid var(--plate-edge-soft);
  background:linear-gradient(180deg, rgba(6,8,14,.95), rgba(6,8,14,.78));
  backdrop-filter:blur(10px);
}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,199,36,.08);border:1px solid var(--plate-edge);
  border-radius:3px;padding:6px 14px;
  color:var(--gold-2);font-size:12px;font-weight:600;letter-spacing:1.5px;
  cursor:pointer;text-decoration:none;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
}
.back-btn:hover{background:rgba(255,199,36,.22);box-shadow:0 0 14px rgba(255,199,36,.3)}
.topbar-title{
  font-size:11px;color:var(--gold-2);letter-spacing:3.5px;text-transform:uppercase;
  flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  text-shadow:0 0 8px rgba(255,199,36,.45);
}

/* ── hero ── */
.hero{
  position:relative;
  display:flex;align-items:center;gap:1.5rem;
  padding:1.6rem 1.4rem 1.4rem;margin-bottom:18px;
  flex-wrap:wrap;
  background:
    linear-gradient(140deg, rgba(255,199,36,.06) 0%, rgba(0,0,0,0) 35%),
    linear-gradient(180deg, rgba(20,28,40,.92), rgba(10,14,22,.92));
  border:1px solid var(--plate-edge);
  border-top:1px solid rgba(255,216,74,.55);
  box-shadow:
    inset 0 1px 0 rgba(255,216,74,.18),
    inset 0 -2px 0 rgba(0,0,0,.55),
    0 8px 0 -2px rgba(0,0,0,.5),
    0 16px 36px -10px rgba(0,0,0,.7),
    0 0 24px rgba(255,199,36,.08);
  clip-path:polygon(20px 0, calc(100% - 20px) 0, 100% 20px, 100% calc(100% - 20px), calc(100% - 20px) 100%, 20px 100%, 0 calc(100% - 20px), 0 20px);
}
.hero::before, .hero::after{
  content:'';position:absolute;width:14px;height:14px;pointer-events:none;
  border:2px solid var(--gold-2);opacity:.9;
}
.hero::before{top:7px;left:7px;border-right:none;border-bottom:none}
.hero::after{bottom:7px;right:7px;border-left:none;border-top:none}
.avatar{
  width:110px;height:110px;flex-shrink:0;position:relative;
  background:linear-gradient(135deg,#1a1410,#3a2a08);
  border:2px solid var(--gold-2);
  overflow:hidden;
  box-shadow:
    inset 0 0 18px rgba(0,0,0,.5),
    0 0 22px rgba(255,199,36,.32),
    0 0 0 4px rgba(0,0,0,.55),
    0 0 0 5px rgba(255,199,36,.25);
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(18px 0,calc(100% - 18px) 0,100% 18px,100% calc(100% - 18px),calc(100% - 18px) 100%,18px 100%,0 calc(100% - 18px),0 18px);
}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar svg{width:52px;height:52px;fill:var(--gold-2)}
.hero-info{flex:1;min-width:200px}
.hero-info h1{
  font-size:30px;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:10px;letter-spacing:2px;
  text-shadow:0 0 18px rgba(255,199,36,.4);font-family:'Orbitron','Rajdhani',sans-serif;
}
.verified{width:20px;height:20px;fill:var(--gold-2);flex-shrink:0;filter:drop-shadow(0 0 6px rgba(255,199,36,.6))}
.hero-sub{
  font-size:11px;color:var(--gold-2);letter-spacing:4px;text-transform:uppercase;
  margin-top:7px;font-weight:600;
}
.hero-sub::before{content:'▸ ';opacity:.7}
.hero-updated{
  font-size:10px;color:var(--ink-3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;
}
.hero-updated::before{content:'◇ TELEMETRY SYNCED · '}

/* ── stats grid (Mission Status) ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.6rem}
.stat-card{
  position:relative;padding:.95rem 1rem 1.05rem;
  background:linear-gradient(180deg, rgba(22,30,42,.9), rgba(10,14,22,.9));
  border:1px solid var(--plate-edge-soft);
  border-top:1px solid rgba(255,216,74,.4);
  box-shadow:
    inset 0 1px 0 rgba(255,216,74,.12),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 4px 0 -1px rgba(0,0,0,.45),
    0 10px 20px -8px rgba(0,0,0,.6);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  transition:transform .2s, border-color .2s, box-shadow .2s;
}
.stat-card:hover{
  transform:translateY(-2px);
  border-color:var(--gold-2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,200,.3),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 6px 0 -1px rgba(0,0,0,.5),
    0 14px 26px -8px rgba(0,0,0,.7),
    0 0 28px rgba(255,199,36,.28);
}
.stat-val{font-size:24px;font-weight:700;color:var(--gold-2);line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(255,199,36,.35)}
.stat-unit{font-size:10px;color:var(--gold-3);margin-top:3px;letter-spacing:.6px;opacity:.75}
.stat-label{font-size:11px;color:var(--ink-2);margin-bottom:9px;letter-spacing:1.2px;text-transform:uppercase}
.stat-metrics{display:flex;align-items:flex-start;gap:0}
.stat-metric{flex:1;min-width:0}
.stat-vdiv{width:1px;background:var(--plate-edge-soft);align-self:stretch;margin:2px 10px 6px;flex-shrink:0}

/* ── monthly consistency ── */
.consistency-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1.8rem}
.consistency-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:.7rem .95rem;
  background:linear-gradient(180deg, rgba(22,30,42,.85), rgba(10,14,22,.85));
  border:1px solid var(--plate-edge-soft);
  box-shadow:inset 0 1px 0 rgba(255,216,74,.1), 0 3px 0 -1px rgba(0,0,0,.4);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  transition:border-color .2s, box-shadow .2s;
}
.consistency-row:hover{border-color:var(--gold-2);box-shadow:inset 0 1px 0 rgba(255,255,200,.2),0 3px 0 -1px rgba(0,0,0,.4),0 0 18px rgba(255,199,36,.18)}
.consistency-name{font-size:13px;color:var(--ink);display:flex;align-items:center;gap:6px;white-space:nowrap}
.consistency-name .count{font-size:12px;color:var(--ink-2);margin-left:4px}
.consistency-name .count b{color:var(--gold-2);font-weight:700}
.progress-bar{position:relative;height:8px;border-radius:0;background:rgba(255,199,36,.08);overflow:hidden;border:1px solid rgba(255,199,36,.12)}
.progress-fill{height:100%;width:0;transition:width .8s cubic-bezier(.25,.46,.45,.94);box-shadow:0 0 8px rgba(255,255,255,.25) inset}
.progress-fill.danger {background:linear-gradient(90deg,#7a1010,#ff5050)}
.progress-fill.warning{background:linear-gradient(90deg,#7a5510,#ffc24a)}
.progress-fill.done   {background:linear-gradient(90deg,#1e6b1e,#7be060)}
.progress-fill.over   {background:linear-gradient(90deg,#a86c10,var(--gold-2),#fff0a0)}
.status-badge{font-size:10px;padding:3px 9px;border-radius:0;white-space:nowrap;letter-spacing:1px;text-transform:uppercase;font-weight:600;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px)}
.status-badge.danger {background:rgba(255,80,80,.15);color:#ff7070;border:1px solid rgba(255,80,80,.4)}
.status-badge.warning{background:rgba(255,194,74,.15);color:var(--gold-1);border:1px solid rgba(255,194,74,.4)}
.status-badge.done   {background:rgba(123,224,96,.15);color:var(--done);border:1px solid rgba(123,224,96,.4)}
.status-badge.over   {background:rgba(255,199,36,.18);color:var(--gold-1);border:1px solid var(--gold-2);font-size:13px;font-weight:800;letter-spacing:0;text-shadow:0 0 6px rgba(255,199,36,.4)}

/* ── weekly quest tiles (Mission Tier feel) ── */
.quest-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:2rem}
@media(max-width:360px){.quest-grid{grid-template-columns:1fr}}
.quest-tile{
  position:relative;padding:26px 18px 22px;text-align:center;user-select:none;
  background:linear-gradient(180deg, rgba(22,30,42,.92), rgba(10,14,22,.92));
  border:1px solid var(--plate-edge-soft);
  box-shadow:
    inset 0 1px 0 rgba(255,216,74,.12),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 5px 0 -1px rgba(0,0,0,.45),
    0 12px 22px -8px rgba(0,0,0,.6);
  clip-path:polygon(14px 0,calc(100% - 14px) 0,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0 calc(100% - 14px),0 14px);
  transition:transform .2s, box-shadow .2s, border-color .2s;
}
.quest-tile:hover{transform:translateY(-2px);border-color:var(--gold-2);box-shadow:inset 0 1px 0 rgba(255,255,200,.3),inset 0 -1px 0 rgba(0,0,0,.5),0 7px 0 -1px rgba(0,0,0,.5),0 16px 30px -8px rgba(0,0,0,.7),0 0 30px rgba(255,199,36,.3)}
.quest-tile.on{
  background:linear-gradient(180deg, rgba(40,80,30,.45), rgba(10,18,12,.92));
  border-color:rgba(123,224,96,.55);
  box-shadow:inset 0 1px 0 rgba(180,255,140,.25),inset 0 -1px 0 rgba(0,0,0,.5),0 5px 0 -1px rgba(0,0,0,.45),0 14px 24px -8px rgba(0,0,0,.6),0 0 22px rgba(123,224,96,.18);
}
.quest-tile .qico{font-size:38px;display:block;margin-bottom:14px;filter:grayscale(1) brightness(.6);opacity:.5;transition:filter .2s, opacity .2s}
.quest-tile.on .qico{filter:none;opacity:1}
.quest-tile .qlabel{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:rgba(255,255,255,.4);font-weight:700;font-family:'Orbitron','Rajdhani',sans-serif}
.quest-tile.on .qlabel{color:var(--done)}
.quest-tile .qcheck{font-size:20px;margin-top:12px;color:rgba(255,255,255,.18)}
.quest-tile.on .qcheck{color:var(--done);text-shadow:0 0 10px rgba(123,224,96,.55)}
.quest-tile .qprog-wrap{margin:12px auto 0;width:75%;height:5px;background:rgba(255,199,36,.1);border:1px solid rgba(255,199,36,.18)}
.quest-tile .qprog-fill{height:100%;background:var(--gold-2);transition:width .6s ease;box-shadow:0 0 8px rgba(255,199,36,.5)}
.quest-tile .qpct{font-size:11px;margin-top:6px;color:var(--gold-2);letter-spacing:.5px}
.quest-tile .qdetail{font-size:10px;margin-top:4px;color:rgba(255,255,255,.35)}
@media(max-width:600px){
  .quest-tile{padding:16px 10px 14px}
  .quest-tile .qico{font-size:28px;margin-bottom:8px}
  .quest-tile .qlabel{font-size:10px;letter-spacing:2.5px}
  .quest-tile .qcheck{font-size:16px;margin-top:8px}
  .quest-tile .qprog-wrap{height:3px;margin-top:8px}
  .quest-tile .qpct{font-size:9px;margin-top:4px}
}
.qprog-or{display:flex;gap:10px;margin:12px auto 0;width:86%}
.qprog-or-slot{flex:1;min-width:0}
.qprog-or-lbl{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,.3);margin-bottom:4px;text-align:center;font-weight:600}
.qprog-or-lbl.met{color:var(--done)}
.qprog-or-bar{height:5px;background:rgba(255,199,36,.12);border:1px solid rgba(255,199,36,.18)}
.qprog-or-fill{height:100%;background:var(--gold-2);transition:width .6s ease;box-shadow:0 0 6px rgba(255,199,36,.45)}
.qprog-or-slot.met .qprog-or-bar{background:rgba(123,224,96,.15);border-color:rgba(123,224,96,.4)}
.qprog-or-slot.met .qprog-or-fill{background:var(--done);box-shadow:0 0 8px rgba(123,224,96,.55)}
.qprog-or-val{font-size:10px;margin-top:5px;text-align:center;color:rgba(255,255,255,.3)}
.qprog-or-slot.met .qprog-or-val{color:var(--done)}
@media(max-width:600px){.qprog-or{gap:6px;margin-top:8px;width:90%}.qprog-or-lbl{font-size:7px;margin-bottom:2px}.qprog-or-bar{height:3px}.qprog-or-val{font-size:8px;margin-top:3px}}
/* SUPER tier — Forerunner gold */
.quest-tile.super{
  background:linear-gradient(180deg, rgba(255,199,36,.18), rgba(60,38,8,.95))!important;
  border-color:var(--gold-2)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,200,.5),inset 0 -1px 0 rgba(0,0,0,.5),0 5px 0 -1px rgba(0,0,0,.45),0 14px 30px -6px rgba(0,0,0,.65),0 0 36px rgba(255,199,36,.45)!important;
}
.quest-tile.super .qlabel{color:var(--gold-1)!important;text-shadow:0 0 8px rgba(255,216,74,.55)}
.quest-tile.super .qcheck{color:var(--gold-1)!important;text-shadow:0 0 12px rgba(255,216,74,.7)}
/* act highlight flash */
.act-highlight{animation:actFlash 1s ease-out}
@keyframes actFlash{0%,40%{background:rgba(255,199,36,.18);border-color:var(--gold-2)}100%{background:inherit;border-color:inherit}}
/* act-strava-link 基礎樣式已移至 activity-modal.css（與 act-detail-btn 同規格）*/
.activity-name-wrap{display:flex;align-items:center;gap:8px;min-width:0;margin-bottom:0}
.lap-toggle{background:transparent;border:none;color:var(--gold-3);font-size:10px;cursor:pointer;padding:2px 4px;letter-spacing:.5px;display:inline-block}
.lap-toggle:hover{color:var(--gold-2)}

/* ── section title (mission banner) ── */
.section-title{
  position:relative;
  font-size:12px;font-weight:700;color:var(--gold-2);letter-spacing:4px;text-transform:uppercase;
  margin:.6rem 0 1rem;padding:8px 0 8px 22px;
  border-bottom:1px solid var(--plate-edge-soft);
  text-shadow:0 0 10px rgba(255,199,36,.4);
  font-family:'Orbitron','Rajdhani',sans-serif;
}
.section-title::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:14px;height:14px;
  background:linear-gradient(135deg, var(--gold-1), var(--gold-3));
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
  box-shadow:0 0 10px rgba(255,199,36,.6);
}
.section-title .muted{color:var(--gold-4);letter-spacing:3px;font-size:10px;margin-left:6px}

/* ── ITT segments (War Games) ── */
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.8rem}
@media(max-width:600px){.seg-grid{grid-template-columns:1fr}}
.seg-card{
  position:relative;
  background:linear-gradient(180deg, rgba(22,30,42,.92), rgba(10,14,22,.92));
  border:1px solid var(--plate-edge-soft);
  box-shadow:inset 0 1px 0 rgba(255,216,74,.12),inset 0 -1px 0 rgba(0,0,0,.5),0 4px 0 -1px rgba(0,0,0,.45),0 12px 22px -8px rgba(0,0,0,.6);
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
  padding:1rem;transition:transform .2s, border-color .2s, box-shadow .2s;
}
.seg-card:hover{transform:translateY(-2px);border-color:var(--gold-2);box-shadow:inset 0 1px 0 rgba(255,255,200,.25),inset 0 -1px 0 rgba(0,0,0,.5),0 6px 0 -1px rgba(0,0,0,.45),0 16px 28px -8px rgba(0,0,0,.7),0 0 28px rgba(255,199,36,.25)}
.seg-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem}
.seg-name{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;letter-spacing:.5px}
.seg-dist{font-size:11px;color:var(--ink-3);margin-top:2px;letter-spacing:1px}
.seg-pr-badge{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:.5rem}
.seg-pr-time{font-size:18px;font-weight:800;color:var(--gold-2);font-variant-numeric:tabular-nums;text-shadow:0 0 10px rgba(255,199,36,.45);font-family:'Orbitron',sans-serif}
.seg-pr-label{font-size:9px;color:var(--gold-3);letter-spacing:2px;text-transform:uppercase}
.seg-table{width:100%;border-collapse:collapse;font-size:11px}
.seg-table th{color:var(--ink-3);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:5px 0;border-bottom:1px solid var(--plate-edge-faint);text-align:left}
.seg-table th:not(:first-child){text-align:right}
.seg-table td{padding:6px 0;color:var(--ink-2);border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.seg-table td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
.seg-row-pr td{color:var(--gold-2) !important;font-weight:700}
.seg-crown{font-size:13px;margin-right:4px}
.seg-time-pr{color:var(--gold-2) !important;text-shadow:0 0 6px rgba(255,199,36,.4)}
.seg-more-wrap{margin-top:0}
.seg-fade{height:30px;margin-top:-30px;background:linear-gradient(transparent,rgba(10,14,22,.95));pointer-events:none}
.seg-more-btn{width:100%;padding:6px 0;background:transparent;border:none;border-top:1px solid var(--plate-edge-faint);color:var(--ink-3);font-size:11px;cursor:pointer;letter-spacing:1.5px;margin-top:2px;display:block;text-transform:uppercase}
.seg-more-btn:hover{color:var(--gold-2)}

/* ── monthly chart ── */
.monthly-chart{margin-bottom:2rem}
.chart-rows{display:flex;flex-direction:column;gap:10px}
.chart-row{display:flex;align-items:center;gap:10px;padding:4px 0}
.chart-label{font-size:12px;color:var(--ink-2);width:24px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.chart-bar-wrap{flex:1;height:42px;background:rgba(255,199,36,.06);overflow:hidden;border:1px solid var(--plate-edge-faint);clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
.chart-bar{
  height:100%;
  background:linear-gradient(90deg,#a86c10,var(--gold-3),var(--gold-2),#fff5b0);
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:10px;min-width:44px;
  width:0;transition:width 1s cubic-bezier(.25,.46,.45,.94);
  box-shadow:inset 0 1px 0 rgba(255,255,200,.3), 0 0 14px rgba(255,199,36,.4);
}
.chart-bar-val{font-size:12px;font-weight:800;color:#1a0d00;white-space:nowrap;text-shadow:0 0 4px rgba(255,255,255,.5);font-variant-numeric:tabular-nums}
.chart-unit-label{font-size:11px;color:var(--ink-3);width:28px;flex-shrink:0;letter-spacing:.5px}

/* ── chart year toggle ── */
.chart-year-header{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:800;color:var(--gold-2);letter-spacing:3px;
  text-transform:uppercase;padding:12px 0 4px;
  cursor:pointer;user-select:none;opacity:.85;
  text-shadow:0 0 8px rgba(255,199,36,.3);
}
.chart-year-header:hover{opacity:1}
.chart-year-arrow{transition:transform .25s;font-style:normal;font-size:10px}
.chart-year-rows{overflow:hidden;transition:max-height .35s ease}

/* ── sport tabs ── */
.sport-tabs{display:flex;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap}
.sport-tab{
  display:flex;align-items:center;gap:5px;
  font-size:12px;padding:6px 16px;font-weight:600;letter-spacing:1.5px;
  border:1px solid var(--plate-edge-soft);color:var(--ink-2);background:rgba(255,255,255,.02);
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
  font-family:inherit;text-transform:uppercase;
}
.sport-tab.active{background:rgba(255,199,36,.18);border-color:var(--gold-2);color:var(--gold-1);box-shadow:0 0 14px rgba(255,199,36,.3)}
.sport-tab:hover:not(.active){border-color:var(--plate-edge);color:var(--gold-2)}

/* ── timeline ── */
.timeline{margin-bottom:2rem}
.timeline-day{margin-bottom:1.4rem}
.timeline-date{
  font-size:16px;font-weight:700;color:var(--gold-2);
  margin-bottom:.7rem;padding-left:24px;position:relative;letter-spacing:1.5px;
  font-family:'Orbitron',sans-serif;text-shadow:0 0 8px rgba(255,199,36,.35);
}
.timeline-date::before{
  content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:12px;height:12px;background:var(--gold-2);
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
  box-shadow:0 0 12px rgba(255,199,36,.7);
}
.activity-card{
  position:relative;display:flex;align-items:flex-start;gap:12px;
  padding:.85rem 1rem;
  background:linear-gradient(180deg, rgba(22,30,42,.85), rgba(10,14,22,.85));
  border:1px solid var(--plate-edge-faint);
  box-shadow:inset 0 1px 0 rgba(255,216,74,.08),0 3px 0 -1px rgba(0,0,0,.4);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  margin-bottom:8px;margin-left:24px;
  transition:transform .2s, border-color .2s, box-shadow .2s;
}
.activity-card:hover{
  transform:translateY(-1px);
  border-color:var(--gold-2);
  box-shadow:inset 0 1px 0 rgba(255,255,200,.2),0 4px 0 -1px rgba(0,0,0,.45),0 10px 20px -8px rgba(0,0,0,.6),0 0 22px rgba(255,199,36,.25);
}
.activity-icon{
  width:46px;height:46px;flex-shrink:0;
  background:linear-gradient(135deg, rgba(255,199,36,.22), rgba(168,108,16,.18));
  border:1px solid var(--plate-edge);
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  box-shadow:inset 0 0 10px rgba(0,0,0,.4);
}
.activity-icon svg{width:24px;height:24px;fill:var(--gold-2);filter:drop-shadow(0 0 4px rgba(255,199,36,.5))}
.activity-info{flex:1;min-width:0}
.activity-name{font-size:15px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;letter-spacing:.3px}
.indoor-tag,.bike-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;line-height:1;padding:2px 5px 2px 4px;vertical-align:middle;margin-right:5px;flex-shrink:0;white-space:nowrap;clip-path:polygon(3px 0,100% 0,100% calc(100% - 3px),calc(100% - 3px) 100%,0 100%,0 3px)}
.indoor-tag{background:rgba(66,184,255,.12);color:var(--cortana-1);border:1px solid rgba(66,184,255,.4)}
.bike-tag{background:rgba(255,199,36,.12);color:var(--gold-1);border:1px solid var(--plate-edge)}
.activity-meta{font-size:11px;color:var(--ink-3);margin-top:3px}
.activity-meta .tag{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(255,199,36,.07);border:1px solid var(--plate-edge-faint);
  padding:2px 8px;margin-right:4px;margin-top:3px;
  color:var(--gold-3);font-size:11.5px;white-space:nowrap;letter-spacing:.3px;
}
.activity-meta .tag.hr{border-color:rgba(255,80,80,.3);background:rgba(255,80,80,.07);color:#e07070}
.activity-dist{font-size:18px;font-weight:800;color:var(--gold-2);flex-shrink:0;white-space:nowrap;padding-top:2px;line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 8px rgba(255,199,36,.35);font-family:'Orbitron',sans-serif}
/* lap strip */
.lap-strip{
  margin-top:4px;padding:4px 8px;
  background:rgba(255,199,36,.05);border:1px solid var(--plate-edge-faint);
  font-size:11px;color:var(--ink-2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.lap-strip .lap-name{color:var(--gold-3);font-weight:600;font-size:11px}
.lap-strip .lap-tag{color:var(--ink-2);white-space:nowrap}
/* power metrics (IF / TSS) */
.power-metrics{display:inline-flex;gap:8px;margin-top:5px}
.power-metrics .pm-pill{
  font-size:10px;font-weight:700;letter-spacing:.5px;
  padding:2px 8px;
  background:rgba(66,184,255,.1);border:1px solid rgba(66,184,255,.35);
  color:var(--cortana-1);white-space:nowrap;
  clip-path:polygon(3px 0,100% 0,100% calc(100% - 3px),calc(100% - 3px) 100%,0 100%,0 3px);
}
.empty{font-size:13px;color:var(--ink-3);padding:2rem 0;text-align:center;letter-spacing:1px}

/* ── show more ── */
.show-more-btn{
  width:100%;padding:11px;margin-top:6px;
  border:1px solid var(--plate-edge);background:rgba(255,199,36,.05);
  color:var(--gold-2);font-size:12px;cursor:pointer;letter-spacing:2px;
  transition:all .2s;text-transform:uppercase;font-weight:600;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  font-family:inherit;
}
.show-more-btn:hover{background:rgba(255,199,36,.18);box-shadow:0 0 18px rgba(255,199,36,.35)}

/* ITT inline badge in activity log */
.itt-badge{display:flex;align-items:center;gap:10px;padding:6px 12px 7px 12px;border-left:2px solid var(--plate-edge-soft);margin:4px 0 0;background:rgba(255,199,36,.04)}
.itt-badge.pr{background:rgba(255,199,36,.11);border-left-color:var(--gold-2);box-shadow:inset 0 0 12px rgba(255,199,36,.08)}
.itt-crown{font-size:17px;line-height:1;flex-shrink:0}
.itt-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.itt-seg-name{font-size:9px;color:var(--ink-3);letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itt-badge.pr .itt-seg-name{color:var(--gold-3)}
.itt-time{font-size:13px;font-weight:700;color:var(--gold-2);line-height:1;font-family:'Orbitron',sans-serif}
.itt-attempt{font-size:9px;color:var(--ink-3);letter-spacing:1px}
.itt-badge.pr .itt-attempt{color:var(--gold-3)}

/* ── bottom totals ── */
.totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.6rem}
.total-card{
  position:relative;padding:1rem;text-align:center;
  background:linear-gradient(180deg, rgba(22,30,42,.85), rgba(10,14,22,.85));
  border:1px solid var(--plate-edge-soft);
  box-shadow:inset 0 1px 0 rgba(255,216,74,.1),0 4px 0 -1px rgba(0,0,0,.4),0 10px 20px -8px rgba(0,0,0,.55);
  clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
  transition:transform .2s, border-color .2s, box-shadow .2s;
}
.total-card:hover{transform:translateY(-2px);border-color:var(--gold-2);box-shadow:inset 0 1px 0 rgba(255,255,200,.25),0 6px 0 -1px rgba(0,0,0,.45),0 14px 24px -8px rgba(0,0,0,.65),0 0 26px rgba(255,199,36,.25)}
.total-val{font-size:22px;font-weight:800;color:var(--gold-2);text-shadow:0 0 10px rgba(255,199,36,.4);font-family:'Orbitron',sans-serif;font-variant-numeric:tabular-nums}
.total-label{font-size:10px;color:var(--ink-3);letter-spacing:2.5px;text-transform:uppercase;margin-top:5px;font-weight:600}

/* ── CTA button ── */
.strava-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:14px;
  background:linear-gradient(135deg, rgba(255,199,36,.14), rgba(168,108,16,.08));
  border:1px solid var(--gold-2);color:var(--gold-1);font-size:13px;font-weight:700;letter-spacing:2px;
  text-decoration:none;transition:all .2s;text-transform:uppercase;
  clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
  box-shadow:inset 0 1px 0 rgba(255,255,200,.18),0 4px 0 -1px rgba(0,0,0,.45),0 12px 22px -8px rgba(0,0,0,.6);
}
.strava-cta:hover{background:linear-gradient(135deg, rgba(255,199,36,.3), rgba(168,108,16,.18));box-shadow:inset 0 1px 0 rgba(255,255,200,.3),0 6px 0 -1px rgba(0,0,0,.5),0 16px 26px -8px rgba(0,0,0,.7),0 0 28px rgba(255,199,36,.4)}
.strava-cta svg{width:16px;height:16px;fill:var(--gold-1);flex-shrink:0;filter:drop-shadow(0 0 4px rgba(255,199,36,.5))}

/* ── loading / error ── */
.loading{text-align:center;padding:4rem 0;color:var(--gold-2);font-size:14px;letter-spacing:2px;font-family:'Orbitron',sans-serif;animation:halo-pulse 1.6s ease-in-out infinite}
@keyframes halo-pulse{0%,100%{opacity:.5}50%{opacity:1;text-shadow:0 0 14px rgba(255,199,36,.6)}}

@media(max-width:520px){
  #app{padding:0 .9rem 5rem}
  .topbar{padding:12px .9rem;margin:0 -.9rem 12px;gap:8px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .hero{padding:1.2rem 1rem}
  .hero-info h1{font-size:22px;letter-spacing:1.5px}
  .stat-val{font-size:19px}
  .totals-grid{grid-template-columns:repeat(3,1fr)}
  .total-val{font-size:17px}
  .consistency-row{grid-template-columns:auto 1fr;row-gap:8px}
  .consistency-row .status-badge{grid-column:1 / -1;justify-self:start}
}
@media(max-width:420px){
  .topbar-title{letter-spacing:1.8px;font-size:10px}
  .avatar{width:90px;height:90px}
  .hero{gap:1rem;padding:1.1rem 1rem}
  .activity-card{align-items:flex-start;gap:9px;padding:.75rem .85rem;margin-left:0}
  .activity-icon{width:38px;height:38px}
  .activity-name-wrap{flex-wrap:wrap}
  .activity-name{white-space:normal;overflow:visible;text-overflow:clip}
  .activity-dist{font-size:16px;margin-left:auto}
  .itt-badge{align-items:flex-start;gap:8px}
  .itt-attempt{text-align:right;max-width:38%}
  .totals-grid{grid-template-columns:1fr}
  #theme-switcher{right:12px;bottom:18px}
  #ts-toggle{width:38px;height:38px}
  #ts-panel{max-width:calc(100vw - 24px)}
  #to-top-btn{right:14px!important;bottom:74px!important}
}

/* ── power PR card (Mjolnir Power Core) ── */
.hero-power-card{
  flex:1;min-width:280px;max-width:520px;align-self:center;
  position:relative;
  padding:12px 16px;
  background:
    linear-gradient(160deg,rgba(255,199,36,.14),rgba(255,199,36,.02) 60%,rgba(0,0,0,.5)),
    linear-gradient(180deg,rgba(20,28,40,.9),rgba(10,14,22,.95));
  border:1px solid var(--gold-2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,200,.22),
    inset 0 -1px 0 rgba(0,0,0,.5),
    0 0 18px rgba(255,199,36,.18),
    0 6px 0 -1px rgba(0,0,0,.5),
    0 14px 28px -10px rgba(0,0,0,.7);
  cursor:pointer;overflow:hidden;user-select:none;
  transition:transform .25s, border-color .2s, box-shadow .2s;
  clip-path:polygon(12px 0,calc(100% - 12px) 0,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0 calc(100% - 12px),0 12px);
}
.hero-power-card::before,.hero-power-card::after{
  content:'';position:absolute;width:12px;height:12px;border:1.5px solid var(--gold-1);pointer-events:none;
}
.hero-power-card::before{top:6px;left:6px;border-right:none;border-bottom:none}
.hero-power-card::after{bottom:6px;right:6px;border-left:none;border-top:none}
.hero-power-card:hover{transform:translateY(-2px);border-color:#fff5b0;box-shadow:inset 0 1px 0 rgba(255,255,220,.4),inset 0 -1px 0 rgba(0,0,0,.5),0 0 36px rgba(255,199,36,.45),0 8px 0 -1px rgba(0,0,0,.5),0 18px 32px -10px rgba(0,0,0,.75)}
.hpc-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:9px}
.hpc-head-l{display:flex;align-items:baseline;gap:6px}
.hpc-title{font-size:12px;color:var(--gold-1);font-weight:800;letter-spacing:2px;text-shadow:0 0 8px rgba(255,199,36,.4);font-family:'Orbitron',sans-serif}
.hpc-title-en{font-size:8px;color:var(--gold-3);letter-spacing:2.5px}
.hpc-hero-tag{font-size:9px;color:var(--ink-2);letter-spacing:1.2px;font-variant-numeric:tabular-nums}
.hpc-hero-tag b{color:var(--gold-1);font-size:13px;font-weight:800;margin:0 2px;font-family:'Orbitron',sans-serif}
.hpc-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:4px}
.hpc-mini{padding:6px 1px;text-align:center;border:1px solid var(--plate-edge-soft);background:rgba(255,199,36,.05);clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);transition:all .15s;min-width:0;overflow:hidden}
.hpc-mini:hover{border-color:var(--gold-2);background:rgba(255,199,36,.14);box-shadow:0 0 12px rgba(255,199,36,.25)}
.hpc-mini-lbl{font-size:8px;color:var(--ink-2);letter-spacing:.2px;white-space:nowrap}
.hpc-mini-val{font-size:clamp(10px,2.2vw,13px);color:var(--gold-2);font-weight:800;margin-top:2px;line-height:1.1;font-variant-numeric:tabular-nums;font-family:'Orbitron',sans-serif;white-space:nowrap}
.hpc-mini-val small{font-size:7px;color:var(--gold-3);margin-left:1px;font-weight:600}
.hpc-mini.empty .hpc-mini-val{color:var(--gold-4);font-size:13px}
.hpc-mini.more{background:rgba(255,199,36,.14);border-color:var(--gold-2)}
.hpc-mini.more .hpc-mini-val{font-size:13px;color:var(--gold-1);letter-spacing:1px}
.hero-power-card.opening{animation:hpcOpen .45s cubic-bezier(.5,0,.4,1.4) forwards}
@keyframes hpcOpen{
  0%{transform:scale(1);box-shadow:0 0 18px rgba(255,199,36,.18)}
  40%{transform:scale(.95);box-shadow:0 0 70px rgba(255,199,36,.7),inset 0 0 50px rgba(255,199,36,.35)}
  100%{transform:scale(1.06);opacity:0}
}

/* ── power modal ── */
.pwr-modal-overlay{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center,rgba(40,28,8,.85) 0%,rgba(0,0,0,.95) 70%);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s ease;padding:12px;
}
.pwr-modal-overlay.open{opacity:1;pointer-events:auto}
.pwr-modal{
  position:relative;width:100%;max-width:780px;max-height:88vh;
  background:linear-gradient(160deg,rgba(20,28,40,.97),rgba(0,0,0,.99));
  border:1.5px solid var(--gold-2);
  padding:20px 22px 16px;
  box-shadow:0 0 60px rgba(255,199,36,.45),inset 0 0 40px rgba(255,199,36,.05);
  transform:scale(.5) rotate(-5deg);opacity:0;
  transition:transform .5s cubic-bezier(.2,1.2,.3,1.05),opacity .3s ease;
  display:flex;flex-direction:column;overflow:hidden;
  clip-path:polygon(18px 0,calc(100% - 18px) 0,100% 18px,100% calc(100% - 18px),calc(100% - 18px) 100%,18px 100%,0 calc(100% - 18px),0 18px);
}
.pwr-modal-overlay.open .pwr-modal{transform:scale(1) rotate(0);opacity:1}
.pwr-modal::before,.pwr-modal::after{content:'';position:absolute;width:18px;height:18px;border:2px solid var(--gold-1);pointer-events:none}
.pwr-modal::before{top:8px;left:8px;border-right:none;border-bottom:none}
.pwr-modal::after{bottom:8px;right:8px;border-left:none;border-top:none}
.pm-body{flex:1;overflow-y:auto;padding-right:4px}
.pm-body::-webkit-scrollbar{width:4px}
.pm-body::-webkit-scrollbar-thumb{background:rgba(255,199,36,.5)}
.pm-close{
  position:absolute;top:12px;right:12px;width:30px;height:30px;
  background:transparent;border:1px solid var(--gold-2);color:var(--gold-2);
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:2;
  clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
}
.pm-close:hover{background:rgba(255,199,36,.25);transform:rotate(90deg);box-shadow:0 0 14px rgba(255,199,36,.5)}
.pm-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;padding-right:38px}
.pm-head h2{font-size:17px;color:var(--gold-1);font-weight:800;letter-spacing:2px;margin:0;text-shadow:0 0 10px rgba(255,199,36,.4);font-family:'Orbitron',sans-serif}
.pm-head .en{font-size:9px;color:var(--gold-3);letter-spacing:3px}
.pm-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--plate-edge-soft)}

<script>
/* ── star canvas ── */
;(function(){
  const c=document.getElementById('star-canvas'),ctx=c.getContext('2d')
  let W,H,stars=[]
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  function init(){stars=[];const n=Math.floor(W*H/3500);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2,a:Math.random(),da:(Math.random()-.5)*.006,speed:Math.random()*.1+.02})}
  function draw(){ctx.clearRect(0,0,W,H);stars.forEach(s=>{s.a+=s.da;if(s.a<0||s.a>1)s.da*=-1;s.y-=s.speed;if(s.y<0)s.y=H;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,216,140,${s.a*.55})`;ctx.fill()});requestAnimationFrame(draw)}
  resize();init();draw()
  addEventListener('resize',()=>{resize();init()})
})()

/* ── SVG icons ── */
