  weight: '<path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/>',
}
const INDOOR_TAG = '<span class="indoor-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/><line x1="12" y1="9.5" x2="12" y2="3"/><line x1="12" y1="14.5" x2="12" y2="21"/><line x1="9.5" y1="12" x2="3" y2="12"/><line x1="14.5" y1="12" x2="21" y2="12"/></svg>飛輪機</span>'
const BIKE_TAG   = '<span class="bike-tag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 15.5,8.5 22,9.5 17,14.5 18.5,22 12,18.5 5.5,22 7,14.5 2,9.5 8.5,8.5"/></svg>TCR Pro 0</span>'

/* ── helpers ── */
function toggleLaps(btn, gid) {
  const els = [...document.querySelectorAll('[data-lapgrp="' + gid + '"]')]
  if (!els.length) return
  const show = els[0].style.display === 'none'
  els.forEach(e => { e.style.display = show ? '' : 'none' })
  btn.textContent = show ? '▲ 收起' : '▼ +' + els.length + ' 分段'
}
function fmtMovingTime(hr) {
  // PRD FR-4: 避免 "1:00" 歧義，改為 "45 分" / "1 小時" / "1 小時 30 分"
  const totalMin = Math.max(0, Math.round((hr || 0) * 60))
  if (totalMin < 60) return `${totalMin} 分`
  const h = Math.floor(totalMin / 60)
  const m = totalMin % 60
  if (m === 0) return `${h} 小時`
  return `${h} 小時 ${m} 分`
}
const SPORT_META = {
  ride:   { icon: '🚴', label: '單車' },
  run:    { icon: '🏃', label: '跑步' },
  swim:   { icon: '🏊', label: '游泳' },
  weight: { icon: '🏋️', label: '重訓' },
}
const STATUS_META = {
  danger:  { emoji: '🔴', text: '嚴重落後' },
  warning: { emoji: '🟡', text: '近期需補課' },
  done:    { emoji: '🟢', text: '達標' },
  over:    { emoji: '🔥', text: '超標' },
}
function renderMonthlySummary(ms) {
  if (!ms) return ''
  const m = (v, u) => `<div class="stat-metric"><div class="stat-val">${v}</div><div class="stat-unit">${u}</div></div>`
  const div = '<div class="stat-vdiv"></div>'
  const hr = v => v != null ? v : '—'
  return `
    <div class="section-title">本月訓練量 <span class="muted">· MONTHLY SUMMARY</span></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">🚴 單車</div><div class="stat-metrics">${m((+(ms.ride_km??0)).toFixed(1),'km')}${div}${m(hr(ms.ride_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏃 跑步</div><div class="stat-metrics">${m((+(ms.run_km??0)).toFixed(1),'km')}${div}${m(hr(ms.run_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏔️ 游泳</div><div class="stat-metrics">${m(ms.swim_m??0,'m')}${div}${m(hr(ms.swim_hr),'hr')}</div></div>
      <div class="stat-card"><div class="stat-label">🏋️ 重訓</div><div class="stat-metrics">${m(ms.weight_count??0,'次')}${div}${m(hr(ms.weight_hr),'hr')}</div></div>
    </div>`
}
function renderMonthlyGoals(mg) {
  if (!mg) return ''
  const order = ['ride','run','swim','weight']
  const rows = order.map(k => {
    const g = mg[k]; if (!g) return ''
    const meta = SPORT_META[k]
    const sm = STATUS_META[g.status] || STATUS_META.danger
    const pct = Math.min(100, g.target > 0 ? (g.count / g.target) * 100 : 0)
    const badgeLabel = g.status === 'over' ? `+${g.count - g.target}` : `${sm.emoji} ${sm.text}`
    return `
      <div class="consistency-row">
        <div class="consistency-name">${meta.icon} ${meta.label}<span class="count"><b>${g.count}</b> / ${g.target}</span></div>
        <div class="progress-bar"><div class="progress-fill ${g.status}" data-pct="${pct}"></div></div>
        <div class="status-badge ${g.status}">${badgeLabel}</div>
      </div>`
  }).join('')
  return `
    <div class="section-title">月度紀律 <span class="muted">· MONTHLY CONSISTENCY</span></div>
    <div class="consistency-list">${rows}</div>`
}
const TRAIN_PART_IMAGE_MAP = {
  chest: 'docs/chest.png',
  back: 'docs/back.png',
  legs: 'docs/legs.png',
  shoulders: 'docs/shoulders.png',
  arms: 'docs/arms.png',
}
function normalizeTrainParts(parts) {
  return {
    chest: !!parts?.chest,
    back: !!parts?.back,
    legs: !!parts?.legs,
    shoulders: !!(parts?.shoulders || parts?.shoulder),
    arms: !!(parts?.arms || parts?.arm),
  }
}
function detectTrainPartsFromActivities(weightActs) {
  const text = (weightActs || []).map(a => (a?.name || '')).join(' ').toLowerCase()
  return {
    chest: text.includes('胸') || text.includes('chest'),
    back: text.includes('背') || text.includes('back'),
    legs: text.includes('腿') || text.includes('leg') || text.includes('legs'),
    shoulders: text.includes('肩') || text.includes('shoulder') || text.includes('shoulders'),
    arms: text.includes('手') || text.includes('arm') || text.includes('arms') || text.includes('三頭') || text.includes('二頭'),
  }
}
function renderTrainPartIcons(parts) {
  const normalized = normalizeTrainParts(parts)
  const matched = ['chest', 'back', 'legs', 'shoulders', 'arms'].filter(k => normalized[k])
  if (!matched.length) return ''
  return `<div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">${matched.map(k => `<img src="${TRAIN_PART_IMAGE_MAP[k]}" alt="${k}" title="${k}" style="width:42px;height:42px;object-fit:contain;padding:4px;border-radius:10px;background:rgba(255,255,255,.09);border:1px solid rgba(255,199,36,.45);box-shadow:0 0 0 1px rgba(255,255,255,.04) inset,0 4px 10px rgba(0,0,0,.25);">`).join('')}</div>`
}
function renderWeeklyQuest(wq) {
  if (!wq) return ''
  const wqSports = [
    { key:'ride',   icon:'🚴', label:'RIDE',  isOr:true,  tKm:'30KM', tHr:'1HR' },
    { key:'run',    icon:'🏃', label:'RUN',   isOr:true,  tKm:'10KM', tHr:'1HR' },
    { key:'swim',   icon:'🏊', label:'SWIM',  isOr:true,  tKm:'1000M', tHr:'1HR', unit:'m' },
    { key:'weight', icon:'🏋️', label:'TRAIN', isOr:false, targetLabel:'1 次'   },
  ]
  function isDone(v)  { return typeof v === 'object' ? v.done  : !!v }
  function isSuper(v) { return typeof v === 'object' && !!v.super }
  const tiles = wqSports.map(sp => {
    const val = wq[sp.key]
    const on = isDone(val), sup = isSuper(val)
    const cls = `quest-tile${sup ? ' on super' : on ? ' on' : ''}`
    if (sp.isOr && typeof val === 'object') {
      const isM = sp.unit === 'm'
      const d = isM ? (val.distance_m || 0) : (val.distance_km || 0)
      const tD = isM ? val.target_m : val.target_km
      const dStr = isM ? `${d}m` : `${d}km`
      const h = val.moving_time_hr || 0
      const dPct = Math.min(100, Math.round(d / tD * 100))
      const hPct = Math.min(100, Math.round(h / val.target_hr * 100))
      const dMet = dPct >= 100, hMet = hPct >= 100
      const body = (on || sup)
        ? `<div class="qcheck">${sup ? '⚡' : '✓'}</div>
          <div class="qpct" style="margin-top:5px;color:${sup ? 'rgba(255,210,0,.85)' : 'rgba(63,204,74,.65)'}">${dStr} · ${h}hr</div>`
        : `<div class="qcheck"><span style="font-size:7px;letter-spacing:2px;color:rgba(255,199,36,.28)">OR</span></div>
          <div class="qprog-or">
            <div class="qprog-or-slot${dMet ? ' met' : ''}">
              <div class="qprog-or-lbl${dMet ? ' met' : ''}">${sp.tKm}</div>
              <div class="qprog-or-bar"><div class="qprog-or-fill" style="width:${dPct}%"></div></div>
              <div class="qprog-or-val">${dStr}</div>
            </div>
            <div class="qprog-or-slot${hMet ? ' met' : ''}">
              <div class="qprog-or-lbl${hMet ? ' met' : ''}">${sp.tHr}</div>
              <div class="qprog-or-bar"><div class="qprog-or-fill" style="width:${hPct}%"></div></div>
              <div class="qprog-or-val">${h}hr</div>
            </div>
          </div>`
      return `<div class="${cls}"><span class="qico">${sp.icon}</span><div class="qlabel">${sp.label}</div>${body}</div>`
    }
    const pct = (() => {
      if (typeof val !== 'object') return val ? 100 : 0
      if (sp.key === 'swim') return Math.min(100, Math.round((val.distance_m||0)/val.target_m*100))
      return val.count >= val.target ? 100 : 0
    })()
    const detail = typeof val === 'object' ? (sp.key==='swim' ? `${val.distance_m||0}m` : `${val.count||0} 次`) : ''
    const progHtml = !on ? `
      <div class="qprog-wrap"><div class="qprog-fill" style="width:${pct}%"></div></div>
      <div class="qpct">${detail ? `${detail} · ` : ''}${pct}%</div>` : ''
    return `<div class="${cls}">
      <span class="qico">${sp.icon}</span>
      <div class="qlabel">${sp.label}</div>
      <div class="qcheck">${on ? '✓' : `<span style="font-size:9px;color:rgba(255,199,36,.3)">${sp.targetLabel}</span>`}</div>
      ${progHtml}
      ${sp.key === 'weight' ? renderTrainPartIcons(val?.parts) : ''}
    </div>`
  }).join('')
  return `
    <div class="section-title">本週任務 <span class="muted">· WEEKLY QUEST</span></div>
    <div class="quest-grid">${tiles}</div>`
}
function renderSegments(segs) {
  if (!segs || segs.length === 0) return ''
  const _today = new Date(Date.now() + 8*3600*1000).toISOString().slice(0,10)
  const _sincePRLine = (efforts) => {
    const pr = efforts.find(e => e.is_pr)
    if (!pr || !pr.date) return ''
    const d = Math.max(0, Math.round((Date.parse(_today) - Date.parse(pr.date.slice(0,10))) / 86400000))
    if (d === 0) return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:linear-gradient(90deg,rgba(255,199,36,.18),rgba(255,199,36,.04));border-left:3px solid #ffc724;border-radius:4px;letter-spacing:.5px">🔥 今天創下最快紀錄！</div>`
    return `<div class="seg-since-pr" style="margin:6px 0 10px;padding:7px 11px;font-size:11.5px;background:rgba(255,255,255,.04);border-left:3px solid rgba(255,199,36,.55);border-radius:4px;opacity:.85;letter-spacing:.5px">⏱ 距PR紀錄已 <b style="font-weight:700;color:#ffc724">${d}</b> 天</div>`
  }
  const cards = segs.map(seg => {
    const sorted = seg.efforts.slice().sort((a,b) => (a.date||'').localeCompare(b.date||''))
    const rowArr = seg.efforts.map(e => {
      const crown = e.is_pr ? '<span class="seg-crown">👑</span>' : ''
      const timeClass = e.is_pr ? ' seg-time-pr' : ''
      const watts = e.avg_watts ? `${e.avg_watts}W` : '—'
      const hr    = e.avg_heartrate ? `${e.avg_heartrate}` : '—'
      const dateKey = (e.date || '').slice(0, 10)
      return `<tr class="${e.is_pr ? 'seg-row-pr' : ''}" data-date="${dateKey}" data-actid="${e.activity_id || ''}" style="cursor:pointer" title="跳至活動紀錄">
        <td>${fmtDate(e.date)}</td>
        <td class="${timeClass}">${crown}${e.elapsed_str}</td>
        <td>${watts}</td>
        <td>${hr}</td>
      </tr>`
    })
    const visRows  = rowArr.slice(0, 2).join('')
    const moreRows = rowArr.slice(2).join('')
    const extraTbody = moreRows ? `<tbody class="seg-extra" style="display:none">${moreRows}</tbody>` : ''
    const moreWrap   = moreRows ? `<div class="seg-more-wrap"><div class="seg-fade"></div><button class="seg-more-btn" onclick="var c=this.closest('.seg-card');c.querySelector('.seg-extra').style.display='';this.closest('.seg-more-wrap').remove()">▼ 全部 ${rowArr.length} 筆</button></div>` : ''
    return `<div class="seg-card">
      <div class="seg-header">
        <div>
          <div class="seg-name">${seg.name}</div>
          <div class="seg-dist">${seg.distance_km} km</div>
        </div>
        ${seg.pr_time_str ? `<div class="seg-pr-badge">
          <div class="seg-pr-time">${seg.pr_time_str}</div>
          <div class="seg-pr-label">PR</div>
        </div>` : ''}
      </div>
      ${_sincePRLine(seg.efforts)}
      <table class="seg-table">
        <thead><tr><th>日期</th><th>時間</th><th>功率</th><th>HR</th></tr></thead>
        <tbody>${visRows}</tbody>${extraTbody}
      </table>${moreWrap}
    </div>`
  }).join('')
  return `
    <div class="section-title">ITT 區間 <span class="muted">· SEGMENT EFFORTS</span></div>
    <div class="seg-grid">${cards}</div>`
}
function fmtDate(d) {
  // "2026-04-22" → "04 / 22"
  const [,mm,dd] = d.split('-')
  return `${mm} / ${dd}`
}
function fmtMonthLabel(m) {
  return m.replace(/^\d{4}-/, '')
}
function monthDist(h) {
  if (h.ride && typeof h.ride === 'object') return h.ride.distance_km || 0
  return h.distance_km || 0
}

/* ── group activities by date ── */
function groupByDate(list) {
  const map = {}
  ;(list || []).forEach(a => {
    const d = (a.date || '').slice(0, 10)
    if (!map[d]) map[d] = []
    map[d].push(a)
  })
  // days: newest first; within each day: earliest first (by time field)
  return Object.entries(map)
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([d, acts]) => [
      d,
      acts.slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''))
    ])
}

/* ── render timeline ── */
function renderTimeline(list, type, expanded, ittMap) {
  if (!list || !list.length) return '<div class="empty">暫無資料</div>'
  const isAll    = type === 'all'
  const icon = ICONS[type] || ICONS.ride
  const groups = groupByDate(list)
  const LIMIT = 10
  const hasMore = !expanded && groups.length > LIMIT
  const visible = hasMore ? groups.slice(0, LIMIT) : groups

  const html = visible.map(([date, acts]) => `
    <div class="timeline-day" id="act-${date}">
      <div class="timeline-date">${fmtDate(date)}</div>
      ${acts.map(a => {
        const aType    = isAll ? (a._type || 'ride') : type
        const aIsWeight = aType === 'weight'
        const aIsSwim   = aType === 'swim'
        const aIsRun    = aType === 'run'
        const aIsRide   = aType === 'ride'
        const aIcon = ICONS[aType] || ICONS.ride
        const tags = []
        if (aIsSwim && a.distance_km)   tags.push(`<span class="tag">🏊 ${Math.round(a.distance_km * 1000)} m</span>`)
        tags.push(`<span class="tag">⏱ ${fmtMovingTime(a.moving_time_hr || 0)}</span>`)
        if (!aIsWeight && !aIsSwim && a.elevation_m >= 100) tags.push(`<span class="tag">↑${a.elevation_m}m</span>`)
        if (aIsRun && a.avg_pace_km)     tags.push(`<span class="tag">💨 ${a.avg_pace_km}/km</span>`)
        if (aIsRun && a.avg_cadence_spm) tags.push(`<span class="tag">🦵 ${a.avg_cadence_spm} spm</span>`)
        if (!aIsRun && !aIsSwim && !aIsWeight && a.avg_speed_kmh) tags.push(`<span class="tag">${a.avg_speed_kmh} km/h</span>`)
        if (aIsSwim && a.pace_per_100m)  tags.push(`<span class="tag">💧 ${a.pace_per_100m}/100m</span>`)
        if (a.avg_heartrate)             tags.push(`<span class="tag hr">♥️ ${a.avg_heartrate}${a.max_heartrate ? ` / <b style="color:#ff7080">${a.max_heartrate}</b>` : ''} bpm</span>`)
        const lapArr = (aIsRide && a.top_laps) ? a.top_laps.slice(0, 10) : []
        const lapHtml = lapArr.length ? (() => {
          const lid = a.id || Math.floor(Date.now()*Math.random())
          const mkLap = l => `<div class="lap-strip"><span class="lap-name">🏁 ${l.name}</span><span class="lap-tag">⏱ ${l.moving_time_str}</span>${l.average_heartrate?`<span class="lap-tag">♥️ ${l.average_heartrate}</span>`:''}${l.average_watts?`<span class="lap-tag">⚡ ${l.average_watts}W</span>`:''}</div>`
          const vis = lapArr.slice(0,3).map(mkLap).join('')
          const hidLaps = lapArr.slice(3)
          if (!hidLaps.length) return vis
          return vis + hidLaps.map(l=>mkLap(l).replace('<div class="lap-strip">',`<div class="lap-strip" data-lapgrp="${lid}" style="display:none">`)).join('') +
            `<button class="lap-toggle" onclick="toggleLaps(this,'${lid}')">▼ +${hidLaps.length} 分段</button>`
        })() : ''
        const showPower = aIsRide && (lapArr.length > 0 || a.sport_type === 'Ride') && (a.if_score != null || a.tss != null)
        const powerHtml = showPower
          ? `<div class="power-metrics">${a.if_score != null ? `<span class="pm-pill">IF ${a.if_score}</span>` : ''}${a.tss != null ? `<span class="pm-pill">TSS ${a.tss}</span>` : ''}</div>`
          : ''
        const stravaLink = a.id ? `<a class="act-strava-link" href="https://www.strava.com/activities/${a.id}" target="_blank" rel="noopener">Strava ↗</a>` : ''
        const ittBadges = (aIsRide && ittMap && ittMap[date])
          ? ittMap[date].map(it => {
              const isPr = it.is_pr
              const crown = isPr ? '👑' : `<span style="font-size:11px;color:#555">#${it.attemptNum}</span>`
              const rankStr = it.rank ? (it.rank === 1 ? '🥇 第1名' : `第${it.rank}名`) : ''
              const attempt = isPr ? `第${it.attemptNum}次 · 🏆 PR ${rankStr}` : `第${it.attemptNum} / ${it.total} 次 · ${rankStr}`
              return `<div class="itt-badge${isPr ? ' pr' : ''}">
                <div class="itt-crown">${crown}</div>
                <div class="itt-info">
                  <div class="itt-seg-name">${it.segName}</div>
                  <div class="itt-time">${it.elapsed_str}</div>
                </div>
                <div class="itt-attempt">${attempt}</div>
              </div>`
            }).join('')
          : ''
        return `
        <div class="activity-card">
          <div class="activity-icon"><svg viewBox="0 0 24 24">${aIcon}</svg></div>
          <div class="activity-info">
            <div class="activity-name-wrap"><div class="activity-name">${a.trainer ? INDOOR_TAG : (aIsRide ? BIKE_TAG : '')}${a.name || '—'}</div>${stravaLink}</div>
            <div class="activity-meta">${tags.join('')}</div>
            ${powerHtml}
            ${lapHtml}
            ${ittBadges}
          </div>
          ${(!aIsWeight && !aIsSwim && a.distance_km) ? `<div class="activity-dist">${a.distance_km}<small style="font-size:11px;font-weight:400;margin-left:2px">km</small></div>` : (!aIsWeight && aIsSwim && a.distance_km) ? `<div class="activity-dist">${Math.round(a.distance_km*1000)}<small style="font-size:11px;font-weight:400;margin-left:2px">m</small></div>` : ''}
        </div>`
      }).join('')}
    </div>
  `).join('')

  const moreBtn = hasMore
    ? `<button class="show-more-btn" id="show-more-btn">▼ 顯示全部 ${groups.length} 天記錄</button>`
    : ''
  return html + moreBtn
}

/* ── main render ── */
function render(data) {
  const s = data.summary || {}
  const tpeNow = new Date(Date.now() + 8 * 3600 * 1000)
  const tY = tpeNow.getUTCFullYear(), tM = tpeNow.getUTCMonth(), tD = tpeNow.getUTCDate()
  const thisMonth = tY + '-' + String(tM + 1).padStart(2, '0')
  const updatedMonth = (data.updated_at || '').slice(0, 7)
  const isStaleMonth = updatedMonth !== thisMonth

  if (!Array.isArray(data.monthly_history)) data.monthly_history = []
  let mh = data.monthly_history.find(h => h.month === thisMonth)
  if (!mh) {
    mh = {
      month: thisMonth,
      ride: { distance_km: 0, elevation_m: 0, count: 0 },
      run: { distance_km: 0, count: 0 },
      swim: { distance_km: 0, count: 0 },
      weight_training: { count: 0 },
    }
    data.monthly_history.push(mh)
    data.monthly_history.sort((a, b) => (a.month || '').localeCompare(b.month || ''))
  }
  const history = data.monthly_history.slice().reverse()

  // ── Fallback: derive monthly data from existing JSON if Action hasn't run yet ──
  if (!data.monthly_summary || !data.monthly_goals || !data.weekly_quest || isStaleMonth) {
    const TARGET = 4
    const TARGET_WEIGHT = 10
    const sOf = (c, t) => { const r = c / t; return r >= 1.5 ? 'over' : r >= 1 ? 'done' : r >= 0.5 ? 'warning' : 'danger' }
    if ((!data.monthly_summary || isStaleMonth) && mh) {
      data.monthly_summary = {
        ride_km:      mh.ride?.distance_km ?? 0,
        run_km:       mh.run?.distance_km ?? 0,
        swim_m:       Math.round((mh.swim?.distance_km ?? 0) * 1000),
        weight_count: mh.weight_training?.count ?? 0,
      }
    }
    if ((!data.monthly_goals || isStaleMonth) && mh) {
      const rc = mh.ride?.count ?? 0, rnc = mh.run?.count ?? 0, sc = mh.swim?.count ?? 0, wc = mh.weight_training?.count ?? 0
      data.monthly_goals = {
        ride:   { count: rc,  target: TARGET,        status: sOf(rc,  TARGET)        },
        run:    { count: rnc, target: TARGET,        status: sOf(rnc, TARGET)        },
        swim:   { count: sc,  target: TARGET,        status: sOf(sc,  TARGET)        },
        weight: { count: wc,  target: TARGET_WEIGHT, status: sOf(wc,  TARGET_WEIGHT) },
      }
    }
    if (!data.weekly_quest) {
      const dow = tpeNow.getUTCDay()
      const daysFromMon = (dow + 6) % 7
      const weekStart = new Date(Date.UTC(tY, tM, tD - daysFromMon)).toISOString().slice(0, 10)
      const inWeek = a => (a.date || '') >= weekStart
      const wRides   = (data.recent_rides   || []).filter(inWeek)
      const wRuns    = (data.recent_runs    || []).filter(inWeek)
      const wSwims   = (data.recent_swims   || []).filter(inWeek)
      const wWeights = (data.recent_weights || []).filter(inWeek)
      const wRideDist = Math.round(wRides.reduce((s, a) => s + (a.distance_km || 0), 0) * 10) / 10
      const wRideHr   = Math.round(wRides.reduce((s, a) => s + (a.moving_time_hr || 0), 0) * 10) / 10
      const wRunDist  = Math.round(wRuns.reduce((s, a)  => s + (a.distance_km || 0), 0) * 10) / 10
      const wRunHr    = Math.round(wRuns.reduce((s, a)  => s + (a.moving_time_hr || 0), 0) * 10) / 10
      const wSwimM    = Math.round(wSwims.reduce((s, a) => s + (a.distance_km || 0) * 1000, 0))
      const wWeightCt = wWeights.length
      const wWeightParts = detectTrainPartsFromActivities(wWeights)
      data.weekly_quest = {
        ride:   { done: wRideDist >= 30 || wRideHr >= 1, super: wRideDist >= 30 && wRideHr >= 1, distance_km: wRideDist, moving_time_hr: wRideHr, target_km: 30, target_hr: 1 },
        run:    { done: wRunDist >= 10  || wRunHr >= 1,  super: wRunDist >= 10  && wRunHr >= 1,  distance_km: wRunDist,  moving_time_hr: wRunHr,  target_km: 10, target_hr: 1 },
        swim:   { done: wSwimM >= 1000,                   distance_m: wSwimM,    target_m: 1000 },
        weight: { done: wWeightCt >= 1,                   count: wWeightCt,      target: 1, parts: wWeightParts },
      }
    }
  }
  if (data.weekly_quest?.weight && !data.weekly_quest.weight.parts) {
    const dow = tpeNow.getUTCDay()
    const daysFromMon = (dow + 6) % 7
    const weekStart = new Date(Date.UTC(tY, tM, tD - daysFromMon)).toISOString().slice(0, 10)
    const inWeek = a => (a.date || '') >= weekStart
    const wWeights = (data.recent_weights || []).filter(inWeek)
    data.weekly_quest.weight.parts = detectTrainPartsFromActivities(wWeights)
  }
  const maxDist = Math.max(...history.map(monthDist), 1)

  // build ALL list (merged, sorted by date)
  const allList = []
  ;(data.recent_rides   || []).forEach(a => allList.push({...a, _type:'ride'}))
  ;(data.recent_runs    || []).forEach(a => allList.push({...a, _type:'run'}))
  ;(data.recent_swims   || []).forEach(a => allList.push({...a, _type:'swim'}))
  ;(data.recent_weights || []).forEach(a => allList.push({...a, _type:'weight'}))
  // sort by date desc, then time desc (so groupByDate re-sorts within day asc)
  allList.sort((a,b) => {
    const dc = (b.date||'').localeCompare(a.date||'')
    return dc !== 0 ? dc : (b.time||'').localeCompare(a.time||'')
  })

  // tabs config
  const tabs = [
    { key:'all',    label:'📋 全部',   list: allList             },
    { key:'ride',   label:'🚴 單車',   list: data.recent_rides   },
    { key:'run',    label:'🏃 跑步',   list: data.recent_runs    },
    { key:'swim',   label:'🏊 游泳',   list: data.recent_swims   },
    { key:'weight', label:'🏋️ 重訓', list: data.recent_weights },
  ]
  // only show tabs that have data
  const activeTabs = tabs.filter(t => t.list && t.list.length > 0)
  let activeTab = activeTabs[0]?.key || 'all'
  const showMore = {} // tab key → expanded boolean

  // ── ITT date → efforts map ──
  const ittMap = {}
  ;(data.segments || []).forEach(seg => {
    const sorted = seg.efforts.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))
    const byTime = seg.efforts.slice().sort((a, b) => (a.elapsed_sec || 0) - (b.elapsed_sec || 0))
    const rankOf = {}; byTime.forEach((e, i) => { rankOf[e.activity_id] = i + 1 })
    sorted.forEach((e, idx) => {
      const d = (e.date || '').slice(0, 10)
      if (!ittMap[d]) ittMap[d] = []
      ittMap[d].push({ segName: seg.name, elapsed_str: e.elapsed_str, is_pr: e.is_pr, attemptNum: idx + 1, total: sorted.length, rank: rankOf[e.activity_id], activityId: e.activity_id })
    })
  })

  function tabHTML() {
    return activeTabs.map(t => `
      <button class="sport-tab${t.key === activeTab ? ' active' : ''}" data-tab="${t.key}">${t.label}</button>
    `).join('')
  }
  function timelineHTML() {
    const t = activeTabs.find(t => t.key === activeTab)
    return renderTimeline(t?.list, activeTab, showMore[activeTab] || false, ittMap)
  }

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="avatar">
        <img src="docs/avatar.jpg" alt="SC"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <svg viewBox="0 0 24 24" style="display:none">${ICONS.ride}</svg>
      </div>
      <div class="hero-info">
        <h1>STEVE · 117
          <svg class="verified" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </h1>
        <div class="hero-sub">MASTER CHIEF · SPARTAN-117 · MJOLNIR MK VII</div>
        <div class="hero-updated">${(data.updated_at || '').slice(0, 10)}</div>
      </div>
      ${renderPowerCard(data.power_prs)}
    </div>

    ${renderMonthlySummary(data.monthly_summary)}
    ${renderMonthlyGoals(data.monthly_goals)}
    ${renderWeeklyQuest(data.weekly_quest)}
    ${renderSegments(data.segments)}

    ${history.length ? `
    <div class="monthly-chart">
      <div class="section-title">月度里程分佈 <span class="muted">· MONTHLY DISTANCE (KM)</span></div>
      <div class="chart-rows" id="chart-rows">
        ${(() => {
          // group by year
          const byYear = {}
          history.forEach(h => {
            const y = h.month.slice(0, 4)
            if (!byYear[y]) byYear[y] = []
            byYear[y].push(h)
          })
          const years = Object.keys(byYear).sort((a,b) => b.localeCompare(a)) // newest first
          const currentYear = new Date().getFullYear().toString()
          return years.map(year => {
            const collapsed = year !== currentYear
            const rows = byYear[year].map(h => {
              const dist = monthDist(h)
              const pct = dist > 0 ? Math.max((dist / maxDist) * 100, 4) : 0
              return `
                <div class="chart-row">
                  <div class="chart-label">${fmtMonthLabel(h.month)}</div>
                  <div class="chart-bar-wrap">
                    <div class="chart-bar" data-pct="${pct}">
                      <span class="chart-bar-val">${dist}</span>
                    </div>
                  </div>
                  <div class="chart-unit-label">km</div>
                </div>
              `
            }).join('')
            const rowHeight = byYear[year].length * 50 // approx px per row
            return `
              <div class="chart-year-header" data-year="${year}">
                <span class="chart-year-arrow" id="arrow-${year}">${collapsed ? '▶' : '▼'}</span>
                ${year}
              </div>
              <div class="chart-year-rows" id="year-rows-${year}" style="max-height:${collapsed ? '0' : '9999px'}" data-collapsed="${collapsed ? '1' : ''}">
                ${rows}
              </div>
            `
          }).join('')
        })()}
      </div>
    </div>
    ` : ''}

    <div class="section-title">活動紀錄 <span class="muted">· ACTIVITY LOG</span></div>
    <div class="sport-tabs" id="sport-tabs">${tabHTML()}</div>
    <div class="timeline" id="timeline">${timelineHTML()}</div>

    <div class="totals-grid">
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_distance_km==='number'?s.all_time_distance_km.toLocaleString():s.all_time_distance_km??'—'}</div>
        <div class="total-label">Total KM</div>
      </div>
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_elevation_m==='number'?s.all_time_elevation_m.toLocaleString():s.all_time_elevation_m??'—'}</div>
        <div class="total-label">Total Elev</div>
      </div>
      <div class="total-card">
        <div class="total-val">${typeof s.all_time_rides==='number'?s.all_time_rides.toLocaleString():s.all_time_rides??'—'}</div>
        <div class="total-label">Total Rides</div>
      </div>
    </div>

    <a class="strava-cta" href="https://www.strava.com/athletes/161539959" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
      View full profile on Strava
    </a>
  `

  // animate chart bars (only visible ones)
  requestAnimationFrame(() => {
    document.querySelectorAll('.chart-bar').forEach(bar => {
      const pct = bar.dataset.pct
      bar.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { bar.style.width = pct + '%' }, 80)
      })
    })
    // animate consistency bars
    document.querySelectorAll('.progress-fill').forEach(fill => {
      const pct = fill.dataset.pct
      fill.style.width = '0'
      requestAnimationFrame(() => {
        setTimeout(() => { fill.style.width = pct + '%' }, 120)
      })
    })
  })

  // year collapse toggle
  const chartRows = document.getElementById('chart-rows')
  if (chartRows) {
    chartRows.addEventListener('click', e => {
      const header = e.target.closest('.chart-year-header')
      if (!header) return
      const year = header.dataset.year
      const rows = document.getElementById(`year-rows-${year}`)
      const arrow = document.getElementById(`arrow-${year}`)
      const isCollapsed = rows.dataset.collapsed === '1'
      if (isCollapsed) {
        rows.dataset.collapsed = ''
        rows.style.maxHeight = rows.scrollHeight + 'px'
        arrow.textContent = '▼'
        // animate newly visible bars
        rows.querySelectorAll('.chart-bar').forEach(bar => {
          bar.style.width = '0'
          requestAnimationFrame(() => {
            setTimeout(() => { bar.style.width = bar.dataset.pct + '%' }, 60)
          })
        })
        // after transition, set to unrestricted so content can grow
        setTimeout(() => { if (rows.dataset.collapsed !== '1') rows.style.maxHeight = '9999px' }, 400)
      } else {
        // set explicit height first so transition has a from-value
        rows.style.maxHeight = rows.scrollHeight + 'px'
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            rows.style.maxHeight = '0'
            rows.dataset.collapsed = '1'
            arrow.textContent = '▶'
          })
        })
      }
    })
  }

  // seg row click → scroll to activity
  document.addEventListener('click', e => {
    const tr = e.target.closest('tr[data-date]')
    if (!tr) return
    const date = tr.dataset.date
    const actId = tr.dataset.actid || ''
    // make sure the right tab (all or ride) is showing, then scroll
    const actEl = document.getElementById('act-' + date)
    if (actEl) {
      actEl.scrollIntoView({ behavior: 'smooth', block: 'center' })
      actEl.classList.add('act-highlight')
      setTimeout(() => actEl.classList.remove('act-highlight'), 1500)
    } else {
      // not visible: switch to all + expand, then scroll after layout
      activeTab = 'all'
      showMore['all'] = true
      document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'all'))
      document.getElementById('timeline').innerHTML = timelineHTML()
      setTimeout(() => {
        const el = document.getElementById('act-' + date)
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' })
          el.classList.add('act-highlight')
          setTimeout(() => el.classList.remove('act-highlight'), 1500)
        } else {
          // activity too old, not in recent data — show toast
          const toast = document.createElement('div')
          toast.innerHTML = actId
            ? `📅 ${date} 不在最近記錄 &nbsp;<a href="https://www.strava.com/activities/${actId}" target="_blank" style="color:#ffc724;font-weight:700;text-decoration:underline">前往 Strava ↗</a>`
            : `📅 ${date} 的活動不在最近記錄內`
          toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,28,40,.9);color:#ffc724;border:1px solid rgba(255,199,36,.4);padding:8px 18px;border-radius:8px;font-size:12px;letter-spacing:1px;z-index:9999'
          document.body.appendChild(toast)
          setTimeout(() => toast.remove(), 3500)
        }
      }, 80)
    }
  })

  // tab switching
  document.getElementById('sport-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.sport-tab')
    if (!btn) return
    activeTab = btn.dataset.tab
    document.querySelectorAll('.sport-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab))
    document.getElementById('timeline').innerHTML = timelineHTML()
  })

  // show more
  document.getElementById('timeline').addEventListener('click', e => {
    if (e.target.id === 'show-more-btn') {
      showMore[activeTab] = true
      document.getElementById('timeline').innerHTML = timelineHTML()
    }
  })
}

/* ── power PR card + modal ── */
const PWR_DURATIONS = [
  { sec:5,    label:'5秒'  },
  { sec:10,   label:'10秒' },
  { sec:30,   label:'30秒' },
  { sec:60,   label:'1分'  },
  { sec:120,  label:'2分'  },
  { sec:300,  label:'5分'  },
  { sec:600,  label:'10分' },
  { sec:1200, label:'20分' },
  { sec:3600, label:'60分' },
]
function buildPwrMap(prs) {
  const m = new Map()
  ;(prs || []).forEach(p => m.set(p.duration_sec, p))
  return m
}
function renderPowerCard(prs) {
  if (!prs || !prs.length) return ''
  const map = buildPwrMap(prs)
  const hero = map.get(5) || prs[0]
  const heroLbl = (PWR_DURATIONS.find(d => d.sec === hero.duration_sec) || {}).label || `${hero.duration_sec}秒`
  // 6 mini cells: 5/10/30/1m/2m/5m
  const miniDurs = [5, 10, 30, 60, 120, 300]
  const miniCells = miniDurs.map(s => {
    const p = map.get(s)
    const lbl = PWR_DURATIONS.find(d => d.sec === s).label
    if (!p) return `<div class="hpc-mini empty"><div class="hpc-mini-lbl">${lbl}</div><div class="hpc-mini-val">—</div></div>`
    return `<div class="hpc-mini"><div class="hpc-mini-lbl">${lbl}</div><div class="hpc-mini-val">${p.watts}<small>W</small></div></div>`
  }).join('')
  return `
    <div class="hero-power-card" id="hero-power-card">
      <div class="hpc-head">
        <div class="hpc-head-l">
          <span class="hpc-title">⚡ 功率排行榜</span>
          <span class="hpc-title-en">POWER PR</span>
        </div>
        <div class="hpc-hero-tag">最佳 ${heroLbl}<b>${hero.watts}</b>W · 點擊展開 ▸</div>
      </div>
      <div class="hpc-grid">${miniCells}</div>
    </div>`
}

function renderPowerModal(prs) {
  const map = buildPwrMap(prs)
  const sorted = PWR_DURATIONS.filter(d => map.has(d.sec))
  const maxW = Math.max(...prs.map(p => p.watts))
  const tabs = PWR_DURATIONS.map(d => {
    const has = map.has(d.sec)
    return `<button class="pm-tab${d.sec === 5 && has ? ' active' : ''}" data-dur="${d.sec}"${!has?' disabled':''}>${d.label}</button>`
  }).join('')
  const rows = PWR_DURATIONS.map(d => {
    const p = map.get(d.sec)
    if (!p) return `<tr class="empty" data-dur="${d.sec}"><td class="dur">⚡ ${d.label}</td><td>—</td><td class="act">—</td><td class="date">—</td></tr>`
    const link = `https://www.strava.com/activities/${p.activity_id}`
    return `<tr data-dur="${d.sec}"${d.sec===5?' class="active"':''}>
      <td class="dur">⚡ ${d.label}</td>
      <td class="watt">${p.watts}</td>
      <td class="act"><a href="${link}" target="_blank" rel="noopener">${p.activity_name || '—'}</a></td>
      <td class="date">${p.date || '—'}</td>
    </tr>`
  }).join('')
  // power curve
  const W = 700, H = 170, padL = 42, padR = 14, padT = 14, padB = 26
  const innerW = W - padL - padR, innerH = H - padT - padB
  const yMax = Math.ceil(maxW / 100) * 100 + 100
  const pts = sorted.map((d, i) => {
    const p = map.get(d.sec)
    const x = padL + (i/(sorted.length-1)) * innerW
    const y = padT + innerH - (p.watts / yMax) * innerH
    return { x, y, w: p.watts, label: d.label, sec: d.sec }
  })
  const linePath = pts.map((p,i) => `${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
  const yTicks = [0, yMax/2, yMax]
  const yGrid = yTicks.map(v => {
    const y = padT + innerH - (v/yMax) * innerH
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="rgba(255,199,36,.08)" stroke-width="1"/>
            <text x="${padL-5}" y="${y+3}" fill="rgba(255,255,255,.4)" font-size="8" text-anchor="end">${Math.round(v)}</text>`
  }).join('')
  const xLabels = pts.map(p => `<text x="${p.x}" y="${H-8}" fill="rgba(255,255,255,.45)" font-size="8" text-anchor="middle">${p.label}</text>`).join('')
  const dots = pts.map(p => `
    <circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#ffc724" stroke="#0a0d12" stroke-width="2"/>
    <text x="${p.x}" y="${p.y - 7}" fill="#ffc724" font-size="9" font-weight="700" text-anchor="middle">${p.w}</text>`).join('')
  const curveSvg = `
    <svg class="pm-curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${yGrid}
      <path d="${linePath}" fill="none" stroke="#ffc724" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#pmGlow)"/>
      ${dots}${xLabels}
      <defs><filter id="pmGlow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    </svg>`

  return `
    <div class="pwr-modal-overlay" id="pwr-modal-overlay">
      <div class="pwr-modal" id="pwr-modal">
        <button class="pm-close" id="pm-close" aria-label="close">✕</button>
        <div class="pm-head">
          <h2>⚡ 功率排行榜</h2>
          <span class="en">POWER PR RANKING</span>
        </div>
        <div class="pm-body">
        <div class="pm-tabs" id="pm-tabs">${tabs}</div>
        <div class="pm-hero">
          <div class="pm-dial" id="pm-dial">
            <svg viewBox="0 0 200 200">
              <circle class="dial-bg" cx="100" cy="100" r="86"/>
              <circle class="dial-fg" cx="100" cy="100" r="86" stroke-dasharray="540" stroke-dashoffset="0" id="pm-dial-fg"/>
              ${Array.from({length:60}).map((_,i) => {
                const a = (i/60) * 360 * Math.PI/180
                const r1 = 96, r2 = i%5===0 ? 102 : 99
                const x1 = 100 + Math.cos(a-Math.PI/2)*r1, y1 = 100 + Math.sin(a-Math.PI/2)*r1
                const x2 = 100 + Math.cos(a-Math.PI/2)*r2, y2 = 100 + Math.sin(a-Math.PI/2)*r2
                return `<line class="dial-tick" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`
              }).join('')}
            </svg>
            <div class="pm-dial-center">
              <div class="pm-dial-lbl" id="pm-dial-lbl">最佳 5 秒</div>
              <div class="pm-dial-val" id="pm-dial-val">—</div>
              <div class="pm-dial-unit">WATT</div>
            </div>
          </div>
          <div class="pm-act-card" id="pm-act-card">
            <img class="pm-act-avatar" src="docs/avatar.jpg" alt="" aria-hidden="true" onerror="this.style.display='none'">
            <div class="pmc-tag">👑 全時段最佳紀錄</div>
            <div class="pmc-row"><span class="pmc-ico">📍</span><a id="pmc-name" href="#" target="_blank" rel="noopener">—</a></div>
            <div class="pmc-row"><span class="pmc-ico">📅</span><span id="pmc-date">—</span></div>
            <div class="pmc-row"><span class="pmc-ico">⚡</span><span class="pmc-watt" id="pmc-watt">—</span></div>
            <div class="pmc-row"><span class="pmc-ico">⏱</span><span id="pmc-dur">—</span></div>
          </div>
        </div>
        <div class="pm-section-head"><span class="ico">✦</span><h3>功率曲線</h3><span class="en">POWER DURATION CURVE</span></div>
        ${curveSvg}
        <div class="pm-section-head"><span class="ico">✦</span><h3>各時長最佳紀錄</h3><span class="en">BEST POWER BY DURATION</span></div>
        <table class="pm-table">
          <thead><tr><th>時長</th><th>功率 (W)</th><th class="h-act">活動名稱</th><th>日期</th></tr></thead>
          <tbody id="pm-tbody">${rows}</tbody>
        </table>
        <div class="pm-source">✦ 數據來源：STRAVA POWER BESTS</div>
        </div>
      </div>
    </div>`
}

function updatePwrModalTab(prs, durSec) {
  const map = buildPwrMap(prs)
  const p = map.get(durSec)
  const lblObj = PWR_DURATIONS.find(d => d.sec === durSec)
  const lbl = (lblObj || {}).label || `${durSec}秒`
  document.getElementById('pm-dial-lbl').textContent = `最佳 ${lbl}`
  document.getElementById('pm-dial-val').textContent = p ? p.watts : '—'
  const maxW = Math.max(...prs.map(x => x.watts))
  const ratio = p ? p.watts / maxW : 0
  const circ = 2 * Math.PI * 86
  document.getElementById('pm-dial-fg').setAttribute('stroke-dasharray', circ.toFixed(1))
  document.getElementById('pm-dial-fg').setAttribute('stroke-dashoffset', (circ * (1 - ratio)).toFixed(1))
  if (p) {
    const link = `https://www.strava.com/activities/${p.activity_id}`
    const a = document.getElementById('pmc-name')
    a.textContent = p.activity_name || '—'
    a.href = link
    document.getElementById('pmc-date').textContent = p.date || '—'
    document.getElementById('pmc-watt').textContent = `${p.watts} W`
    document.getElementById('pmc-dur').textContent = lbl
  } else {
    document.getElementById('pmc-name').textContent = '無紀錄'
    document.getElementById('pmc-name').removeAttribute('href')
    document.getElementById('pmc-date').textContent = '—'
    document.getElementById('pmc-watt').textContent = '—'
    document.getElementById('pmc-dur').textContent = lbl
  }
  document.querySelectorAll('.pm-tab').forEach(t => t.classList.toggle('active', +t.dataset.dur === durSec))
  document.querySelectorAll('#pm-tbody tr').forEach(tr => tr.classList.toggle('active', +tr.dataset.dur === durSec))
}

function openPowerModal(prs) {
  document.getElementById('pwr-modal-overlay')?.remove()
  document.body.insertAdjacentHTML('beforeend', renderPowerModal(prs))
  const overlay = document.getElementById('pwr-modal-overlay')
  void overlay.offsetWidth
  overlay.classList.add('open')
  document.body.style.overflow = 'hidden'
  const initial = prs.find(p => p.duration_sec === 5) ? 5 : prs[0].duration_sec
  updatePwrModalTab(prs, initial)
  const close = () => {
    overlay.classList.remove('open')
    document.body.style.overflow = ''
    setTimeout(() => overlay.remove(), 350)
    document.removeEventListener('keydown', onKey)
  }
  const onKey = e => { if (e.key === 'Escape') close() }
  document.addEventListener('keydown', onKey)
  document.getElementById('pm-close').addEventListener('click', close)
  overlay.addEventListener('click', e => { if (e.target === overlay) close() })
  document.getElementById('pm-tabs').addEventListener('click', e => {
    const t = e.target.closest('.pm-tab')
    if (!t || t.disabled) return
    updatePwrModalTab(prs, +t.dataset.dur)
  })
  document.getElementById('pm-tbody').addEventListener('click', e => {
    const tr = e.target.closest('tr[data-dur]')
    if (!tr || tr.classList.contains('empty')) return
    if (e.target.closest('a')) return
    updatePwrModalTab(prs, +tr.dataset.dur)
  })
}

function bindPowerCard(prs) {
  const card = document.getElementById('hero-power-card')
  if (!card || !prs || !prs.length) return
  card.addEventListener('click', () => {
    if (card.classList.contains('opening')) return
    card.classList.add('opening')
    setTimeout(() => {
      card.classList.remove('opening')
      openPowerModal(prs)
    }, 320)
  })
}

/* ── fetch strava.json ── */
fetch('data/strava.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json() })
  .then(data => { render(data); bindPowerCard(data.power_prs) })
  .catch(err => {
    document.getElementById('content').innerHTML = `
      <div class="loading" style="color:#ffc724">
        載入失敗：${err.message}<br><br>
        <span style="color:#555;font-size:12px">請先執行 GitHub Actions 產生 strava.json</span>
      </div>
    `
  })
</script>
