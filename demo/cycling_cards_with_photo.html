
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,700;1,800&family=Orbitron:wght@400;600;700;900&display=swap');

  .cw {
    background: #080808;
    padding: 20px 14px;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .cgrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 860px;
    margin: 0 auto;
  }
  .card {
    position: relative;
    background: #0d0d0d;
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    /* multi-layer glow: outer spread + sharp inner border */
    box-shadow:
      0 0 0 1.5px #e87c1a,
      0 0 14px 2px rgba(232,124,26,0.45),
      0 0 40px 4px rgba(232,124,26,0.18),
      inset 0 0 60px rgba(0,0,0,0.6);
  }
  /* top scanning light bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #ff9a30 30%, #ffe066 50%, #ff9a30 70%, transparent 100%);
    z-index: 20;
    opacity: 0.9;
  }
  /* corner accent marks */
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 14px; height: 14px;
    border-top: 2px solid #ffb03a;
    border-left: 2px solid #ffb03a;
    z-index: 20;
  }

  /* --- HERO --- */
  .hero {
    position: relative;
    height: 86px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 40%;
    filter: saturate(0.65) brightness(0.7) contrast(1.15);
  }
  .hero-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(8,8,8,0.05) 0%,
      rgba(8,8,8,0.88) 100%
    );
  }
  /* top-right corner mark on hero */
  .corner-tr {
    position: absolute;
    top: 0; right: 0;
    width: 14px; height: 14px;
    border-top: 2px solid #ffb03a;
    border-right: 2px solid #ffb03a;
    z-index: 21;
  }
  .num-badge {
    position: absolute;
    top: 7px; left: 9px;
    font-family: 'Orbitron', monospace;
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
    z-index: 5;
    text-shadow: 0 0 8px rgba(232,124,26,0.7);
  }
  .type-tag {
    position: absolute;
    top: 5px; right: 7px;
    background: rgba(12,12,12,0.82);
    border: 1px solid rgba(232,124,26,0.55);
    border-radius: 2px;
    padding: 2px 7px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 9px; font-weight: 700;
    color: #bbb; letter-spacing: 1.5px;
    text-transform: uppercase;
    z-index: 5;
  }

  /* --- BODY --- */
  .body {
    padding: 9px 11px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    flex: 1;
  }
  .title-block {
    border-bottom: 1px solid rgba(232,124,26,0.28);
    padding-bottom: 7px;
  }
  .name-en {
    font-size: 15px; font-weight: 800;
    font-style: italic; text-transform: uppercase;
    color: #fff; letter-spacing: 0.3px; line-height: 1.1;
  }
  .name-zh {
    font-size: 10px; color: rgba(255,255,255,0.38);
    margin-top: 2px; letter-spacing: 1px;
  }

  /* time + rank row */
  .tr-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .time-lbl { font-size: 8px; color: #e87c1a; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 1px; }
  .time-val {
    font-family: 'Orbitron', monospace;
    font-size: 24px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; gap: 4px;
  }
  .time-val.orange { color: #e87c1a; text-shadow: 0 0 12px rgba(232,124,26,0.6); }
  .time-val.gold   { color: #f0c040; text-shadow: 0 0 12px rgba(240,192,64,0.55); }
  .crown { font-size: 13px; }
  .status { font-size: 8px; font-weight: 700; letter-spacing: 1px; margin-top: 3px; text-transform: uppercase; }
  .s-rec { color: #e87c1a; } .s-pb { color: #f0c040; }

  .rank-blk { text-align: right; }
  .rank-lbl { font-size: 8px; color: rgba(255,255,255,0.42); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .rank-val { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; color: #fff; }
  .rank-diff { font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 600; color: #4cde82; margin-top: 1px; }

  /* stats strip */
  .stats {
    display: flex; gap: 3px;
    padding: 5px 0;
    border-top: 1px solid rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat { flex: 1; }
  .sv {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 700; color: #fff; line-height: 1;
    display: flex; align-items: center; gap: 2px;
  }
  .ico-p { color: #e87c1a; font-size: 11px; }
  .ico-h { color: #e84040; font-size: 11px; }
  .sl { font-size: 7px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* meta row */
  .meta { display: flex; gap: 3px; }
  .mi { flex: 1; }
  .mv { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.78); line-height: 1; }
  .ml { font-size: 7px; color: rgba(255,255,255,0.28); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* footer */
  .foot { display: flex; border-top: 1px solid rgba(232,124,26,0.22); }
  .f-icon {
    padding: 7px 9px; display: flex; align-items: center; justify-content: center;
    border-right: 1px solid rgba(232,124,26,0.18);
    color: rgba(255,255,255,0.42); cursor: pointer; transition: color 0.2s;
  }
  .f-icon:hover { color: #e87c1a; }
  .f-btn {
    flex: 1; padding: 7px 10px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(232,124,26,0.07); cursor: pointer; transition: background 0.2s;
  }
  .f-btn:hover { background: rgba(232,124,26,0.16); }
  .f-txt { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #e87c1a; text-transform: uppercase; }
  .f-arr { color: #e87c1a; font-size: 13px; }

  @media(max-width:580px){ .cgrid{ grid-template-columns:1fr; } }
</style>

<div class="cw">
  <h2 class="sr-only">Cycling ITT segment cards with photo hero</h2>
  <div class="cgrid" id="grid"></div>
</div>
